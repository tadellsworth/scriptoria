<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#18285C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumen">
<link rel="apple-touch-icon" href="data:image/png;base64,__ICON_B64__">
<title>Lumen</title>
<style>
  :root{
    --vellum:#EFE6D2; --vellum-card:#F6EFDF; --vellum-edge:#E4D9BF;
    --ink:#1B2C57; --ink-soft:#54608A;
    --gold:#B08322; --gold-bright:#C8A046;
    --crimson:#8C2F23; --rule:#DACDAA;
    --violet:#5B3A86; --rose:#B4577E; --green:#3E6B4F; --black:#26303F;
    --serif:"Hoefler Text","Cormorant Garamond","EB Garamond",Garamond,"Palatino Linotype","Book Antiqua",Georgia,serif;
    --display:"Trajan Pro","Cinzel","Optima","Hoefler Text",Georgia,serif;
    --bar-h:52px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--serif);
    color:var(--ink);
    background-color:var(--vellum);
    background-image:
      radial-gradient(120% 80% at 50% -10%, rgba(255,251,240,.7), rgba(255,251,240,0) 60%),
      radial-gradient(90% 60% at 100% 100%, rgba(176,131,34,.05), rgba(176,131,34,0) 70%),
      radial-gradient(80% 60% at 0% 80%, rgba(27,44,87,.035), rgba(27,44,87,0) 70%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    overflow-y:scroll;
    overscroll-behavior-y:none;
  }

  /* ---- top bar ---- */
  #bar{
    position:sticky; top:0; z-index:20;
    height:calc(var(--bar-h) + env(safe-area-inset-top));
    padding-top:env(safe-area-inset-top);
    display:flex; align-items:center; justify-content:space-between;
    padding-left:max(18px,env(safe-area-inset-left)); padding-right:max(18px,env(safe-area-inset-right));
    transition:background .25s ease, box-shadow .25s ease, border-color .25s ease;
    border-bottom:1px solid transparent;
  }
  #bar.scrolled{
    background:rgba(239,230,210,.82);
    -webkit-backdrop-filter:saturate(1.4) blur(14px); backdrop-filter:saturate(1.4) blur(14px);
    border-bottom-color:var(--rule);
  }
  #wordmark{
    font-family:var(--display); font-weight:600; letter-spacing:.26em;
    text-transform:uppercase; font-size:1.06rem; color:var(--ink);
    padding-left:.26em;
  }
  .streak-chip{
    display:inline-flex; align-items:center; gap:.32em;
    color:var(--gold); font-family:var(--serif); font-weight:600;
    font-variant-numeric:tabular-nums; font-size:.95rem;
  }
  .streak-chip .ic{display:inline-flex;}

  /* ---- layout ---- */
  main{
    max-width:640px; margin:0 auto;
    padding:18px max(18px,env(safe-area-inset-left)) 0 max(18px,env(safe-area-inset-right));
    padding-bottom:calc(78px + env(safe-area-inset-bottom));
    /* Always keep the page just taller than the viewport so EVERY view scrolls.
       The tab bar is position:fixed; bottom:0 — on iOS a non-scrollable view (e.g.
       an empty Saved list) forces Safari's bottom toolbar to stay expanded, which
       shoves the fixed bar upward, while scrollable views (Today, More) let it
       collapse. Forcing a hair of scroll on short views keeps the toolbar — and the
       tab bar — in the same place across all three tabs. */
    min-height:calc(100vh + 1px);
  }
  .view-h{
    font-family:var(--display); text-transform:uppercase; letter-spacing:.22em;
    font-size:.82rem; color:var(--ink-soft); font-weight:600;
    margin:.2rem 0 1.1rem; padding-bottom:.7rem; border-bottom:1px solid var(--rule);
  }

  /* ---- card ---- */
  .card{
    background:var(--vellum-card);
    border:1px solid var(--vellum-edge);
    border-radius:9px;
    padding:1.45rem 1.35rem 1.2rem;
    margin-bottom:1.1rem;
    box-shadow:0 1px 2px rgba(27,44,87,.05), 0 8px 22px -16px rgba(27,44,87,.22);
  }
  .rubric{
    display:inline-block;
    font-family:var(--serif); text-transform:uppercase;
    letter-spacing:.2em; font-size:.66rem; font-weight:700;
    padding-bottom:.42rem; margin-bottom:.85rem;
    border-bottom:1.5px solid currentColor;
  }
  .rubric-gold{color:var(--gold);} .rubric-crimson{color:var(--crimson);} .rubric-lapis{color:var(--ink-soft);}
  .card-title{
    font-family:var(--display); font-weight:600; letter-spacing:.02em;
    font-size:1.32rem; line-height:1.2; color:var(--ink); margin:0 0 .55rem;
  }
  .body{
    font-size:1.19rem; line-height:1.62; color:var(--ink); margin:0;
    overflow-wrap:break-word;
  }
  .versal{
    float:left; font-family:var(--display); font-weight:600;
    font-size:3.5rem; line-height:.72; padding:.05em .14em 0 0;
  }
  .versal-gold{color:var(--gold);} .versal-crimson{color:var(--crimson);}
  .quote{
    margin:.95rem 0 0; padding-left:.85rem; border-left:2px solid var(--gold);
    font-style:italic; color:var(--ink-soft); font-size:1.08rem; line-height:1.5;
  }
  .foot{
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
    margin-top:1.1rem; padding-top:.85rem; border-top:1px solid var(--rule);
  }
  .ref{
    font-style:italic; color:var(--ink-soft); font-size:.92rem;
    font-variant:small-caps; letter-spacing:.02em;
  }
  .save{
    flex:none; display:inline-flex; align-items:center; gap:.4em;
    font-family:var(--serif); font-size:.82rem; color:var(--ink-soft);
    background:transparent; border:1px solid var(--rule); border-radius:999px;
    padding:.34em .8em .34em .64em; cursor:pointer; transition:color .15s, border-color .15s, background .15s;
  }
  .save .ic{display:inline-flex;}
  .save.on{color:var(--crimson); border-color:var(--crimson); --fill:currentColor; background:rgba(140,47,35,.05);}
  .save:hover{border-color:var(--ink-soft);}

  /* ---- liturgical header ---- */
  .lit{
    display:flex; align-items:center; gap:.7rem;
    margin:.1rem 0 1.25rem; padding:.7rem .85rem;
    background:var(--vellum-card); border:1px solid var(--vellum-edge);
    border-left:4px solid var(--gold); border-radius:8px;
  }
  .lit-mark{flex:none; width:9px; height:9px; border-radius:2px; background:var(--gold); transform:rotate(45deg);}
  .lit-txt{min-width:0;}
  .lit-day{font-family:var(--display); font-weight:600; font-size:1.04rem; color:var(--ink); line-height:1.22;}
  .lit-sub{font-size:.82rem; color:var(--ink-soft); font-variant:small-caps; letter-spacing:.04em; margin-top:.08rem;}
  .lit-violet{border-left-color:var(--violet);} .lit-violet .lit-mark{background:var(--violet);}
  .lit-rose{border-left-color:var(--rose);}     .lit-rose .lit-mark{background:var(--rose);}
  .lit-green{border-left-color:var(--green);}   .lit-green .lit-mark{background:var(--green);}
  .lit-white{border-left-color:var(--gold);}    .lit-white .lit-mark{background:var(--gold);}
  .lit-red{border-left-color:var(--crimson);}   .lit-red .lit-mark{background:var(--crimson);}
  .lit-black{border-left-color:var(--black);}   .lit-black .lit-mark{background:var(--black);}

  /* ---- saint of the day (pinned) ---- */
  .saint-hero{
    border-color:var(--gold);
    background:
      linear-gradient(180deg, rgba(176,131,34,.06), rgba(176,131,34,0) 38%),
      var(--vellum-card);
    box-shadow:0 1px 2px rgba(176,131,34,.12), 0 10px 26px -16px rgba(176,131,34,.5);
  }
  .eyebrow{font-size:.84rem; color:var(--ink-soft); font-variant:small-caps; letter-spacing:.05em; margin-bottom:.2rem;}

  /* ---- colophon (soft stop) ---- */
  .colophon{
    text-align:center; padding:2.1rem 1.35rem; border-style:dashed;
    background:transparent;
  }
  .colophon .ic{color:var(--gold); display:inline-flex; margin-bottom:.3rem;}
  .colophon-h{font-family:var(--display); font-weight:600; font-size:1.15rem; color:var(--ink); margin:.2rem 0 .5rem;}
  .colophon-p{color:var(--ink-soft); font-size:1.02rem; margin:0 auto; max-width:30ch;}
  .colophon-streak{color:var(--gold); font-weight:600; margin-top:.7rem; font-variant-numeric:tabular-nums;}

  /* ---- empty / panels ---- */
  .empty{text-align:center; padding:3rem 1rem; color:var(--ink-soft);}
  .empty-h{font-family:var(--display); font-size:1.2rem; color:var(--ink); margin:0 0 .4rem;}
  .empty-p{margin:0 auto; max-width:32ch;}
  .panel{
    background:var(--vellum-card); border:1px solid var(--vellum-edge);
    border-radius:9px; padding:1.3rem 1.3rem; margin-bottom:1.1rem;
  }
  .panel-h{font-family:var(--display); font-weight:600; letter-spacing:.04em; font-size:1.05rem; color:var(--ink); margin:0 0 .5rem;}
  .panel-p{color:var(--ink-soft); font-size:1rem; line-height:1.55; margin:0 0 .4rem;}
  .panel-p.note{font-size:.86rem; opacity:.85;}
  .streak-big{display:flex; align-items:center; justify-content:center; gap:.4rem; color:var(--gold);}
  .streak-big .ic{display:inline-flex; transform:scale(1.4);}
  .streak-n{font-family:var(--display); font-size:2.6rem; font-weight:600; font-variant-numeric:tabular-nums;}
  .streak-cap{text-align:center; color:var(--ink-soft); margin:.2rem 0 0; letter-spacing:.04em;}
  .sync-row{display:flex; gap:.5rem; margin-top:.7rem; flex-wrap:wrap;}
  .pin-input{
    flex:1 1 120px; min-width:0; font-family:var(--serif); font-size:1rem; color:var(--ink);
    background:#fff; border:1px solid var(--vellum-edge); border-radius:7px; padding:.55em .7em;
    letter-spacing:.18em;
  }
  .btn{
    font-family:var(--serif); font-size:.92rem; color:var(--ink); background:transparent;
    border:1px solid var(--ink-soft); border-radius:7px; padding:.5em 1.1em; cursor:pointer;
  }
  .btn-gold{border-color:var(--gold); color:#6e5210; background:rgba(176,131,34,.08);}
  .sync-status{font-size:.86rem; margin:.7rem 0 0; min-height:1em;}
  .sync-status.ok{color:#3c6b3c;} .sync-status.warn{color:var(--crimson);}

  /* ---- tab bar ---- */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    display:flex; justify-content:space-around;
    padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-right));
    background:rgba(239,230,210,.85);
    -webkit-backdrop-filter:saturate(1.4) blur(16px); backdrop-filter:saturate(1.4) blur(16px);
    border-top:1px solid var(--rule);
  }
  .tab{
    flex:1; max-width:120px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:3px;
    background:transparent; border:0; cursor:pointer; color:var(--ink-soft);
    font-family:var(--serif); font-size:.7rem; letter-spacing:.06em;
    padding:7px 0 4px; position:relative;
    transition:color .2s ease; -webkit-tap-highlight-color:transparent;
  }
  .tab .ic{display:flex; align-items:center; justify-content:center; height:24px; transition:color .2s ease, transform .2s ease;}
  .tab .ic svg{width:24px; height:24px; display:block;}
  .tab.active{color:var(--ink);}
  .tab.active .ic{color:var(--gold);}
  .tab:active .ic{transform:scale(.9);}
  .tab::before{
    content:""; position:absolute; top:0; width:22px; height:2px; border-radius:2px;
    background:var(--gold); opacity:0; transform:scaleX(.4); transform-origin:center;
    transition:opacity .22s ease, transform .22s ease;
  }
  .tab.active::before{opacity:1; transform:scaleX(1);}

  /* ---- motion ---- */
  .reveal{opacity:0; transform:translateY(10px);}
  .reveal.in{opacity:1; transform:none; transition:opacity .5s ease, transform .5s ease;}
  @keyframes viewIn{from{opacity:0; transform:translateY(7px);} to{opacity:1; transform:none;}}
  .view-in{animation:viewIn .28s cubic-bezier(.22,.61,.36,1);}
  @media (prefers-reduced-motion: reduce){
    .reveal,.reveal.in{opacity:1; transform:none; transition:none;}
    .view-in{animation:none;}
    *{scroll-behavior:auto !important;}
  }

  /* ---- swipe deck ---- */
  .deck-wrap{position:relative; margin-top:.1rem;}
  .deck{position:relative;}
  .deck .card{margin-bottom:0;}
  .stackcard{position:absolute; top:0; left:0; right:0; will-change:transform,opacity; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  .stackcard.is-top{position:relative; z-index:50; cursor:grab; touch-action:none;}
  .stackcard.is-top:active{cursor:grabbing;}
  .aff{
    position:absolute; top:1.1rem; font-family:var(--display); font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; font-size:1.05rem;
    padding:.16em .55em; border:2.5px solid currentColor; border-radius:8px;
    opacity:0; pointer-events:none;
  }
  .aff-keep{left:1.1rem; color:var(--green); transform:rotate(-11deg);}
  .aff-pass{right:1.1rem; color:var(--ink-soft); transform:rotate(11deg);}
  .deck-actions{display:flex; justify-content:center; gap:1.1rem; margin:1.3rem 0 .1rem;}
  .deck-btn{
    display:inline-flex; align-items:center; gap:.45em;
    font-family:var(--serif); font-size:.92rem; letter-spacing:.03em;
    background:var(--vellum-card); border:1px solid var(--rule); border-radius:999px;
    padding:.58em 1.3em; cursor:pointer; color:var(--ink-soft);
    box-shadow:0 1px 2px rgba(27,44,87,.05);
  }
  .deck-btn .ic{display:inline-flex;}
  .deck-btn.keep{color:#386a4c; border-color:rgba(62,107,79,.45);}
  .deck-btn{transition:transform .15s ease, color .15s ease, border-color .15s ease, background .15s ease;}
  .deck-btn:active{transform:translateY(1px) scale(.98);}
  .deck-progress{text-align:center; font-size:.74rem; color:var(--ink-soft); font-variant:small-caps; letter-spacing:.1em; margin-top:.75rem; opacity:.75;}
  .deck-undo{
    display:flex; align-items:center; gap:.4em; width:-moz-fit-content; width:fit-content;
    margin:.55rem auto 0; font-family:var(--serif); font-size:.78rem; letter-spacing:.04em;
    color:var(--ink-soft); background:transparent; border:1px solid transparent;
    border-radius:999px; padding:.32em .9em; cursor:pointer; transition:color .15s, border-color .15s;
  }
  .deck-undo .ic{display:inline-flex;}
  .deck-undo:hover{color:var(--ink); border-color:var(--rule);}
  .deck-undo[hidden]{display:none;}

  /* ---- browse / overview mode ---- */
  .deck-bar{display:flex; justify-content:flex-end; align-items:center; margin:0 0 .7rem;}
  .deck-bar[hidden]{display:none;}
  .deck-browse{
    display:inline-flex; align-items:center; gap:.4em;
    font-family:var(--serif); font-size:.76rem; letter-spacing:.04em; color:var(--ink-soft);
    background:var(--vellum-card); border:1px solid var(--rule); border-radius:999px;
    padding:.34em .9em; cursor:pointer;
    transition:color .15s ease, border-color .15s ease, background .15s ease, transform .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .deck-browse:hover{color:var(--ink); border-color:var(--ink-soft);}
  .deck-browse:active{transform:translateY(1px);}
  .deck-browse .ic{display:inline-flex;}
  .deck-browse .ic svg{display:block;}
  .deck.browse .stackcard{
    position:relative !important; top:auto !important; left:auto !important; right:auto !important;
    transform:none !important; opacity:1 !important; z-index:auto !important;
    margin:0 0 .9rem 0 !important; cursor:pointer; touch-action:auto !important; transition:none !important;
  }
  .deck.browse .stackcard:last-child{margin-bottom:0 !important;}
  .deck.browse .stackcard.is-top{cursor:pointer;}
  .deck.browse .aff{display:none !important;}

  /* ---- detail sheet ---- */
  .detail-scrim{position:fixed; inset:0; z-index:60; background:rgba(20,28,55,.42); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .25s ease;}
  .detail-scrim.open{opacity:1; pointer-events:auto;}
  .detail{
    position:fixed; left:0; right:0; bottom:0; z-index:61;
    max-width:640px; margin:0 auto; max-height:90vh;
    background:var(--vellum-card); border:1px solid var(--vellum-edge);
    border-radius:18px 18px 0 0;
    box-shadow:0 -10px 44px -14px rgba(27,44,87,.55);
    transform:translateY(101%); pointer-events:none;
    transition:transform .38s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
  }
  .detail.open{transform:none; pointer-events:auto;}
  .detail-grip{width:42px; height:4px; border-radius:2px; background:var(--rule); margin:.7rem auto .1rem; flex:none;}
  .detail-scroll{overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:1.1rem 1.4rem 1.4rem;}
  .detail .rubric{margin-bottom:.7rem;}
  .detail-title{font-family:var(--display); font-weight:600; font-size:1.5rem; line-height:1.2; color:var(--ink); margin:0 0 .8rem;}
  .detail-p{font-size:1.13rem; line-height:1.66; color:var(--ink); margin:0 0 .85rem;}
  .detail-p.reflection{font-style:italic; color:var(--ink-soft); border-left:2px solid var(--gold); padding-left:.9rem; margin-top:1.1rem;}
  .detail-meta{margin-top:1rem; padding-top:.9rem; border-top:1px solid var(--rule); display:flex; flex-direction:column; gap:.5rem;}
  .detail-ref{font-style:italic; color:var(--ink-soft); font-variant:small-caps; letter-spacing:.02em; font-size:.95rem;}
  .detail-src{font-size:.84rem; color:var(--ink-soft);}
  .tags{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.15rem;}
  .tag{font-size:.7rem; letter-spacing:.05em; color:var(--ink-soft); background:rgba(27,44,87,.05); border:1px solid var(--rule); border-radius:999px; padding:.16em .7em; font-variant:small-caps;}
  .detail-actions{display:flex; gap:.8rem; padding:.9rem 1.4rem calc(1.1rem + env(safe-area-inset-bottom)); flex:none; border-top:1px solid var(--rule);}
  .detail-actions .save{flex:1; justify-content:center; padding:.7em; font-size:.92rem;}
  .detail-actions .close{flex:1; justify-content:center; padding:.7em;}

  /* ---- depth layer: the Fathers / the Explanation ---- */
  .depth{margin-top:1.7rem;}
  .fathers-head{display:flex; align-items:center; gap:.85rem; margin:0 0 1.15rem;}
  .fathers-rule{flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--gold) 35%, var(--gold) 65%, transparent); opacity:.55;}
  .fathers-title{font-family:var(--display); font-size:.8rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); white-space:nowrap;}
  .gloss{margin:0 0 1.2rem;}
  .gloss:last-of-type{margin-bottom:.3rem;}
  .gloss-father{font-family:var(--display); font-size:.72rem; letter-spacing:.13em; text-transform:uppercase; color:var(--crimson); margin-bottom:.3rem;}
  .gloss-text{font-size:1.05rem; line-height:1.62; color:var(--ink); margin:0; padding-left:.9rem; border-left:2px solid rgba(176,141,87,.4);}
  .expl-text{font-size:1.06rem; line-height:1.64; color:var(--ink); margin:0 0 .85rem;}
  .expl-text:last-of-type{margin-bottom:.3rem;}
  .fathers-src{margin-top:.5rem; font-size:.78rem; font-style:italic; color:var(--ink-soft);}
  .fathers-loading{margin-top:1.4rem; font-style:italic; color:var(--ink-soft); font-size:.95rem;}
  @media (prefers-reduced-motion: reduce){
    .detail{transition:none;} .detail-scrim{transition:none;}
  }

  :focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:4px;}
  ::selection{background:rgba(176,131,34,.22);}
</style>
</head>
<body>
  <header id="bar">
    <span id="wordmark">Lumen</span>
    <span class="streak-chip" title="Daily streak">
      <span id="streakIcon"></span><span id="streakN">0</span>
    </span>
  </header>

  <main>
    <section id="view-today"><div id="feed"></div></section>

    <section id="view-saved" hidden>
      <h1 class="view-h">Saved</h1>
      <div id="savedList"></div>
    </section>

    <section id="view-more" hidden>
      <h1 class="view-h">More</h1>
      <div id="moreList"></div>
    </section>
  </main>

  <nav class="tabbar" aria-label="Sections">
    <button class="tab active" id="tab-today" aria-current="page">Today</button>
    <button class="tab" id="tab-saved">Saved</button>
    <button class="tab" id="tab-more">More</button>
  </nav>

  <noscript>Lumen needs JavaScript to display the daily readings.</noscript>

  <script>/*__APP_JS__*/</script>
</body>
</html>
