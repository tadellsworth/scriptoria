const PERSONS=["1st sg. (I)","2nd sg. (you)","3rd sg. (he/she)","1st pl. (we)","2nd pl. (you all)","3rd pl. (they)"];
let conjIdx=0;
function renderConjugationDrill(){
  const drill=CONJ_DRILLS[conjIdx%CONJ_DRILLS.length];
  $("practice-content").innerHTML=`<div class="parse-card"><div style="font-size:0.8rem;color:var(--brown-muted);margin-bottom:4px">Drill ${(conjIdx%CONJ_DRILLS.length)+1} of ${CONJ_DRILLS.length}</div><div class="parse-word">${drill.verb}</div><div class="parse-hint">${drill.meaning} — ${drill.conj} conj., ${drill.tense} tense</div>
<table class="conj-table"><thead><tr><th>Person</th><th>Form</th></tr></thead><tbody>${PERSONS.map((p,i)=>`<tr><td>${p}</td><td><input class="conj-input" data-idx="${i}" placeholder="..."></td></tr>`).join('')}</tbody></table>
<div style="text-align:center;margin-top:10px"><button class="drill-btn" id="conj-check">Check</button><button class="drill-btn" id="conj-show" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Show</button><button class="drill-btn" id="conj-next" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Next Verb \u2192</button></div></div>`;
  $("conj-check").addEventListener("click",()=>{
    const norm=s=>s.trim().toLowerCase().replace(/[\u0101\u0113\u012b\u014d\u016b]/g,m=>({"\u0101":"a","\u0113":"e","\u012b":"i","\u014d":"o","\u016b":"u"}[m]||m));
    document.querySelectorAll(".conj-input").forEach(inp=>{const idx=parseInt(inp.dataset.idx);const ans=drill.forms[idx];inp.classList.remove("correct","wrong");inp.classList.add(norm(inp.value)===norm(ans)?"correct":"wrong");});
    const allOk=document.querySelectorAll(".conj-input.wrong").length===0&&document.querySelectorAll(".conj-input.correct").length>0;
    if(allOk){playAchievement();haptic("success");}else{haptic("error");}recordStudyDay();
  });
  $("conj-show").addEventListener("click",()=>{document.querySelectorAll(".conj-input").forEach(inp=>{inp.value=drill.forms[parseInt(inp.dataset.idx)];inp.classList.remove("wrong");inp.classList.add("correct");});});
  $("conj-next").addEventListener("click",()=>{conjIdx++;renderConjugationDrill();});
}

// ═══════════════════════════════════════════════════════════════════
function renderScripture(){
  const sections=[{id:"john",label:"Gospel of John"},{id:"psalms",label:"Psalms"},{id:"vulgate",label:"Vulgate Core Words"},{id:"bookmarks",label:"\u2661 Bookmarks"},{id:"other",label:"Other Passages"}];
  let content="";
  const fz=S.fontSize||1;
  const fontStyle="font-size:"+(fz)+"rem";
  if(S.scrSection==="john"){
    const ch=JOHN_CHAPTERS[S.scrChapter];
    content=`<div class="font-controls"><button class="font-btn" id="font-down">A\u2212</button><span class="font-label">Text Size</span><button class="font-btn" id="font-up">A+</button></div>
<div id="scr-ch-nav" class="scripture-nav">${JOHN_CHAPTERS.map((c,i)=>`<button class="scripture-nav-btn ${S.scrChapter===i?'active':''}" data-ch="${i}">Ch. ${c.ch}</button>`).join('')}</div>
<div class="chapter-title">${ch.title}</div>
<div class="chapter-subtitle">${ch.subtitle}</div>
<p class="instructions">Tap any Latin word to see its definition. Grammar notes appear below each verse.</p>
<div class="interlinear" style="${fontStyle}">${ch.verses.map(v=>{const ref="Io."+ch.ch+":"+v.v;const bk=isBookmarked(ref);const words=v.la.split(/\b/).map(w=>/[a-zA-ZāēīōūÀ-ÿ]{2,}/.test(w)?`<span class="word-tap" data-word="${w}">${w}</span>`:w).join('');return`<div class="il-line ${bk?'bookmarked':''}"><button class="verse-bookmark ${bk?'active':''}" data-ref="${ref}" title="Bookmark">${bk?'\u2665':'\u2661'}</button><div class="il-latin"><span class="verse-num">${v.v}</span>${words}</div><div class="il-english">${v.en}</div>${v.n?`<div class="il-note">${v.n}</div>`:''}</div>`;}).join('')}</div>
<div style="display:flex;justify-content:space-between;margin-top:20px">${S.scrChapter>0?`<button class="next-btn" id="prev-ch">\u2190 Ch. ${JOHN_CHAPTERS[S.scrChapter-1].ch}</button>`:'<div></div>'}${S.scrChapter<JOHN_CHAPTERS.length-1?`<button class="next-btn" id="next-ch">Ch. ${JOHN_CHAPTERS[S.scrChapter+1].ch} \u2192</button>`:'<div></div>'}</div>`;
  } else if(S.scrSection==="psalms"){
    const psIdx=S.psalmIndex||0;
    const ps=VULGATE_PSALMS[psIdx];
    content=`<div class="font-controls"><button class="font-btn" id="font-down">A\u2212</button><span class="font-label">Text Size</span><button class="font-btn" id="font-up">A+</button></div>
<div id="scr-ch-nav" class="scripture-nav">${VULGATE_PSALMS.map((p,i)=>`<button class="scripture-nav-btn ps-nav-btn ${psIdx===i?'active':''}" data-psi="${i}">Ps. ${p.ps}</button>`).join('')}</div>
<div class="chapter-title">${ps.title}</div>
<div class="chapter-subtitle">${ps.subtitle}</div>
<p class="instructions">Tap any Latin word to see its definition. Grammar notes appear below each verse.</p>
<div class="interlinear" style="${fontStyle}">${ps.verses.map(v=>{const ref="Ps."+ps.ps+":"+v.v;const bk=isBookmarked(ref);const words=v.la.split(/\b/).map(w=>/[a-zA-Z\u0101\u0113\u012B\u014D\u016B\u00C0-\u00FF]{2,}/.test(w)?`<span class="word-tap" data-word="${w}">${w}</span>`:w).join('');return`<div class="il-line ${bk?'bookmarked':''}"><button class="verse-bookmark ${bk?'active':''}" data-ref="${ref}" title="Bookmark">${bk?'\u2665':'\u2661'}</button><div class="il-latin"><span class="verse-num">${v.v}</span>${words}</div><div class="il-english">${v.en}</div>${v.n?`<div class="il-note">${v.n}</div>`:''}</div>`;}).join('')}</div>
<div style="display:flex;justify-content:space-between;margin-top:20px">${psIdx>0?`<button class="next-btn" id="prev-ps">\u2190 Ps. ${VULGATE_PSALMS[psIdx-1].ps}</button>`:'<div></div>'}${psIdx<VULGATE_PSALMS.length-1?`<button class="next-btn" id="next-ps">Ps. ${VULGATE_PSALMS[psIdx+1].ps} \u2192</button>`:'<div></div>'}</div>`;
  } else if(S.scrSection==="vulgate"){
    const cats=["All","noun","verb","adj","prep","conj","pron","adv"];
    let filtered=S.vcFilter==="All"?VULGATE_CORE:VULGATE_CORE.filter(w=>w.pos===S.vcFilter);
    if(S.vcSearch){const q=S.vcSearch.toLowerCase();filtered=filtered.filter(w=>w.la.toLowerCase().includes(q)||w.en.toLowerCase().includes(q));}
    content=`<p class="instructions">The most frequent words in the Latin Vulgate. Master these to read ~80% of the text.</p>
<input type="text" class="vc-search" id="vc-search" placeholder="Search words..." value="${S.vcSearch||''}">
<div class="vc-filter-row">${cats.map(c=>`<button class="vc-filter-btn ${S.vcFilter===c?'active':''}" data-vcat="${c}">${c==="All"?"All ("+VULGATE_CORE.length+")":c}</button>`).join('')}</div>
<div class="vc-count" style="font-size:0.82rem;color:var(--brown-muted);margin-bottom:10px">Showing ${filtered.length} words</div>
${filtered.map((w,i)=>`<div class="vc-card" data-vci="${i}"><div><span class="vc-latin">${w.la}</span><span class="vc-pos">${w.pos}</span><div class="vc-english">${w.en}</div>${w.note?`<div class="vc-note">${w.note}</div>`:''}</div></div>`).join('')}`;
  } else if(S.scrSection==="bookmarks"){
    if(S.bookmarks.length===0){
      content='<div style="text-align:center;padding:40px 20px;color:var(--brown-muted)"><div style="font-size:2rem;margin-bottom:10px">\u2661</div><p>No bookmarked verses yet.</p><p style="font-size:0.85rem;margin-top:8px">Tap the heart icon on any verse while reading to save it here.</p></div>';
    } else {
      const bkVerses=[];
      S.bookmarks.forEach(ref=>{const mJ=ref.match(/Io\.(\d+):(\d+)/);if(mJ){const ch=JOHN_CHAPTERS.find(c=>c.ch===parseInt(mJ[1]));if(ch){const v=ch.verses.find(x=>x.v===parseInt(mJ[2]));if(v)bkVerses.push({ref,ch:ch.ch,...v});}};const mP=ref.match(/Ps\.(\d+):(\d+)/);if(mP){const ps=VULGATE_PSALMS.find(p=>p.ps===parseInt(mP[1]));if(ps){const v=ps.verses.find(x=>x.v===parseInt(mP[2]));if(v)bkVerses.push({ref,ch:ps.ps,...v});}}});
      content=`<p class="instructions">Your saved verses (${bkVerses.length})</p><div class="interlinear">${bkVerses.map(v=>`<div class="il-line bookmarked"><button class="verse-bookmark active" data-ref="${v.ref}" title="Remove">\u2665</button><div class="il-latin"><span class="verse-num">Io.${v.ch}:${v.v}</span>${v.la}</div><div class="il-english">${v.en}</div></div>`).join('')}</div>`;
    }
  } else {
    content=SCRIPTURE.map(s=>`<div style="margin-bottom:28px"><h3 style="font-size:1.1rem;color:var(--brown-mid);margin-bottom:2px">${s.title}</h3><p style="font-size:0.82rem;color:var(--gold);margin-bottom:12px;font-weight:600">${s.ref}</p><div class="interlinear">${s.lines.map(l=>`<div class="il-line"><div class="il-latin">${l.la}</div><div class="il-english">${l.en}</div></div>`).join('')}</div></div>`).join('');
  }
  $("view-scripture").innerHTML=`
${ST("Scriptura Sacra \u2014 Holy Scripture")}
<div class="toggle-row">${sections.map(s=>`<button class="toggle-btn ${S.scrSection===s.id?'active':''}" data-sec="${s.id}">${s.label}</button>`).join('')}</div>
${content}`;
  // Event listeners
  document.querySelectorAll("#view-scripture .toggle-btn").forEach(b=>b.addEventListener("click",()=>{S.scrSection=b.dataset.sec;renderScripture();}));
  document.querySelectorAll(".scripture-nav-btn").forEach(b=>b.addEventListener("click",()=>{S.scrChapter=parseInt(b.dataset.ch);saveState();renderScripture();scrollToEl("scr-ch-nav");}));
  document.querySelectorAll(".word-tap").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();showWordPanel(el.dataset.word,e);}));
  document.querySelectorAll(".verse-bookmark").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();toggleBookmark(b.dataset.ref);renderScripture();}));
  document.querySelectorAll(".vc-card").forEach(c=>c.addEventListener("click",()=>c.classList.toggle("expanded")));
  document.querySelectorAll(".vc-filter-btn").forEach(b=>b.addEventListener("click",()=>{S.vcFilter=b.dataset.vcat;renderScripture();}));
  const vcs=document.getElementById("vc-search");if(vcs)vcs.addEventListener("input",e=>{S.vcSearch=e.target.value;renderScripture();setTimeout(()=>{const el=document.getElementById("vc-search");if(el){el.focus();el.setSelectionRange(e.target.value.length,e.target.value.length);}},0);});
  const fu=document.getElementById("font-up"),fd=document.getElementById("font-down");
  if(fu)fu.addEventListener("click",()=>{S.fontSize=Math.min((S.fontSize||1)+0.1,1.5);saveState();renderScripture();});
  if(fd)fd.addEventListener("click",()=>{S.fontSize=Math.max((S.fontSize||1)-0.1,0.7);saveState();renderScripture();});
  document.querySelectorAll(".ps-nav-btn").forEach(b=>b.addEventListener("click",()=>{S.psalmIndex=parseInt(b.dataset.psi);saveState();renderScripture();scrollToEl("scr-ch-nav");}));
  const pp=$("prev-ps"),np=$("next-ps");
  if(pp)pp.addEventListener("click",()=>{S.psalmIndex=Math.max(0,(S.psalmIndex||0)-1);saveState();renderScripture();scrollToEl("scr-ch-nav");});
  if(np)np.addEventListener("click",()=>{S.psalmIndex=Math.min(VULGATE_PSALMS.length-1,(S.psalmIndex||0)+1);saveState();renderScripture();scrollToEl("scr-ch-nav");});
  const pc=$("prev-ch"),nc=$("next-ch");
  if(pc)pc.addEventListener("click",()=>{S.scrChapter--;saveState();renderScripture();scrollToEl("scr-ch-nav");});
  if(nc)nc.addEventListener("click",()=>{S.scrChapter++;saveState();renderScripture();scrollToEl("scr-ch-nav");});
  
}

{ps:1,title:"Psalm 1 — Beatus Vir",subtitle:"The Way of the Righteous and the Wicked",
verses:[
{v:1,la:"Beatus vir qui non abiit in consilio impiorum, et in via peccatorum non stetit, et in cathedra pestilentiae non sedit;",en:"Blessed is the man who has not walked in the counsel of the ungodly, nor stood in the way of sinners, nor sat in the seat of pestilence;",n:"<b>beatus</b> = blessed (adj. m. nom.); <b>vir</b> = man; <b>abiit</b> = went (perfect of abire); <b>consilio</b> = counsel (abl.); <b>impiorum</b> = of the ungodly (gen. pl.); <b>peccatorum</b> = of sinners (gen. pl.); <b>cathedra</b> = seat/chair (abl.); <b>pestilentiae</b> = of pestilence (gen.). Spanish: <i>beato</i>, <i>pecadores</i>, <i>cátedra</i>"},

{v:5,la:"Non sic impii, non sic; sed tamquam pulvis quem proicit ventus a facie terrae.",en:"Not so the ungodly, not so; but they are like the dust which the wind drives from the face of the earth.",n:"<b>impii</b> = the ungodly (m. nom. pl.); <b>pulvis</b> = dust (m. nom.); <b>proicit</b> = throws/drives (present); <b>ventus</b> = wind (m. nom.); <b>a facie</b> = from the face (abl.); <b>terrae</b> = of the earth (gen.). Spanish: <i>impío</i>, <i>viento</i>"},

{v:2,la:"In loco pascuae ibi me conlocavit; super aquam refectionis educavit me.",en:"In a place of pasture he has placed me; beside the water of refreshment he has led me.",n:"<b>loco pascuae</b> = place of pasture (abl. + gen.); <b>conlocavit</b> = he placed (perfect); <b>super aquam</b> = beside/upon the water (acc.); <b>refectionis</b> = of refreshment (gen.); <b>educavit</b> = he led forth (perfect). Spanish: <i>pasto</i>"},

{v:7,la:"inpinguasti in oleo caput meum, et calix meus inebrians quam praeclarus est.",en:"you have anointed my head with oil, and my overflowing cup, how excellent it is.",n:"<b>inpinguasti</b> = you have anointed/made rich (2nd sg. perfect); <b>in oleo</b> = with oil (abl.); <b>caput meum</b> = my head; <b>calix</b> = cup (m. nom.); <b>inebrians</b> = intoxicating/overflowing (present participle); <b>praeclarus</b> = excellent (adj.)"},
{v:8,la:"Et misericordia tua subsequetur me omnibus diebus vitae meae,",en:"And your mercy shall follow me all the days of my life,",n:"<b>misericordia</b> = mercy (f. nom.); <b>subsequetur</b> = will follow (future deponent); <b>omnibus diebus</b> = all the days (abl.); <b>vitae meae</b> = of my life (gen.). Spanish: <i>misericordia</i>"},

{ps:51,title:"Psalm 51 (50) — Miserere Mei",subtitle:"A Prayer of Repentance",
verses:[
{v:1,la:"Miserere mei, Deus, secundum magnam misericordiam tuam;",en:"Have mercy on me, O God, according to your great mercy;",n:"<b>miserere</b> = have mercy! (imperative deponent + gen.); <b>mei</b> = on me (gen.); <b>Deus</b> = O God (voc.); <b>secundum</b> = according to (prep. + acc.); <b>misericordiam</b> = mercy (f. acc.). Spanish: <i>misericordia</i>"},
{v:2,la:"et secundum multitudinem miserationum tuarum dele iniquitatem meam.",en:"and according to the multitude of your mercies, blot out my iniquity.",n:"<b>multitudinem</b> = multitude (f. acc.); <b>miserationum</b> = of mercies (f. gen. pl.); <b>dele</b> = blot out! (sg. imperative); <b>iniquitatem</b> = iniquity (f. acc.). Spanish: <i>multitud</i>, <i>iniquidad</i>"},
{v:3,la:"Amplius lava me ab iniquitate mea, et a peccato meo munda me.",en:"Wash me thoroughly from my iniquity, and cleanse me from my sin.",n:"<b>amplius</b> = more fully (comparative adverb); <b>lava</b> = wash! (imperative); <b>ab iniquitate</b> = from iniquity (abl.); <b>peccato</b> = sin (n. abl.); <b>munda</b> = cleanse! (imperative). Spanish: <i>lavar</i>, <i>pecado</i>"},
{v:4,la:"Quoniam iniquitatem meam ego cognosco, et peccatum meum contra me est semper.",en:"For I know my iniquity, and my sin is always before me.",n:"<b>ego cognosco</b> = I know (emphatic pronoun + present); <b>peccatum meum</b> = my sin (n. nom.); <b>contra me</b> = against/before me; <b>semper</b> = always"},
{v:5,la:"Tibi soli peccavi et malum coram te feci,",en:"Against you alone have I sinned, and done evil before you,",n:"<b>tibi soli</b> = against you alone (dat.); <b>peccavi</b> = I have sinned (1st sg. perfect); <b>malum</b> = evil (n. acc.); <b>coram te</b> = before you (prep. + abl.). Spanish: <i>pecar</i>"},
{v:6,la:"ut iustificeris in sermonibus tuis et vincas cum iudicaris.",en:"so that you may be justified in your words and prevail when you are judged.",n:"<b>ut iustificeris</b> = so that you may be justified (purpose + present passive subjunctive); <b>sermonibus</b> = words (m. abl. pl.); <b>vincas</b> = you may conquer (present subjunctive); <b>cum iudicaris</b> = when you are judged (present passive). Spanish: <i>justificar</i>"},
{v:7,la:"Ecce enim in iniquitatibus conceptus sum, et in peccatis concepit me mater mea.",en:"For behold, I was conceived in iniquities, and in sins did my mother conceive me.",n:"<b>ecce</b> = behold; <b>iniquitatibus</b> = iniquities (f. abl. pl.); <b>conceptus sum</b> = I was conceived (perfect passive); <b>peccatis</b> = sins (n. abl. pl.); <b>concepit</b> = she conceived (perfect)"},
{v:8,la:"Asperges me hyssopo, et mundabor; lavabis me, et super nivem dealbabor.",en:"You will sprinkle me with hyssop, and I shall be cleansed; you will wash me, and I shall be made whiter than snow.",n:"<b>asperges</b> = you will sprinkle (future); <b>hyssopo</b> = with hyssop (abl.); <b>mundabor</b> = I shall be cleansed (future passive); <b>lavabis</b> = you will wash (future); <b>super nivem</b> = above/whiter than snow (acc.); <b>dealbabor</b> = I shall be whitened (future passive)"},
{v:9,la:"Cor mundum crea in me, Deus, et spiritum rectum innova in visceribus meis.",en:"Create a clean heart in me, O God, and renew a right spirit within my inmost parts.",n:"<b>cor mundum</b> = a clean heart (n. acc.); <b>crea</b> = create! (imperative); <b>spiritum rectum</b> = a right spirit (m. acc.); <b>innova</b> = renew! (imperative); <b>visceribus</b> = inmost parts (n. abl. pl.). Spanish: <i>corazón</i>, <i>crear</i>, <i>espíritu</i>, <i>innovar</i>"},
{v:10,la:"Ne proicias me a facie tua, et Spiritum Sanctum tuum ne auferas a me.",en:"Cast me not away from your face, and take not your Holy Spirit from me.",n:"<b>ne proicias</b> = do not cast away (negative subjunctive); <b>a facie tua</b> = from your face (abl.); <b>Spiritum Sanctum</b> = Holy Spirit (m. acc.); <b>ne auferas</b> = do not take away (negative subjunctive)"},
{v:11,la:"Redde mihi laetitiam salutaris tui, et spiritu principali confirma me.",en:"Restore to me the joy of your salvation, and strengthen me with a willing spirit.",n:"<b>redde</b> = restore! give back! (imperative); <b>laetitiam</b> = joy (f. acc.); <b>salutaris tui</b> = of your salvation (gen.); <b>spiritu principali</b> = with a ruling/willing spirit (abl.); <b>confirma</b> = strengthen! (imperative). Spanish: <i>confirmar</i>"},
{v:12,la:"Domine, labia mea aperies, et os meum adnuntiabit laudem tuam.",en:"O Lord, you will open my lips, and my mouth shall declare your praise.",n:"<b>Domine</b> = O Lord (voc.); <b>labia</b> = lips (n. acc. pl.); <b>aperies</b> = you will open (future); <b>os meum</b> = my mouth (n. nom.); <b>adnuntiabit</b> = will declare (future); <b>laudem</b> = praise (f. acc.). Spanish: <i>labios</i>, <i>anunciar</i>"}
]},
{ps:91,title:"Psalm 91 (90) — Qui Habitat",subtitle:"Under the Shadow of the Almighty",
verses:[
{v:1,la:"Qui habitat in adiutorio Altissimi, in protectione Dei caeli commorabitur.",en:"He who dwells in the shelter of the Most High shall abide under the protection of the God of heaven.",n:"<b>qui habitat</b> = he who dwells (present); <b>in adiutorio</b> = in the shelter/help (abl.); <b>Altissimi</b> = of the Most High (gen. superlative); <b>protectione</b> = protection (f. abl.); <b>commorabitur</b> = he will abide (future deponent). Spanish: <i>habitar</i>, <i>protección</i>"},
{v:2,la:"Dicet Domino: Susceptor meus es tu et refugium meum; Deus meus, sperabo in eum.",en:"He will say to the Lord: You are my protector and my refuge; my God, I will hope in him.",n:"<b>dicet</b> = he will say (future); <b>Domino</b> = to the Lord (dat.); <b>susceptor</b> = protector (m. nom.); <b>refugium</b> = refuge (n. nom.); <b>sperabo</b> = I will hope (future). Spanish: <i>refugio</i>, <i>esperar</i>"},
{v:3,la:"Quoniam ipse liberabit me de laqueo venantium et a verbo aspero.",en:"For he himself will free me from the snare of hunters and from the harsh word.",n:"<b>ipse</b> = he himself; <b>liberabit</b> = will free (future); <b>de laqueo</b> = from the snare (abl.); <b>venantium</b> = of hunters (gen. pl. present participle); <b>verbo aspero</b> = harsh word (abl.). Spanish: <i>liberar</i>"},
{v:4,la:"Scapulis suis obumbrabit tibi, et sub pennis eius sperabis.",en:"He will overshadow you with his shoulders, and under his wings you will hope.",n:"<b>scapulis suis</b> = with his shoulders (abl.); <b>obumbrabit</b> = will overshadow (future); <b>sub pennis</b> = under the wings (abl.); <b>sperabis</b> = you will hope (future 2nd sg.)"},
{v:5,la:"Scuto circumdabit te veritas eius; non timebis a timore nocturno,",en:"His truth will surround you as a shield; you will not fear the terror of the night,",n:"<b>scuto</b> = with a shield (n. abl.); <b>circumdabit</b> = will surround (future); <b>veritas</b> = truth (f. nom.); <b>non timebis</b> = you will not fear (future); <b>timore nocturno</b> = nocturnal fear (abl.). Spanish: <i>verdad</i>, <i>nocturno</i>"},
{v:6,la:"a sagitta volante in die, a negotio perambulante in tenebris, ab incursu et daemonio meridiano.",en:"from the arrow that flies by day, from the trouble that walks in darkness, from the assault and the noonday demon.",n:"<b>sagitta volante</b> = flying arrow (f. abl. + present participle); <b>in die</b> = by day (abl.); <b>negotio perambulante</b> = trouble walking about (n. abl. + participle); <b>in tenebris</b> = in darkness (f. abl. pl.); <b>daemonio meridiano</b> = noonday demon (n. abl.)"},
{v:7,la:"Cadent a latere tuo mille, et decem milia a dextris tuis; ad te autem non appropinquabit.",en:"A thousand shall fall at your side, and ten thousand at your right hand; but it shall not come near you.",n:"<b>cadent</b> = they will fall (future); <b>a latere tuo</b> = at your side (abl.); <b>mille</b> = a thousand; <b>decem milia</b> = ten thousand; <b>a dextris tuis</b> = at your right hand (abl.); <b>non appropinquabit</b> = will not approach (future)"},
{v:8,la:"Quoniam angelis suis mandavit de te, ut custodiant te in omnibus viis tuis.",en:"For he has given his angels charge over you, to keep you in all your ways.",n:"<b>angelis suis</b> = to his angels (dat.); <b>mandavit</b> = he has commanded (perfect); <b>de te</b> = concerning you; <b>ut custodiant</b> = that they may guard (purpose + present subjunctive); <b>viis tuis</b> = your ways (f. abl. pl.). Spanish: <i>ángeles</i>, <i>custodiar</i>"},
{v:9,la:"In manibus portabunt te, ne forte offendas ad lapidem pedem tuum.",en:"In their hands they shall bear you up, lest you dash your foot against a stone.",n:"<b>in manibus</b> = in their hands (abl.); <b>portabunt</b> = they will carry (future); <b>ne forte</b> = lest perhaps; <b>offendas</b> = you strike (present subjunctive); <b>ad lapidem</b> = against a stone (acc.); <b>pedem tuum</b> = your foot (acc.)"},
{v:10,la:"Super aspidem et basiliscum ambulabis, et conculcabis leonem et draconem.",en:"You shall tread upon the asp and the basilisk, and trample the lion and the dragon.",n:"<b>super</b> = upon (prep. + acc.); <b>aspidem</b> = asp (f. acc.); <b>basiliscum</b> = basilisk (m. acc.); <b>ambulabis</b> = you will walk (future); <b>conculcabis</b> = you will trample (future); <b>leonem</b> = lion (m. acc.); <b>draconem</b> = dragon (m. acc.). Spanish: <i>león</i>, <i>dragón</i>"},
{v:11,la:"Quoniam in me speravit, liberabo eum; protegam eum, quoniam cognovit nomen meum.",en:"Because he has hoped in me, I will free him; I will protect him, because he has known my name.",n:"<b>speravit</b> = he has hoped (perfect); <b>liberabo</b> = I will free (future 1st sg.); <b>protegam</b> = I will protect (future 1st sg.); <b>cognovit</b> = he has known (perfect). Spanish: <i>proteger</i>"},
{v:12,la:"Clamabit ad me, et ego exaudiam eum; cum ipso sum in tribulatione, eripiam eum et glorificabo eum.",en:"He shall cry to me, and I will hear him; I am with him in trouble, I will deliver him and glorify him.",n:"<b>clamabit</b> = he will cry out (future); <b>exaudiam</b> = I will hear (future); <b>cum ipso</b> = with him (abl.); <b>tribulatione</b> = trouble (f. abl.); <b>eripiam</b> = I will deliver (future); <b>glorificabo</b> = I will glorify (future). Spanish: <i>clamar</i>, <i>tribulación</i>, <i>glorificar</i>"},
{v:13,la:"Longitudine dierum replebo eum, et ostendam illi salutare meum.",en:"With length of days I will fill him, and I will show him my salvation.",n:"<b>longitudine dierum</b> = with length of days (abl.); <b>replebo</b> = I will fill (future); <b>ostendam</b> = I will show (future); <b>illi</b> = to him (dat.); <b>salutare meum</b> = my salvation (n. acc.). Spanish: <i>longitud</i>, <i>ostentar</i>"}
]}
];

const FABULAE_STORIES = [
{id:"perseus",title:"Perseus",subtitle:"The Myth of Perseus and Medusa",
 intro:"Acrisius, an ancient king of Argos, had been warned by an oracle that he should perish by the hand of his grandson. On discovering that his daughter Danae had given birth to a son, he set both mother and child adrift on the sea. They were saved by Jupiter, and Perseus grew up at the court of Polydectes. Sent to fetch the head of Medusa, Perseus accomplished this with the help of Apollo and Minerva, rescued Andromeda from a sea-monster, and returned to fulfill the oracle.",
 chapters:[
{ch:1,title:"I. The Ark",subtitle:"Arca — Perseus is cast into the sea",
verses:[
{v:1,la:"Haec narrantur a poetis de Perseo.",en:"These things are told by the poets about Perseus.",n:"<b>narrantur</b> = 3rd pl. present passive (are told); <b>a poetis</b> = by the poets (abl. of agent); <b>de Perseo</b> = about Perseus (abl.)"},
{v:2,la:"Perseus filius erat Iovis, maximi deorum; avus eius Acrisius appellabatur.",en:"Perseus was the son of Jupiter, greatest of the gods; his grandfather was called Acrisius.",n:"<b>filius</b> = m. nom. (son); <b>Iovis</b> = gen. of Iuppiter; <b>maximi deorum</b> = greatest of the gods (gen. partitive); <b>avus</b> = grandfather; <b>appellabatur</b> = imperfect passive (was called)"},
{v:3,la:"Acrisius volebat Perseum nepotem suum necare; nam propter oraculum puerum timebat.",en:"Acrisius wanted to kill Perseus, his grandson; for he feared the boy on account of an oracle.",n:"<b>volebat</b> = imperfect (was wanting); <b>nepotem suum</b> = his grandson (acc.); <b>necare</b> = to kill (infinitive); <b>propter oraculum</b> = on account of an oracle (acc.); <b>timebat</b> = imperfect (was fearing). Spanish parallel: <i>nepote</i> → <i>nieto</i>"},
{v:4,la:"Comprehendit igitur Perseum adhuc infantem, et cum matre in arca lignea inclusit.",en:"He therefore seized Perseus, still an infant, and shut him up with his mother in a wooden chest.",n:"<b>comprehendit</b> = perfect (seized); <b>adhuc infantem</b> = still an infant (acc.); <b>cum matre</b> = with his mother (abl.); <b>in arca lignea</b> = in a wooden chest (abl.); <b>inclusit</b> = perfect (shut in). Spanish: <i>arca</i> = arca, <i>incluir</i> = to include/enclose"},
{v:5,la:"Tum arcam ipsam in mare coniecit.",en:"Then he threw the chest itself into the sea.",n:"<b>arcam ipsam</b> = the chest itself (acc. + intensive pronoun); <b>in mare</b> = into the sea (acc. of motion); <b>coniecit</b> = perfect (threw)"},
{v:6,la:"Danae, Persei mater, magnopere territa est; tempestas enim magna mare turbabat.",en:"Danae, the mother of Perseus, was greatly terrified; for a great storm was disturbing the sea.",n:"<b>magnopere</b> = greatly (adverb); <b>territa est</b> = perfect passive (was terrified); <b>tempestas</b> = f. nom. (storm); <b>turbabat</b> = imperfect (was disturbing). Spanish: <i>tempestad</i>, <i>turbar</i>"},
{v:7,la:"Perseus autem in sinu matris dormiebat.",en:"Perseus, however, was sleeping in his mother's lap.",n:"<b>autem</b> = however (postpositive conjunction); <b>in sinu</b> = in the lap/bosom (abl.); <b>matris</b> = of the mother (gen.); <b>dormiebat</b> = imperfect (was sleeping). Spanish: <i>seno</i> = bosom, <i>dormir</i>"}
]},
{ch:2,title:"II. Jupiter Saves His Son",subtitle:"Iuppiter filium suum servat",
verses:[
{v:1,la:"Iuppiter tamen haec omnia vidit, et filium suum servare constituit.",en:"Jupiter, however, saw all these things, and decided to save his son.",n:"<b>vidit</b> = perfect (saw); <b>servare</b> = to save (infinitive); <b>constituit</b> = perfect (decided). Spanish: <i>servir/conservar</i>"},
{v:2,la:"Tranquillum igitur fecit mare, et arcam ad insulam Seriphum perduxit.",en:"He therefore made the sea calm, and brought the chest to the island of Seriphos.",n:"<b>tranquillum fecit</b> = made calm (predicate acc.); <b>perduxit</b> = perfect (led/brought through). Spanish: <i>tranquilo</i>"},
{v:3,la:"Huius insulae Polydectes tum rex erat.",en:"Polydectes was then king of this island.",n:"<b>huius insulae</b> = of this island (gen.); <b>tum</b> = then (adverb)"},
{v:4,la:"Postquam arca ad litus appulsa est, Danae in harena quietem capiebat.",en:"After the chest was driven to shore, Danae was resting on the sand.",n:"<b>postquam</b> = after (conjunction); <b>ad litus</b> = to the shore (acc.); <b>appulsa est</b> = perfect passive (was driven); <b>in harena</b> = on the sand (abl.); <b>quietem capiebat</b> = was taking rest (imperfect). Spanish: <i>arena</i>"},
{v:5,la:"Post breve tempus a piscatore quodam reperta est, et ad domum regis Polydectis adducta est.",en:"After a short time she was found by a certain fisherman, and was brought to the house of king Polydectes.",n:"<b>a piscatore quodam</b> = by a certain fisherman (abl. of agent); <b>reperta est</b> = perfect passive (was found); <b>adducta est</b> = perfect passive (was led to). Spanish: <i>pescador</i>"},
{v:6,la:"Ille matrem et puerum benigne excepit, et iis sedem tutam in finibus suis dedit.",en:"He received the mother and child kindly, and gave them a safe home in his territory.",n:"<b>benigne</b> = kindly (adverb); <b>excepit</b> = perfect (received); <b>sedem tutam</b> = a safe seat/home (acc.); <b>in finibus suis</b> = in his own territory (abl.)"},
{v:7,la:"Danae hoc donum libenter accepit, et pro tanto beneficio regi gratias egit.",en:"Danae gladly accepted this gift, and gave thanks to the king for so great a kindness.",n:"<b>libenter</b> = gladly (adverb); <b>pro tanto beneficio</b> = for so great a benefit (abl.); <b>gratias egit</b> = gave thanks (idiom). Spanish: <i>beneficio</i>, <i>gracias</i>"}
]},
{ch:3,title:"III. Perseus Is Sent on His Travels",subtitle:"Perseus dimittitur",
verses:[
{v:1,la:"Perseus igitur multos annos ibi habitabat, et cum matre sua vitam beatam agebat.",en:"Perseus therefore lived there for many years, and was leading a happy life with his mother.",n:"<b>multos annos</b> = for many years (acc. of duration); <b>vitam beatam agebat</b> = was living a happy life (idiom: agere vitam). Spanish: <i>beato</i> = blessed/happy"},
{v:2,la:"At Polydectes Danaen magnopere amabat, atque eam in matrimonium ducere volebat.",en:"But Polydectes greatly loved Danae, and wanted to take her in marriage.",n:"<b>magnopere</b> = greatly; <b>in matrimonium ducere</b> = to lead into marriage (idiom). Spanish: <i>matrimonio</i>"},
{v:3,la:"Hoc tamen consilium Perseo minime gratum erat.",en:"This plan, however, was by no means pleasing to Perseus.",n:"<b>consilium</b> = plan (n. nom.); <b>Perseo</b> = to Perseus (dat.); <b>minime gratum</b> = by no means pleasing (superlative adverb + adj.)"},
{v:4,la:"Polydectes igitur Perseum dimittere constituit.",en:"Polydectes therefore decided to send Perseus away.",n:"<b>dimittere</b> = to send away (infinitive); <b>constituit</b> = decided (perfect). Spanish: <i>dimitir</i>"},
{v:5,la:"Tum iuvenem ad se vocavit et haec dixit:",en:"Then he called the young man to him and said these things:",n:"<b>iuvenem</b> = the young man (acc.); <b>ad se</b> = to himself (reflexive); <b>vocavit</b> = called (perfect). Spanish: <i>joven</i>"},
{v:6,la:'"Turpe est hanc ignavam vitam agere; iam dudum tu adulescens es."',en:'"It is shameful to live this idle life; you have been a young man for some time now."',n:'<b>turpe est</b> = it is shameful (predicate adj.); <b>ignavam</b> = idle, lazy (acc. adj.); <b>iam dudum</b> = for some time now; <b>adulescens</b> = young man (nom.). Spanish: <i>adolescente</i>'},
{v:7,la:'"Quo usque hic manebis? Tempus est arma capere et virtutem praestare."',en:'"How long will you stay here? It is time to take up arms and show courage."',n:'<b>quo usque</b> = how long? until when?; <b>manebis</b> = you will stay (future); <b>arma capere</b> = to take up arms; <b>virtutem praestare</b> = to show/display virtue. Spanish: <i>virtud</i>'},
{v:8,la:'"Hinc abi, et caput Medusae mihi refer."',en:'"Go from here, and bring me back the head of Medusa."',n:'<b>hinc</b> = from here; <b>abi</b> = go! (imperative of abire); <b>caput Medusae</b> = the head of Medusa (acc. + gen.); <b>refer</b> = bring back (imperative of referre)'}
]},
{ch:4,title:"IV. Perseus Gets His Outfit",subtitle:"Perseus arma accipit",
verses:[
{v:1,la:"Perseus ubi haec audivit, ex insula discessit, et postquam ad continentem venit, Medusam quaesivit.",en:"When Perseus heard these things, he left the island, and after he came to the mainland, he sought Medusa.",n:"<b>ubi</b> = when; <b>discessit</b> = departed (perfect); <b>continentem</b> = the mainland (acc.); <b>quaesivit</b> = sought (perfect). Spanish: <i>continente</i>"},
{v:2,la:"Diu frustra quaerebat; namque naturam loci ignorabat.",en:"For a long time he searched in vain; for he did not know the nature of the place.",n:"<b>diu</b> = for a long time; <b>frustra</b> = in vain; <b>naturam loci</b> = the nature of the place (acc. + gen.); <b>ignorabat</b> = did not know (imperfect). Spanish: <i>ignorar</i>"},
{v:3,la:"Tandem Apollo et Minerva viam demonstraverunt.",en:"At last Apollo and Minerva showed him the way.",n:"<b>tandem</b> = at last; <b>viam</b> = the way (acc.); <b>demonstraverunt</b> = showed (perfect). Spanish: <i>demostrar</i>"},
{v:4,la:"Primum ad Graeas, sorores Medusae, pervenit.",en:"First he reached the Graeae, the sisters of Medusa.",n:"<b>primum</b> = first (adverb); <b>sorores</b> = sisters (acc. pl.); <b>pervenit</b> = arrived at (perfect)"},
{v:5,la:"Ab his talaria et galeam magicam accepit.",en:"From them he received winged sandals and a magic helmet.",n:"<b>ab his</b> = from these (abl.); <b>talaria</b> = winged sandals (n. acc. pl.); <b>galeam magicam</b> = magic helmet (acc.); <b>accepit</b> = received (perfect)"},
{v:6,la:"Apollo autem et Minerva falcem et speculum dederunt.",en:"Apollo and Minerva, moreover, gave him a curved sword and a mirror.",n:"<b>falcem</b> = curved blade/sickle (acc.); <b>speculum</b> = mirror (acc.); <b>dederunt</b> = gave (perfect). Spanish: <i>espéculo/espejo</i>"},
{v:7,la:"Tum postquam talaria pedibus induit, in aera ascendit.",en:"Then, after he put the sandals on his feet, he rose into the air.",n:"<b>pedibus</b> = on his feet (dat.); <b>induit</b> = put on (perfect); <b>in aera</b> = into the air (acc.); <b>ascendit</b> = ascended (perfect). Spanish: <i>ascender</i>"},
{v:8,la:"Diu per aera volabat; tandem tamen ad eum locum venit ubi Medusa cum ceteris Gorgonibus habitabat.",en:"For a long time he flew through the air; at last, however, he came to that place where Medusa lived with the other Gorgons.",n:"<b>per aera</b> = through the air (acc.); <b>volabat</b> = was flying (imperfect); <b>eum locum</b> = that place (acc.); <b>ceteris Gorgonibus</b> = the other Gorgons (abl.)"},
{v:9,la:"Gorgones autem monstra erant specie horribili; capita enim earum anguibus omnino contecta erant.",en:"The Gorgons were monsters of horrible appearance; for their heads were entirely covered with snakes.",n:"<b>monstra</b> = monsters (n. nom. pl.); <b>specie horribili</b> = of horrible appearance (abl. of description); <b>capita</b> = heads (n. nom. pl.); <b>anguibus</b> = with snakes (abl.); <b>contecta erant</b> = were covered (pluperfect passive). Spanish: <i>horrible</i>, <i>serpiente/anguis</i>"},
{v:10,la:"Manus etiam ex aere factae erant.",en:"Their hands also were made of bronze.",n:"<b>manus</b> = hands (f. nom. pl., 4th decl.); <b>ex aere</b> = of/from bronze (abl.); <b>factae erant</b> = had been made (pluperfect passive)"}
]},
{ch:5,title:"V. The Gorgon's Head",subtitle:"Caput Gorgonis",
verses:[
{v:1,la:"Res difficillima erat caput Gorgonis abscidere; eius enim conspectu homines in saxum vertebantur.",en:"It was a most difficult task to cut off the Gorgon's head; for by the sight of her, men were turned to stone.",n:"<b>res difficillima</b> = a most difficult thing (superlative); <b>abscidere</b> = to cut off (infinitive); <b>conspectu</b> = by the sight (abl.); <b>in saxum</b> = into stone (acc.); <b>vertebantur</b> = were turned (imperfect passive). Spanish: <i>difícil</i>"},
{v:2,la:"Propter hanc causam Minerva speculum Perseo dederat.",en:"For this reason Minerva had given a mirror to Perseus.",n:"<b>propter hanc causam</b> = for this reason; <b>dederat</b> = had given (pluperfect)"},
{v:3,la:"Ille igitur tergum vertit, et in speculum inspiciebat; hoc modo ad locum venit ubi Medusa dormiebat.",en:"He therefore turned his back, and kept looking into the mirror; in this way he came to the place where Medusa was sleeping.",n:"<b>tergum vertit</b> = turned his back (idiom); <b>inspiciebat</b> = was looking into (imperfect); <b>hoc modo</b> = in this way; <b>dormiebat</b> = was sleeping (imperfect). Spanish: <i>inspeccionar</i>"},
{v:4,la:"Tum falce sua caput eius uno ictu abscidit.",en:"Then with his curved sword he cut off her head with one blow.",n:"<b>falce sua</b> = with his sickle/sword (abl.); <b>uno ictu</b> = with one blow (abl.); <b>abscidit</b> = cut off (perfect)"},
{v:5,la:"Ceterae Gorgones statim e somno excitatae sunt, et ubi rem viderunt, ira commotae sunt.",en:"The other Gorgons were immediately awakened from sleep, and when they saw the deed, they were stirred with anger.",n:"<b>e somno</b> = from sleep (abl.); <b>excitatae sunt</b> = were awakened (perfect passive); <b>ira commotae sunt</b> = were moved by anger (abl. of cause)"},
{v:6,la:"Arma rapuerunt, et Perseum occidere volebant.",en:"They seized their weapons, and wanted to kill Perseus.",n:"<b>rapuerunt</b> = seized (perfect); <b>occidere</b> = to kill (infinitive)"},
{v:7,la:"Ille autem dum fugit, galeam magicam induit; et ubi hoc fecit, statim e conspectu earum evasit.",en:"But he, while fleeing, put on the magic helmet; and when he did this, he immediately vanished from their sight.",n:"<b>dum fugit</b> = while he flees (present with dum); <b>galeam magicam induit</b> = put on the magic helmet; <b>e conspectu</b> = from the sight (abl.); <b>evasit</b> = escaped/vanished (perfect). Spanish: <i>evadir</i>"}
]},
{ch:6,title:"VI. The Sea-Serpent",subtitle:"Monstrum marinum",
verses:[
{v:1,la:"Post haec Perseus in finis Aethiopum venit.",en:"After these things Perseus came into the territory of the Ethiopians.",n:"<b>post haec</b> = after these things; <b>in finis</b> = into the territory (acc. pl.); <b>Aethiopum</b> = of the Ethiopians (gen. pl.)"},
{v:2,la:"Ibi Cepheus quidam illo tempore regnabat.",en:"There a certain Cepheus was ruling at that time.",n:"<b>quidam</b> = a certain (indefinite pronoun); <b>illo tempore</b> = at that time (abl.); <b>regnabat</b> = was ruling (imperfect). Spanish: <i>reinar</i>"},
{v:3,la:"Hic Neptunum, maris deum, olim offenderat; Neptunus autem monstrum saevissimum miserat.",en:"This man had once offended Neptune, god of the sea; Neptune, however, had sent a most savage monster.",n:"<b>offenderat</b> = had offended (pluperfect); <b>maris deum</b> = god of the sea (gen.); <b>saevissimum</b> = most savage (superlative). Spanish: <i>ofender</i>"},
{v:4,la:"Hoc cottidie e mari veniebat et homines devorabat.",en:"This monster came from the sea daily and devoured people.",n:"<b>cottidie</b> = daily; <b>e mari</b> = from the sea (abl.); <b>devorabat</b> = was devouring (imperfect). Spanish: <i>devorar</i>"},
{v:5,la:"Ob hanc causam pavor animos omnium occupaverat.",en:"Because of this, panic had seized the minds of all.",n:"<b>ob hanc causam</b> = because of this; <b>pavor</b> = panic/terror (m. nom.); <b>animos omnium</b> = the minds of all (acc. + gen.); <b>occupaverat</b> = had seized (pluperfect). Spanish: <i>pavor</i>, <i>ocupar</i>"},
{v:6,la:"Cepheus igitur oraculum dei Hammonis consuluit, atque a deo iussus est filiam monstro tradere.",en:"Cepheus therefore consulted the oracle of the god Hammon, and was ordered by the god to hand over his daughter to the monster.",n:"<b>consuluit</b> = consulted (perfect); <b>iussus est</b> = was ordered (perfect passive); <b>filiam monstro tradere</b> = to hand over his daughter to the monster (acc. + dat. + infinitive). Spanish: <i>consultar</i>"},
{v:7,la:"Eius autem filia, nomine Andromeda, virgo formosissima erat.",en:"His daughter, Andromeda by name, was a most beautiful maiden.",n:"<b>nomine</b> = by name (abl.); <b>virgo formosissima</b> = most beautiful maiden (superlative). Spanish: <i>virgen</i>"},
{v:8,la:"Cepheus ubi haec audivit, magnum dolorem percepit.",en:"When Cepheus heard these things, he felt great grief.",n:"<b>dolorem percepit</b> = felt grief (perfect). Spanish: <i>dolor</i>, <i>percibir</i>"},
{v:9,la:"Volebat tamen civis suos e tanto periculo extrahere, atque ob eam causam imperata Hammonis facere constituit.",en:"He wanted, however, to rescue his citizens from such great danger, and for this reason decided to carry out the commands of Hammon.",n:"<b>civis suos</b> = his citizens (acc. pl.); <b>e tanto periculo</b> = from such great danger (abl.); <b>extrahere</b> = to extract/rescue; <b>imperata</b> = commands (n. acc. pl. — perf. pass. participle used as noun). Spanish: <i>extraer</i>, <i>peligro</i>"}
]},
{ch:7,title:"VII. A Human Sacrifice",subtitle:"Sacrificium humanum",
verses:[
{v:1,la:"Tum rex diem certam dixit et omnia paravit.",en:"Then the king appointed a definite day and prepared everything.",n:"<b>diem certam</b> = a fixed day (acc. — dies is f. here); <b>dixit</b> = appointed/declared (perfect); <b>paravit</b> = prepared (perfect). Spanish: <i>preparar</i>"},
{v:2,la:"Ubi ea dies venit, Andromeda ad litus deducta est, et in conspectu omnium ad rupem adligata est.",en:"When that day came, Andromeda was led down to the shore, and was tied to a rock in the sight of all.",n:"<b>deducta est</b> = was led down (perfect passive); <b>in conspectu omnium</b> = in the sight of all (abl.); <b>ad rupem</b> = to a rock (acc.); <b>adligata est</b> = was tied (perfect passive)"},
{v:3,la:"Omnes fatum eius deplorabant, nec lacrimas tenebant.",en:"All were lamenting her fate, and could not hold back their tears.",n:"<b>fatum</b> = fate (acc.); <b>deplorabant</b> = were lamenting (imperfect); <b>lacrimas tenebant</b> = were holding back tears. Spanish: <i>deplorar</i>, <i>lágrimas</i>"},
{v:4,la:"At subito, dum monstrum exspectant, Perseus accurrit; et ubi lacrimas vidit, causam doloris quaerit.",en:"But suddenly, while they were waiting for the monster, Perseus ran up; and when he saw the tears, he asked the cause of their grief.",n:"<b>subito</b> = suddenly; <b>dum exspectant</b> = while they wait (present with dum); <b>accurrit</b> = ran up (perfect); <b>causam doloris</b> = the cause of grief (acc. + gen.). Spanish: <i>súbito</i>"},
{v:5,la:"Illi rem totam exponunt et puellam demonstrant.",en:"They explain the whole matter and point out the girl.",n:"<b>rem totam</b> = the whole matter (acc.); <b>exponunt</b> = they explain (historical present); <b>demonstrant</b> = they point out (historical present)"},
{v:6,la:"Dum haec geruntur, fremitus terribilis auditur; simul monstrum horribili specie procul conspicitur.",en:"While these things were happening, a terrible roar was heard; at the same time a monster of horrible appearance was seen in the distance.",n:"<b>dum geruntur</b> = while these things are carried on; <b>fremitus</b> = roar (m. nom.); <b>auditur</b> = is heard (present passive); <b>procul</b> = in the distance; <b>conspicitur</b> = is seen (present passive). Spanish: <i>terrible</i>"},
{v:7,la:"Eius conspectus timorem maximum omnibus iniecit.",en:"The sight of it cast the greatest fear upon all.",n:"<b>conspectus</b> = sight (m. nom.); <b>timorem maximum</b> = the greatest fear (acc. superlative); <b>iniecit</b> = threw upon/cast (perfect)"},
{v:8,la:"Monstrum magna celeritate ad litus contendit, iamque ad locum appropinquabat ubi puella stabat.",en:"The monster rushed to the shore with great speed, and was already approaching the place where the girl was standing.",n:"<b>magna celeritate</b> = with great speed (abl. of manner); <b>contendit</b> = rushed (perfect); <b>appropinquabat</b> = was approaching (imperfect); <b>stabat</b> = was standing (imperfect). Spanish: <i>celeridad</i>"}
]},
{ch:8,title:"VIII. The Rescue",subtitle:"Perseus Andromedam liberat",
verses:[
{v:1,la:"At Perseus ubi haec vidit, gladium suum eduxit, et postquam talaria induit, in aera sublatus est.",en:"But Perseus, when he saw these things, drew his sword, and after he put on the sandals, was lifted into the air.",n:"<b>gladium eduxit</b> = drew his sword (perfect); <b>sublatus est</b> = was lifted up (perfect passive — from tollere, irregular). Spanish: <i>gladio</i> → <i>espada</i>"},
{v:2,la:"Tum desuper in monstrum impetum subito fecit, et gladio suo collum eius graviter vulneravit.",en:"Then from above he suddenly made an attack on the monster, and with his sword seriously wounded its neck.",n:"<b>desuper</b> = from above; <b>impetum fecit</b> = made an attack (idiom); <b>graviter</b> = seriously; <b>vulneravit</b> = wounded (perfect). Spanish: <i>ímpetu</i>, <i>vulnerable</i>"},
{v:3,la:"Monstrum ubi sensit vulnus, fremitum horribilem edidit, et sine mora totum corpus in aquam mersit.",en:"When the monster felt the wound, it let out a horrible roar, and without delay plunged its whole body into the water.",n:"<b>sensit</b> = felt (perfect); <b>vulnus</b> = wound (n. acc.); <b>fremitum edidit</b> = let out a roar; <b>sine mora</b> = without delay; <b>mersit</b> = plunged (perfect). Spanish: <i>sentir</i>, <i>sin mora</i>"},
{v:4,la:"Perseus dum circum litus volat, reditum eius exspectabat.",en:"Perseus, while he flew around the shore, was waiting for its return.",n:"<b>circum litus</b> = around the shore (acc.); <b>volat</b> = flies (present with dum); <b>reditum</b> = return (acc.); <b>exspectabat</b> = was waiting (imperfect)"},
{v:5,la:"Mare autem interea undique sanguine inficitur.",en:"Meanwhile the sea was being stained with blood on all sides.",n:"<b>interea</b> = meanwhile; <b>undique</b> = on all sides; <b>sanguine</b> = with blood (abl.); <b>inficitur</b> = is stained (present passive). Spanish: <i>sangre</i>, <i>infectar</i>"},
{v:6,la:"Post breve tempus belua rursus caput sustulit; mox tamen a Perseo ictu graviore vulnerata est.",en:"After a short time the beast again raised its head; soon, however, it was wounded by Perseus with a heavier blow.",n:"<b>belua</b> = beast (f. nom.); <b>rursus</b> = again; <b>sustulit</b> = raised (perfect — irregular from tollere); <b>ictu graviore</b> = with a heavier blow (abl. comparative)"},
{v:7,la:"Tum iterum se in undas mersit, neque postea visa est.",en:"Then again it plunged into the waves, and was not seen afterward.",n:"<b>iterum</b> = again; <b>se mersit</b> = plunged itself (reflexive); <b>in undas</b> = into the waves (acc.); <b>neque postea</b> = and not afterward; <b>visa est</b> = was seen (perfect passive)"}
]},
{ch:9,title:"IX. The Reward of Valor",subtitle:"Praemium virtutis",
verses:[
{v:1,la:"Perseus postquam ad litus descendit, primum talaria exuit; tum ad rupem venit ubi Andromeda vincta erat.",en:"After Perseus came down to the shore, he first took off the sandals; then he came to the rock where Andromeda was bound.",n:"<b>descendit</b> = came down (perfect); <b>exuit</b> = took off (perfect); <b>vincta erat</b> = was bound (pluperfect passive). Spanish: <i>descender</i>"},
{v:2,la:"Ea autem omnem spem salutis deposuerat, et ubi Perseus adiit, terrore paene exanimata erat.",en:"She, however, had given up all hope of safety, and when Perseus approached, she was almost lifeless with terror.",n:"<b>omnem spem salutis</b> = all hope of safety (acc. + gen.); <b>deposuerat</b> = had laid down/given up (pluperfect); <b>terrore</b> = with terror (abl.); <b>paene exanimata</b> = almost lifeless. Spanish: <i>depositar</i>, <i>terror</i>"},
{v:3,la:"Ille vincula statim solvit, et puellam patri reddidit.",en:"He immediately loosened the bonds, and restored the girl to her father.",n:"<b>vincula</b> = bonds (n. acc. pl.); <b>solvit</b> = loosened (perfect); <b>patri</b> = to her father (dat.); <b>reddidit</b> = gave back (perfect). Spanish: <i>soltar/solver</i>"},
{v:4,la:"Cepheus ob hanc rem maximo gaudio adfectus est.",en:"Cepheus was affected with the greatest joy because of this.",n:"<b>ob hanc rem</b> = because of this; <b>maximo gaudio</b> = with the greatest joy (abl.); <b>adfectus est</b> = was affected (perfect passive). Spanish: <i>gozo/gaudio</i>"},
{v:5,la:"Meritam gratiam pro tanto beneficio Perseo rettulit; praeterea Andromedam ipsam ei in matrimonium dedit.",en:"He rendered deserved thanks to Perseus for so great a service; moreover, he gave Andromeda herself to him in marriage.",n:"<b>meritam gratiam</b> = deserved thanks (acc.); <b>rettulit</b> = rendered/gave back (perfect of referre); <b>praeterea</b> = moreover; <b>in matrimonium dedit</b> = gave in marriage. Spanish: <i>mérito</i>, <i>gratitud</i>"},
{v:6,la:"Ille libenter hoc donum accepit et puellam duxit.",en:"He gladly accepted this gift and married the girl.",n:"<b>libenter</b> = gladly; <b>duxit</b> = married (literally: led — idiom for marriage)"},
{v:7,la:"Paucos annos cum uxore sua in ea regione habitabat, et in magno honore erat apud omnis Aethiopes.",en:"For a few years he lived with his wife in that region, and was in great honor among all the Ethiopians.",n:"<b>paucos annos</b> = for a few years (acc. of duration); <b>cum uxore sua</b> = with his wife (abl.); <b>in magno honore</b> = in great honor (abl.); <b>apud omnis</b> = among all (+ acc.). Spanish: <i>honor</i>"},
{v:8,la:"Magnopere tamen matrem suam rursus videre cupiebat.",en:"He greatly desired, however, to see his mother again.",n:"<b>magnopere</b> = greatly; <b>rursus</b> = again; <b>videre</b> = to see (infinitive); <b>cupiebat</b> = was desiring (imperfect)"},
{v:9,la:"Tandem igitur cum uxore sua e regno Cephei discessit.",en:"At last, therefore, he departed with his wife from the kingdom of Cepheus.",n:"<b>tandem</b> = at last; <b>e regno Cephei</b> = from the kingdom of Cepheus (abl. + gen.); <b>discessit</b> = departed (perfect)"}
]},
{ch:10,title:"X. Polydectes Is Turned to Stone",subtitle:"Polydectes in saxum vertitur",
verses:[
{v:1,la:"Postquam Perseus ad insulam navem appulit, se ad locum contulit ubi mater olim habitaverat, sed domum invenit vacuam et omnino desertam.",en:"After Perseus brought his ship to the island, he made his way to the place where his mother had once lived, but found the house empty and completely deserted.",n:"<b>navem appulit</b> = brought the ship to shore (perfect); <b>se contulit</b> = betook himself (idiom: went); <b>habitaverat</b> = had lived (pluperfect); <b>vacuam et desertam</b> = empty and deserted (acc. adj.). Spanish: <i>desertado</i>"},
{v:2,la:"Tris dies per totam insulam matrem quaerebat; tandem quarto die ad templum Dianae pervenit.",en:"For three days he searched for his mother throughout the whole island; at last on the fourth day he reached the temple of Diana.",n:"<b>tris dies</b> = for three days (acc. of duration); <b>per totam insulam</b> = through the whole island; <b>quarto die</b> = on the fourth day (abl.)"},
{v:3,la:"Huc Danae refugerat, quod Polydectem timebat.",en:"Danae had fled here, because she feared Polydectes.",n:"<b>huc</b> = to here; <b>refugerat</b> = had fled (pluperfect); <b>quod</b> = because"},
{v:4,la:"Perseus ubi haec cognovit, ira magna commotus est; ad regiam Polydectis sine mora contendit, et ubi eo venit, statim in atrium inrupit.",en:"When Perseus learned these things, he was moved with great anger; he rushed to the palace of Polydectes without delay, and when he arrived there, burst into the hall at once.",n:"<b>cognovit</b> = learned (perfect); <b>ira magna commotus est</b> = was moved by great anger (abl.); <b>regiam</b> = palace (acc.); <b>inrupit</b> = burst in (perfect). Spanish: <i>irrumpir</i>"},
{v:5,la:"Polydectes magno timore adfectus est et fugere volebat.",en:"Polydectes was seized with great fear and wanted to flee.",n:"<b>magno timore adfectus est</b> = was affected with great fear (abl.)"},
{v:6,la:"Dum tamen ille fugit, Perseus caput Medusae monstravit; ille autem simul atque hoc vidit, in saxum versus est.",en:"While he was fleeing, however, Perseus showed the head of Medusa; and as soon as he saw it, he was turned to stone.",n:"<b>monstravit</b> = showed (perfect); <b>simul atque</b> = as soon as; <b>in saxum versus est</b> = was turned into stone (perfect passive). Spanish: <i>monstrar/mostrar</i>"}
]},
{ch:11,title:"XI. The Oracle Fulfilled",subtitle:"Oraculum impletur",
verses:[
{v:1,la:"Post haec Perseus cum uxore sua ad urbem Acrisii rediit.",en:"After these things Perseus returned with his wife to the city of Acrisius.",n:"<b>ad urbem Acrisii</b> = to the city of Acrisius (acc. + gen.); <b>rediit</b> = returned (perfect of redire)"},
{v:2,la:"Ille autem ubi Perseum vidit, magno terrore adfectus est; nam propter oraculum istud nepotem suum adhuc timebat.",en:"He, however, when he saw Perseus, was seized with great terror; for on account of that oracle he still feared his grandson.",n:"<b>istud</b> = that (slightly contemptuous demonstrative); <b>adhuc</b> = still. Spanish: <i>terror</i>"},
{v:3,la:"In Thessaliam igitur ad urbem Larisam statim refugit, frustra tamen; neque enim fatum suum vitavit.",en:"He therefore fled immediately to the city of Larisa in Thessaly, but in vain; for he did not escape his fate.",n:"<b>frustra</b> = in vain; <b>neque enim</b> = for... not; <b>fatum suum</b> = his fate (acc.); <b>vitavit</b> = avoided/escaped (perfect). Spanish: <i>fatum → hado/fato</i>, <i>evitar</i>"},
{v:4,la:"Post paucos annos rex Larisae ludos magnos fecit; nuntios in omnis partis dimiserat et diem edixerat.",en:"After a few years the king of Larisa held great games; he had sent messengers in all directions and had proclaimed the day.",n:"<b>ludos magnos fecit</b> = held great games (perfect); <b>nuntios dimiserat</b> = had sent out messengers (pluperfect); <b>diem edixerat</b> = had proclaimed the day (pluperfect)"},
{v:5,la:"Multi ex omnibus urbibus Graeciae ad ludos convenerunt.",en:"Many came together from all the cities of Greece for the games.",n:"<b>ex omnibus urbibus</b> = from all the cities (abl.); <b>Graeciae</b> = of Greece (gen.); <b>convenerunt</b> = came together (perfect). Spanish: <i>convenir</i>"},
{v:6,la:"Ipse Perseus inter alios certamen discorum iniit.",en:"Perseus himself entered the discus-throwing contest among the others.",n:"<b>ipse</b> = himself (intensive pronoun); <b>certamen discorum</b> = the contest of discuses (acc. + gen.); <b>iniit</b> = entered (perfect of inire)"},
{v:7,la:"At dum discum conicit, avum suum casu occidit; Acrisius enim inter spectatores eius certaminis forte stabat.",en:"But while he was throwing the discus, he killed his grandfather by accident; for Acrisius happened to be standing among the spectators of that contest.",n:"<b>dum conicit</b> = while he throws (present with dum); <b>casu</b> = by chance/accident (abl.); <b>occidit</b> = killed (perfect); <b>spectatores</b> = spectators (acc. pl.); <b>forte</b> = by chance (adverb). Spanish: <i>caso</i>, <i>espectadores</i>"}
]}
]}
];

function renderFabulae(){
  const story=FABULAE_STORIES[S.fabStory];
  const ch=story.chapters[S.fabChapter];
  const fz=S.fabFontSize||1;
  const fontStyle="font-size:"+(fz)+"em";

  const storySelector=FABULAE_STORIES.length>1?
    '<div class="toggle-row">'+FABULAE_STORIES.map((s,i)=>'<button class="toggle-btn '+(S.fabStory===i?'active':'')+'" data-fabstory="'+i+'">'+s.title+'</button>').join('')+'</div>':'';

  const introHtml='<div style="background:var(--gold-08);border:1px solid var(--gold-border);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:0.88rem;color:var(--brown-soft);line-height:1.6"><b>Background:</b> '+story.intro+'</div>';

  const fabKey=story.id+":"+S.fabChapter;
  const chapterNav='<div id="fab-ch-nav" class="scripture-nav">'+story.chapters.map((c,i)=>{const key=story.id+":"+i;const read=(S.readFabChapters||[]).includes(key);return '<button class="scripture-nav-btn fab-ch-btn '+(S.fabChapter===i?'active':'')+'" data-fabch="'+i+'">'+(read?'\u2713 ':'')+c.ch+'</button>';}).join('')+'</div>';

  const verses=ch.verses.map(v=>{
    const words=v.la.split(/\b/).map(w=>/[a-zA-ZāēīōūÀ-ÿ]{2,}/.test(w)?'<span class="word-tap" data-word="'+w+'">'+w+'</span>':w).join('');
    return '<div class="il-line"><div class="il-latin"><span class="verse-num">'+v.v+'</span>'+words+'</div><div class="il-english">'+v.en+'</div>'+(v.n?'<div class="il-note">'+v.n+'</div>':'')+'</div>';
  }).join('');

  const prevNext='<div style="display:flex;justify-content:space-between;margin-top:20px">'
    +(S.fabChapter>0?'<button class="next-btn" id="fab-prev">\u2190 '+story.chapters[S.fabChapter-1].title.split('.')[0]+'.</button>':'<div></div>')
    +(S.fabChapter<story.chapters.length-1?'<button class="next-btn" id="fab-next">'+story.chapters[S.fabChapter+1].title.split('.')[0]+'. \u2192</button>':'<div></div>')
    +'</div>';

  $("view-fabulae").innerHTML=
    ST("Fabulae Faciles \u2014 Easy Stories")+
    storySelector+
    introHtml+
    '<div class="font-controls"><button class="font-btn" id="fab-font-down">A\u2212</button><span class="font-label">Text Size</span><button class="font-btn" id="fab-font-up">A+</button></div>'+
    chapterNav+
    '<div class="chapter-title">'+ch.title+'</div>'+
    '<div class="chapter-subtitle">'+ch.subtitle+'</div>'+
    '<p class="instructions">Tap any Latin word to see its definition. Grammar notes appear below each verse.</p>'+
    '<div class="interlinear" style="'+fontStyle+'">'+verses+'</div>'+
    prevNext+
    '<div class="lesson-complete-row"><button class="complete-lesson-btn '+((S.readFabChapters||[]).includes(story.id+":"+S.fabChapter)?'completed':'')+'" id="fab-mark-read">'+((S.readFabChapters||[]).includes(story.id+":"+S.fabChapter)?'\u2713 Chapter Read':'Mark Chapter as Read')+'</button></div>'+
    '<div style="margin-top:28px;padding:14px;background:var(--gold-08);border-radius:10px;font-size:0.8rem;color:var(--brown-muted);text-align:center">Source: <i>Fabulae Faciles</i> by Francis Ritchie (1903) \u2014 Public Domain via Project Gutenberg</div>';

  // Event listeners
  document.querySelectorAll("[data-fabstory]").forEach(b=>b.addEventListener("click",()=>{S.fabStory=parseInt(b.dataset.fabstory);S.fabChapter=0;saveState();renderFabulae();scrollToEl("fab-ch-nav");}));
  document.querySelectorAll(".fab-ch-btn").forEach(b=>b.addEventListener("click",()=>{S.fabChapter=parseInt(b.dataset.fabch);saveState();renderFabulae();scrollToEl("fab-ch-nav");}));
  document.querySelectorAll("#view-fabulae .word-tap").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();showWordPanel(el.dataset.word,e);}));
  const fu=document.getElementById("fab-font-up"),fd=document.getElementById("fab-font-down");
  if(fu)fu.addEventListener("click",()=>{S.fabFontSize=Math.min((S.fabFontSize||1)+0.1,1.5);saveState();renderFabulae();});
  if(fd)fd.addEventListener("click",()=>{S.fabFontSize=Math.max((S.fabFontSize||1)-0.1,0.7);saveState();renderFabulae();});
  const fp=document.getElementById("fab-prev"),fn_btn=document.getElementById("fab-next");
  const markBtn=document.getElementById("fab-mark-read");if(markBtn)markBtn.addEventListener("click",()=>{if(!S.readFabChapters)S.readFabChapters=[];const key=FABULAE_STORIES[S.fabStory].id+":"+S.fabChapter;if(S.readFabChapters.includes(key))S.readFabChapters=S.readFabChapters.filter(x=>x!==key);else{S.readFabChapters.push(key);playAchievement();haptic('success');}saveState();renderFabulae();});
  if(fp)fp.addEventListener("click",()=>{S.fabChapter--;saveState();renderFabulae();scrollToEl("fab-ch-nav");});
  if(fn_btn)fn_btn.addEventListener("click",()=>{S.fabChapter++;saveState();renderFabulae();scrollToEl("fab-ch-nav");});
}

// Merge FABULAE_FORMS into LATIN_FORMS
Object.assign(LATIN_FORMS, FABULAE_FORMS, PSALMS_FORMS, EXTRA_FABULAE_FORMS);

renderNav();renderHome();
</script>
