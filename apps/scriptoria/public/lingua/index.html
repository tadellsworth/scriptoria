{v:44,la:"Et statim prodiit qui fuerat mortuus, ligatus pedes et manus institis, et facies illius sudario erat ligata. Dixit eis Iesus: Solvite eum et sinite abire.",en:"The man who had died came out, his hands and feet bound with linen strips, and his face wrapped with a cloth. Jesus said to them: Unbind him, and let him go.",n:"<b>prodiit</b> = he came forth (perfect); <b>qui fuerat mortuus</b> = who had been dead (pluperfect); <b>ligatus</b> = bound (perf. passive participle); <b>institis</b> = abl. pl. (with bandages/linen strips); <b>sudario</b> = abl. (with a cloth); <b>ligata</b> = bound (f.); <b>solvite</b> = unbind! (2nd pl. imperative); <b>sinite abire</b> = let him go (sinere + infinitive)"},
{v:45,la:"Multi ergo ex Iudaeis, qui venerant ad Mariam et viderant quae fecit, crediderunt in eum.",en:"Many of the Jews therefore, who had come with Mary and had seen what he did, believed in him.",n:"<b>multi ex Iudaeis</b> = many of the Jews (partitive); <b>qui venerant</b> = who had come (pluperfect); <b>viderant</b> = had seen (pluperfect); <b>quae fecit</b> = what he did (relative + perfect); <b>crediderunt</b> = they believed (perfect)"},
]},

{ch:12,title:"The Triumphal Entry",subtitle:"Anointing at Bethany; palm branches; the grain of wheat; the hour has come",verses:[
{v:1,la:"Iesus ergo ante sex dies Paschae venit Bethaniam, ubi Lazarus fuerat mortuus, quem suscitavit Iesus.",en:"Six days before the Passover, Jesus came to Bethany, where Lazarus was, whom Jesus had raised from the dead.",n:"<b>ante sex dies</b> = before six days (acc.); <b>Paschae</b> = gen. (of Passover); <b>fuerat mortuus</b> = had been dead (pluperfect); <b>quem suscitavit</b> = whom he had raised (acc. + perfect)"},
{v:3,la:"Maria ergo accepit libram unguenti nardi pistici pretiosi, et unxit pedes Iesu et extersit pedes eius capillis suis; et domus impleta est ex odore unguenti.",en:"Mary therefore took a pound of expensive ointment of pure nard and anointed the feet of Jesus and wiped his feet with her hair. The house was filled with the fragrance of the perfume.",n:"<b>libram</b> = acc. (a pound); <b>unguenti</b> = gen. (of ointment); <b>nardi pistici</b> = gen. (of pure nard); <b>pretiosi</b> = gen. adj. (precious, expensive); <b>unxit</b> = she anointed (perfect); <b>extersit</b> = she wiped (perfect); <b>capillis suis</b> = with her hair (abl.); <b>impleta est</b> = was filled (perfect passive); <b>ex odore</b> = with the fragrance (abl.)"},
{v:12,la:"In crastinum autem turba multa quae venerat ad diem festum, cum audissent quia venit Iesus Hierosolymam,",en:"The next day the large crowd that had come to the feast heard that Jesus was coming to Jerusalem.",n:"<b>in crastinum</b> = on the next day; <b>turba multa</b> = a great crowd (nom.); <b>quae venerat</b> = which had come (pluperfect); <b>cum audissent</b> = when they had heard (pluperfect subjunctive)"},
{v:13,la:"acceperunt ramos palmarum et processerunt obviam ei et clamabant: Hosanna! Benedictus qui venit in nomine Domini, Rex Israel!",en:"they took branches of palm trees and went out to meet him, crying out: Hosanna! Blessed is he who comes in the name of the Lord, even the King of Israel!",n:"<b>ramos palmarum</b> = branches of palms (acc. + gen.); <b>processerunt</b> = they went out (perfect); <b>obviam ei</b> = to meet him (dat.); <b>clamabant</b> = they were crying out (imperfect); <b>Hosanna</b> = Hebrew: Save us!; <b>benedictus qui venit</b> = blessed is he who comes (nom. + relative + present)"},
{v:15,la:"Noli timere, filia Sion: ecce rex tuus venit, sedens super pullum asinae.",en:"Fear not, daughter of Zion; behold, your king is coming, sitting on a donkey's colt!",n:"<b>noli timere</b> = do not fear (negative imperative); <b>filia Sion</b> = daughter of Zion (voc.); <b>rex tuus</b> = your king (nom.); <b>sedens</b> = sitting (present participle); <b>super pullum asinae</b> = upon the colt of a donkey (acc. + gen.)"},
{v:23,la:"Iesus autem respondit eis dicens: Venit hora ut glorificetur Filius hominis.",en:"And Jesus answered them: The hour has come for the Son of Man to be glorified.",n:"<b>venit hora</b> = the hour has come (perfect); <b>ut glorificetur</b> = that he may be glorified (purpose + passive subjunctive); <b>Filius hominis</b> = the Son of Man (nom. + gen.)"},
{v:24,la:"Amen, amen dico vobis, nisi granum frumenti cadens in terram mortuum fuerit, ipsum solum manet; si autem mortuum fuerit, multum fructum affert.",en:"Amen, amen, I say to you, unless a grain of wheat falls into the earth and dies, it remains alone; but if it dies, it bears much fruit.",n:"<b>granum frumenti</b> = a grain of wheat (nom. + gen.); <b>cadens in terram</b> = falling into the earth (present participle + acc.); <b>mortuum fuerit</b> = shall have died (future perfect); <b>ipsum solum manet</b> = it alone remains; <b>multum fructum affert</b> = it bears much fruit"},
{v:25,la:"Qui amat animam suam perdet eam; et qui odit animam suam in hoc mundo, in vitam aeternam custodit eam.",en:"Whoever loves his life loses it, and whoever hates his life in this world will keep it for eternal life.",n:"<b>qui amat</b> = whoever loves; <b>animam suam</b> = his own soul/life (acc.); <b>perdet</b> = will lose (future); <b>qui odit</b> = whoever hates; <b>custodit</b> = guards/keeps (present)"},
{v:26,la:"Si quis mihi ministrat, me sequatur; et ubi sum ego, illic et minister meus erit. Si quis mihi ministraverit, honorificabit eum Pater.",en:"If anyone serves me, he must follow me; and where I am, there will my servant be also. If anyone serves me, the Father will honor him.",n:"<b>ministrat</b> = serves (present); <b>me sequatur</b> = let him follow me (jussive subjunctive); <b>ubi sum ego</b> = where I am; <b>illic</b> = there; <b>minister meus</b> = my servant (nom.); <b>ministraverit</b> = will have served (future perfect); <b>honorificabit</b> = will honor (future)"},
{v:27,la:"Nunc anima mea turbata est. Et quid dicam? Pater, salvifica me ex hac hora? Sed propterea veni in horam hanc.",en:"Now is my soul troubled. And what shall I say? Father, save me from this hour? But for this purpose I have come to this hour.",n:"<b>anima mea</b> = my soul (nom.); <b>turbata est</b> = is troubled (perfect passive); <b>quid dicam</b> = what shall I say? (deliberative subjunctive); <b>salvifica me</b> = save me (imperative); <b>ex hac hora</b> = from this hour (abl.); <b>propterea</b> = for this reason"},
{v:31,la:"Nunc iudicium est mundi; nunc princeps huius mundi eicietur foras.",en:"Now is the judgment of this world; now will the ruler of this world be cast out.",n:"<b>iudicium est mundi</b> = is the judgment of the world; <b>princeps huius mundi</b> = the ruler of this world (nom. + gen.); <b>eicietur foras</b> = will be cast out (future passive)"},
{v:32,la:"Et ego, si exaltatus fuero a terra, omnia traham ad meipsum.",en:"And I, when I am lifted up from the earth, will draw all people to myself.",n:"<b>si exaltatus fuero</b> = when/if I am lifted up (future perfect passive); <b>a terra</b> = from the earth (abl.); <b>omnia</b> = all things/people (acc.); <b>traham</b> = I will draw (future); <b>ad meipsum</b> = to myself"},
{v:35,la:"Dixit ergo eis Iesus: Adhuc modicum lumen in vobis est. Ambulate dum lucem habetis, ut non vos tenebrae comprehendant. Et qui ambulat in tenebris nescit quo vadat.",en:"So Jesus said to them: The light is among you for a little while longer. Walk while you have the light, lest darkness overtake you. The one who walks in darkness does not know where he is going.",n:"<b>modicum</b> = a little while; <b>lumen</b> = n. nom. (light); <b>in vobis est</b> = is among you; <b>ambulate</b> = walk! (2nd pl. imperative); <b>dum</b> = while; <b>ut non ... comprehendant</b> = lest ... overtake (negative purpose + subjunctive); <b>quo vadat</b> = where he goes (indirect question + subjunctive)"},
{v:46,la:"Ego lux in mundum veni, ut omnis qui credit in me in tenebris non maneat.",en:"I have come into the world as light, so that whoever believes in me may not remain in darkness.",n:"<b>ego lux ... veni</b> = I have come as light (predicate nom.); <b>ut ... non maneat</b> = so that he may not remain (purpose + subjunctive); <b>in tenebris</b> = in darkness (abl.)"},
]},

{ch:13,title:"The Last Supper",subtitle:"Jesus washes the disciples' feet; the new commandment; Judas' betrayal foretold",verses:[
{v:1,la:"Ante diem festum Paschae, sciens Iesus quia venit hora eius ut transeat ex hoc mundo ad Patrem, cum dilexisset suos qui erant in mundo, in finem dilexit eos.",en:"Before the feast of the Passover, when Jesus knew that his hour had come to depart out of this world to the Father, having loved his own who were in the world, he loved them to the end.",n:"<b>ante diem festum</b> = before the feast day (acc.); <b>sciens</b> = knowing (present participle); <b>ut transeat</b> = that he should pass over (purpose + subjunctive); <b>cum dilexisset</b> = since he had loved (pluperfect subjunctive with cum); <b>suos</b> = his own (acc. pl.); <b>in finem</b> = to the end / completely"},
{v:4,la:"Surgit a cena et ponit vestimenta sua, et cum accepisset linteum, praecinxit se.",en:"He rose from supper and laid aside his outer garments, and taking a towel, tied it around his waist.",n:"<b>surgit</b> = historical present (rises); <b>a cena</b> = from supper (abl.); <b>ponit</b> = lays aside; <b>vestimenta</b> = acc. pl. (garments); <b>linteum</b> = acc. (towel/linen cloth); <b>praecinxit se</b> = girded himself (perfect reflexive)"},
{v:5,la:"Deinde mittit aquam in pelvim et coepit lavare pedes discipulorum et extergere linteo quo erat praecinctus.",en:"Then he poured water into a basin and began to wash the disciples' feet and to wipe them with the towel that was wrapped around him.",n:"<b>mittit</b> = historical present (pours); <b>pelvim</b> = acc. (basin); <b>coepit</b> = perfect (began); <b>lavare</b> = to wash (infinitive); <b>pedes</b> = acc. pl. (feet, 3rd decl.); <b>extergere</b> = to wipe dry; <b>quo</b> = with which (abl. relative)"},
{v:8,la:"Dicit ei Petrus: Non lavabis mihi pedes in aeternum. Respondit Iesus ei: Si non lavero te, non habebis partem mecum.",en:"Peter said to him: You shall never wash my feet. Jesus answered him: If I do not wash you, you have no share with me.",n:"<b>non lavabis</b> = you will not wash (future — emphatic refusal); <b>in aeternum</b> = ever/forever; <b>si non lavero</b> = if I do not wash (future perfect); <b>partem</b> = acc. (part/share); <b>mecum</b> = with me"},
{v:14,la:"Si ergo ego lavi pedes vestros, Dominus et Magister, et vos debetis alter alterius lavare pedes.",en:"If I then, your Lord and Teacher, have washed your feet, you also ought to wash one another's feet.",n:"<b>si ... lavi</b> = if I washed (perfect); <b>pedes vestros</b> = your feet (acc.); <b>Dominus et Magister</b> = Lord and Teacher (nom. — apposition); <b>debetis</b> = you ought (2nd pl.); <b>alter alterius</b> = of one another (gen. reciprocal)"},
{v:21,la:"Cum haec dixisset Iesus, turbatus est spiritu, et protestatus est et dixit: Amen, amen dico vobis, quia unus ex vobis tradet me.",en:"After saying these things, Jesus was troubled in his spirit, and testified: Amen, amen, I say to you, one of you will betray me.",n:"<b>turbatus est</b> = was troubled (perfect passive/deponent); <b>spiritu</b> = abl. (in spirit); <b>protestatus est</b> = perfect deponent (testified); <b>unus ex vobis</b> = one of you (partitive); <b>tradet</b> = future (will betray/hand over)"},
{v:34,la:"Mandatum novum do vobis: ut diligatis invicem; sicut dilexi vos, ut et vos diligatis invicem.",en:"A new commandment I give to you, that you love one another: just as I have loved you, you also are to love one another.",n:"<b>mandatum novum</b> = new commandment (acc.); <b>ut diligatis</b> = that you love (purpose + subjunctive); <b>invicem</b> = one another (reciprocal adverb); <b>sicut dilexi vos</b> = just as I loved you (perfect)"},
{v:35,la:"In hoc cognoscent omnes quia mei estis discipuli, si dilectionem habueritis ad invicem.",en:"By this all people will know that you are my disciples, if you have love for one another.",n:"<b>in hoc</b> = by this; <b>cognoscent</b> = future (will know); <b>mei ... discipuli</b> = my disciples (nom. pl.); <b>dilectionem</b> = acc. (love); <b>habueritis</b> = future perfect (you shall have had); <b>ad invicem</b> = toward one another"},
]},
{ch:14,title:"The Way, the Truth, and the Life",subtitle:"Many rooms; Jesus the way to the Father; promise of the Holy Spirit",verses:[
{v:1,la:"Non turbetur cor vestrum. Creditis in Deum, et in me credite.",en:"Let not your hearts be troubled. You believe in God; believe also in me.",n:"<b>non turbetur</b> = let it not be troubled (negative jussive subjunctive passive); <b>cor vestrum</b> = your heart (nom.); <b>creditis</b> = you believe (indicative); <b>credite</b> = believe! (imperative)"},
{v:2,la:"In domo Patris mei mansiones multae sunt; si quo minus, dixissem vobis, quia vado parare vobis locum.",en:"In my Father's house are many rooms. If it were not so, would I have told you that I go to prepare a place for you?",n:"<b>domo</b> = abl. of domus (in the house — irregular 4th decl.); <b>Patris mei</b> = of my Father (gen.); <b>mansiones multae</b> = many dwelling places (nom. pl.); <b>si quo minus</b> = if otherwise; <b>dixissem</b> = pluperfect subjunctive (I would have said); <b>vado</b> = I go; <b>parare</b> = to prepare"},
{v:6,la:"Dicit ei Iesus: Ego sum via et veritas et vita; nemo venit ad Patrem nisi per me.",en:"Jesus said to him: I am the way, and the truth, and the life. No one comes to the Father except through me.",n:"<b>ego sum via et veritas et vita</b> = I am the way and the truth and the life — triple predicate nominative; <b>nemo venit</b> = no one comes; <b>nisi per me</b> = except through me (acc.)"},
{v:9,la:"Dicit ei Iesus: Tanto tempore vobiscum sum, et non cognovistis me? Philippe, qui videt me, videt et Patrem.",en:"Jesus said to him: Have I been with you so long, and you still do not know me, Philip? Whoever has seen me has seen the Father.",n:"<b>tanto tempore</b> = for so long a time (abl. of duration); <b>vobiscum</b> = with you; <b>cognovistis</b> = 2nd pl. perfect (you have known); <b>qui videt me</b> = whoever sees me; <b>videt et Patrem</b> = sees also the Father"},
{v:13,la:"Et quodcumque petieritis in nomine meo, hoc faciam, ut glorificetur Pater in Filio.",en:"Whatever you ask in my name, this I will do, that the Father may be glorified in the Son.",n:"<b>quodcumque</b> = whatever (neut. acc.); <b>petieritis</b> = future perfect (you shall have asked); <b>in nomine meo</b> = in my name (abl.); <b>hoc faciam</b> = this I will do (future); <b>ut glorificetur</b> = purpose + passive subjunctive (that he may be glorified)"},
{v:15,la:"Si diligitis me, mandata mea servate.",en:"If you love me, you will keep my commandments.",n:"<b>si diligitis</b> = if you love (present indicative — real condition); <b>mandata mea</b> = my commandments (acc. pl.); <b>servate</b> = keep! (2nd pl. imperative)"},
{v:16,la:"Et ego rogabo Patrem, et alium Paraclitum dabit vobis, ut maneat vobiscum in aeternum,",en:"And I will ask the Father, and he will give you another Helper, to be with you forever,",n:"<b>rogabo</b> = future (I will ask); <b>alium Paraclitum</b> = another Advocate/Helper (acc. — Greek loanword); <b>dabit</b> = future (will give); <b>ut maneat</b> = purpose + subjunctive (that he may remain); <b>in aeternum</b> = forever"},
{v:23,la:"Respondit Iesus et dixit ei: Si quis diligit me, sermonem meum servabit, et Pater meus diliget eum, et ad eum veniemus et mansionem apud eum faciemus.",en:"Jesus answered him: If anyone loves me, he will keep my word, and my Father will love him, and we will come to him and make our home with him.",n:"<b>si quis diligit</b> = if anyone loves; <b>sermonem meum</b> = my word (acc.); <b>servabit</b> = future (will keep); <b>diliget</b> = future (will love); <b>veniemus</b> = future (we will come); <b>mansionem ... faciemus</b> = we will make a dwelling (future)"},
{v:26,la:"Paraclitus autem Spiritus Sanctus, quem mittet Pater in nomine meo, ille vos docebit omnia et suggeret vobis omnia quaecumque dixero vobis.",en:"But the Helper, the Holy Spirit, whom the Father will send in my name, he will teach you all things and bring to your remembrance all that I have said to you.",n:"<b>quem mittet</b> = whom the Father will send (acc. relative + future); <b>ille</b> = that one / he (emphatic nom.); <b>docebit</b> = future (will teach); <b>suggeret</b> = future (will suggest/remind); <b>quaecumque dixero</b> = whatever I shall have said (future perfect)"},
{v:27,la:"Pacem relinquo vobis, pacem meam do vobis; non quomodo mundus dat ego do vobis. Non turbetur cor vestrum neque formidet.",en:"Peace I leave with you; my peace I give to you. Not as the world gives do I give to you. Let not your hearts be troubled, neither let them be afraid.",n:"<b>pacem</b> = acc. (peace); <b>relinquo</b> = I leave (present); <b>non quomodo</b> = not as/in the way that; <b>mundus dat</b> = the world gives; <b>non turbetur</b> = let it not be troubled (jussive subjunctive); <b>neque formidet</b> = nor let it fear"},
]},

{ch:15,title:"The True Vine",subtitle:"Abiding in Christ; love one another; the world's hatred",verses:[
{v:1,la:"Ego sum vitis vera, et Pater meus agricola est.",en:"I am the true vine, and my Father is the vinedresser.",n:"<b>vitis vera</b> = true vine (nom. f.); <b>agricola</b> = nom. (farmer/vinedresser — 1st decl. masculine! One of those -a nouns that is male)"},
{v:4,la:"Manete in me, et ego in vobis. Sicut palmes non potest ferre fructum a semetipso nisi manserit in vite, sic nec vos nisi in me manseritis.",en:"Abide in me, and I in you. As the branch cannot bear fruit by itself unless it abides in the vine, neither can you unless you abide in me.",n:"<b>manete</b> = 2nd pl. imperative (abide!); <b>palmes</b> = nom. (branch, 3rd decl.); <b>ferre fructum</b> = to bear fruit; <b>a semetipso</b> = from itself (abl. emphatic reflexive); <b>nisi manserit</b> = unless it remains (future perfect)"},
{v:5,la:"Ego sum vitis, vos palmites. Qui manet in me et ego in eo, hic fert fructum multum, quia sine me nihil potestis facere.",en:"I am the vine; you are the branches. Whoever abides in me and I in him, he it is that bears much fruit, for apart from me you can do nothing.",n:"<b>vos palmites</b> = you [are] the branches (nom. pl.); <b>qui manet</b> = whoever abides; <b>hic fert</b> = this one bears; <b>fructum multum</b> = much fruit (acc.); <b>sine me</b> = without me (abl.); <b>nihil potestis facere</b> = you can do nothing"},
{v:9,la:"Sicut dilexit me Pater, et ego dilexi vos; manete in dilectione mea.",en:"As the Father has loved me, so have I loved you. Abide in my love.",n:"<b>sicut</b> = just as; <b>dilexit</b> = perfect (has loved); <b>manete</b> = imperative (abide!); <b>dilectione mea</b> = abl. (in my love)"},
{v:12,la:"Hoc est praeceptum meum, ut diligatis invicem sicut dilexi vos.",en:"This is my commandment, that you love one another as I have loved you.",n:"<b>praeceptum meum</b> = my commandment (nom.); <b>ut diligatis</b> = that you love (purpose + subjunctive); <b>invicem</b> = one another; <b>sicut dilexi vos</b> = as I have loved you"},
{v:13,la:"Maiorem hac dilectionem nemo habet, ut animam suam ponat quis pro amicis suis.",en:"Greater love has no one than this, that someone lay down his life for his friends.",n:"<b>maiorem</b> = greater (comparative acc.); <b>hac dilectione</b> = than this love (abl. of comparison); <b>nemo habet</b> = no one has; <b>ut ... ponat</b> = that he lay down (explanatory subjunctive); <b>animam suam</b> = his own life (acc.); <b>pro amicis suis</b> = for his friends (abl.)"},
{v:15,la:"Iam non dicam vos servos, quia servus nescit quid faciat dominus eius; vos autem dixi amicos, quia omnia quaecumque audivi a Patre meo, nota feci vobis.",en:"No longer do I call you servants, for the servant does not know what his master is doing; but I have called you friends, for all that I have heard from my Father I have made known to you.",n:"<b>iam non</b> = no longer; <b>dicam</b> = I call/name (future or subjunctive); <b>servos</b> = acc. (servants); <b>nescit quid faciat</b> = does not know what [his master] does (indirect question + subjunctive); <b>amicos</b> = acc. (friends); <b>nota feci</b> = I have made known"},
{v:16,la:"Non vos me elegistis, sed ego elegi vos et posui vos ut eatis et fructum afferatis, et fructus vester maneat.",en:"You did not choose me, but I chose you and appointed you that you should go and bear fruit and that your fruit should abide.",n:"<b>elegistis</b> = 2nd pl. perfect (you chose); <b>elegi</b> = 1st sg. perfect (I chose); <b>posui</b> = I appointed/placed; <b>ut eatis</b> = that you go (purpose + subjunctive); <b>afferatis</b> = subjunctive (bear/bring); <b>fructus vester</b> = your fruit (nom.)"},
{v:26,la:"Cum autem venerit Paraclitus, quem ego mittam vobis a Patre, Spiritum veritatis qui a Patre procedit, ille testimonium perhibebit de me.",en:"But when the Helper comes, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, he will bear witness about me.",n:"<b>cum venerit</b> = when he comes (future perfect + cum); <b>quem ... mittam</b> = whom I will send (future); <b>Spiritum veritatis</b> = Spirit of truth (acc. + gen.); <b>qui ... procedit</b> = who proceeds; <b>testimonium perhibebit</b> = will bear witness (future)"},
]},
{ch:16,title:"The Spirit of Truth",subtitle:"Persecution foretold; the work of the Holy Spirit; sorrow turned to joy",verses:[
{v:7,la:"Sed ego veritatem dico vobis: expedit vobis ut ego vadam; si enim non abiero, Paraclitus non veniet ad vos; si autem abiero, mittam eum ad vos.",en:"Nevertheless, I tell you the truth: it is to your advantage that I go away, for if I do not go away, the Helper will not come to you. But if I go, I will send him to you.",n:"<b>veritatem dico</b> = I tell the truth (acc.); <b>expedit vobis</b> = it is advantageous for you (impersonal + dat.); <b>ut ego vadam</b> = that I go (purpose + subjunctive); <b>si non abiero</b> = if I do not go away (future perfect); <b>non veniet</b> = will not come (future); <b>mittam</b> = I will send (future)"},
{v:12,la:"Adhuc multa habeo vobis dicere, sed non potestis portare modo.",en:"I still have many things to say to you, but you cannot bear them now.",n:"<b>adhuc</b> = still; <b>multa</b> = many things (acc.); <b>habeo ... dicere</b> = I have to say (habeo + infinitive = I have to); <b>non potestis portare</b> = you cannot bear; <b>modo</b> = now"},
{v:13,la:"Cum autem venerit ille Spiritus veritatis, docebit vos omnem veritatem; non enim loquetur a semetipso, sed quaecumque audiet loquetur, et quae ventura sunt annuntiabit vobis.",en:"When the Spirit of truth comes, he will guide you into all the truth, for he will not speak on his own authority, but whatever he hears he will speak, and he will declare to you the things that are to come.",n:"<b>cum venerit</b> = when he comes (future perfect); <b>docebit</b> = future (will teach); <b>omnem veritatem</b> = all truth (acc.); <b>loquetur</b> = future deponent (will speak); <b>a semetipso</b> = from himself; <b>quae ventura sunt</b> = things which are about to come (future active periphrastic)"},
{v:20,la:"Amen, amen dico vobis, quia plorabitis et flebitis vos, mundus autem gaudebit; vos autem contristabimini, sed tristitia vestra vertetur in gaudium.",en:"Amen, amen, I say to you, you will weep and lament, but the world will rejoice. You will be sorrowful, but your sorrow will turn into joy.",n:"<b>plorabitis et flebitis</b> = you will wail and weep (futures); <b>gaudebit</b> = future (will rejoice); <b>contristabimini</b> = future passive (you will be saddened); <b>tristitia vestra</b> = your sorrow (nom.); <b>vertetur</b> = future passive (will be turned); <b>in gaudium</b> = into joy (acc.)"},
{v:22,la:"Et vos igitur nunc quidem tristitiam habetis; iterum autem videbo vos, et gaudebit cor vestrum, et gaudium vestrum nemo tollet a vobis.",en:"So also you have sorrow now, but I will see you again, and your hearts will rejoice, and no one will take your joy from you.",n:"<b>nunc quidem</b> = indeed now; <b>tristitiam</b> = acc. (sorrow); <b>videbo</b> = future (I will see); <b>gaudebit cor vestrum</b> = your heart will rejoice; <b>nemo tollet</b> = no one will take (future); <b>a vobis</b> = from you"},
{v:33,la:"Haec locutus sum vobis, ut in me pacem habeatis. In mundo pressuram habebitis; sed confidite, ego vici mundum.",en:"I have said these things to you, that in me you may have peace. In the world you will have tribulation. But take heart; I have overcome the world.",n:"<b>locutus sum</b> = I have spoken (perfect deponent of loqui); <b>ut ... habeatis</b> = that you may have (purpose + subjunctive); <b>pressuram</b> = acc. (pressure/tribulation); <b>habebitis</b> = future (you will have); <b>confidite</b> = 2nd pl. imperative (take courage!); <b>ego vici</b> = I have conquered (perfect of vincere — emphatic ego)"},
]},
{ch:17,title:"The High Priestly Prayer",subtitle:"Jesus prays for himself, his disciples, and all believers",verses:[
{v:1,la:"Haec locutus est Iesus, et sublevatis oculis in caelum dixit: Pater, venit hora; clarifica Filium tuum, ut Filius tuus clarificet te.",en:"When Jesus had spoken these words, he lifted up his eyes to heaven and said: Father, the hour has come; glorify your Son that the Son may glorify you,",n:"<b>locutus est</b> = perfect deponent (he spoke); <b>sublevatis oculis</b> = ablative absolute (eyes having been lifted); <b>venit hora</b> = the hour has come (perfect); <b>clarifica</b> = singular imperative (glorify!); <b>ut ... clarificet</b> = purpose + subjunctive (that he may glorify)"},
{v:2,la:"sicut dedisti ei potestatem omnis carnis, ut omne quod dedisti ei, det eis vitam aeternam.",en:"since you have given him authority over all flesh, to give eternal life to all whom you have given him.",n:"<b>dedisti</b> = 2nd sg. perfect (you gave); <b>potestatem</b> = acc. (authority); <b>omnis carnis</b> = gen. (over all flesh); <b>ut ... det</b> = purpose + subjunctive (that he may give); <b>vitam aeternam</b> = eternal life (acc.)"},
{v:3,la:"Haec est autem vita aeterna, ut cognoscant te solum Deum verum, et quem misisti Iesum Christum.",en:"And this is eternal life, that they know you, the only true God, and Jesus Christ whom you have sent.",n:"<b>haec est vita aeterna</b> = this is eternal life (predicate nom.); <b>ut cognoscant</b> = that they know (explanatory subjunctive); <b>te solum Deum verum</b> = you, the only true God (acc. + apposition); <b>quem misisti</b> = whom you sent (acc. + perfect)"},
{v:11,la:"Et iam non sum in mundo, et hi in mundo sunt, et ego ad te venio. Pater sancte, serva eos in nomine tuo quos dedisti mihi, ut sint unum sicut et nos.",en:"And I am no longer in the world, but they are in the world, and I am coming to you. Holy Father, keep them in your name, which you have given me, that they may be one, even as we are one.",n:"<b>iam non sum</b> = I am no longer; <b>hi</b> = these (nom. pl.); <b>Pater sancte</b> = Holy Father (vocative!); <b>serva eos</b> = keep them (imperative + acc.); <b>ut sint unum</b> = that they may be one (purpose + subjunctive); <b>sicut et nos</b> = just as we also"},
{v:17,la:"Sanctifica eos in veritate; sermo tuus veritas est.",en:"Sanctify them in the truth; your word is truth.",n:"<b>sanctifica</b> = imperative (sanctify! — same root as sanctificetur in the Pater Noster); <b>eos</b> = them (acc.); <b>in veritate</b> = in truth (abl.); <b>sermo tuus</b> = your word (nom.); <b>veritas est</b> = is truth"},
{v:20,la:"Non pro his autem rogo tantum, sed et pro eis qui credituri sunt per verbum eorum in me,",en:"I do not ask for these only, but also for those who will believe in me through their word,",n:"<b>non ... tantum, sed et</b> = not only, but also; <b>rogo</b> = I ask (present); <b>pro his</b> = for these (abl.); <b>pro eis</b> = for those (abl.); <b>qui credituri sunt</b> = who are about to believe (future active periphrastic — participle + sunt); <b>per verbum eorum</b> = through their word"},
{v:21,la:"ut omnes unum sint, sicut tu, Pater, in me et ego in te, ut et ipsi in nobis unum sint, ut credat mundus quia tu me misisti.",en:"that they may all be one, just as you, Father, are in me, and I in you, that they also may be in us, so that the world may believe that you have sent me.",n:"<b>ut omnes unum sint</b> = that all may be one (purpose + subjunctive — the great prayer for unity); <b>sicut</b> = just as; <b>in me et ego in te</b> = in me and I in you — mutual indwelling; <b>ut et ipsi</b> = that they also; <b>ut credat mundus</b> = that the world may believe"},
{v:24,la:"Pater, quos dedisti mihi, volo ut ubi sum ego et illi sint mecum, ut videant claritatem meam quam dedisti mihi, quia dilexisti me ante constitutionem mundi.",en:"Father, I desire that they also, whom you have given me, may be with me where I am, to see my glory that you have given me because you loved me before the foundation of the world.",n:"<b>volo ut</b> = I wish that (present + purpose subjunctive); <b>ubi sum ego</b> = where I am; <b>et illi sint mecum</b> = they also may be with me (subjunctive); <b>ut videant</b> = that they may see; <b>claritatem meam</b> = my glory (acc.); <b>ante constitutionem mundi</b> = before the foundation of the world (acc.)"},
{v:26,la:"Et notum feci eis nomen tuum et notum faciam, ut dilectio qua dilexisti me in ipsis sit et ego in ipsis.",en:"I made known to them your name, and I will continue to make it known, that the love with which you have loved me may be in them, and I in them.",n:"<b>notum feci</b> = I made known (perfect); <b>notum faciam</b> = I will make known (future); <b>ut dilectio ... sit</b> = that the love may be (purpose + subjunctive); <b>qua dilexisti</b> = with which you loved (abl. relative); <b>in ipsis</b> = in them (abl.)"},
]},

{ch:18,title:"The Arrest & Trial",subtitle:"Gethsemane, Peter's denial, Jesus before Pilate",verses:[
{v:1,la:"Haec cum dixisset Iesus, egressus est cum discipulis suis trans torrentem Cedron, ubi erat hortus, in quem introivit ipse et discipuli eius.",en:"When Jesus had spoken these words, he went out with his disciples across the brook Kidron, where there was a garden, which he and his disciples entered.",n:"<b>cum dixisset</b> = when he had said (pluperfect subjunctive with cum); <b>egressus est</b> = perfect deponent (he went out); <b>trans torrentem</b> = across the torrent/brook (acc.); <b>hortus</b> = nom. (garden); <b>in quem</b> = into which (acc. — motion); <b>introivit</b> = perfect (entered)"},
{v:4,la:"Iesus itaque sciens omnia quae ventura erant super eum, processit et dixit eis: Quem quaeritis?",en:"Then Jesus, knowing all that would happen to him, came forward and said to them: Whom do you seek?",n:"<b>sciens</b> = present participle (knowing); <b>omnia quae</b> = all things which (acc.); <b>ventura erant</b> = were about to come (future active participle + imperfect of esse — periphrastic); <b>processit</b> = perfect (came forward); <b>quem quaeritis</b> = whom do you seek? (acc. + 2nd pl.)"},
{v:5,la:"Responderunt ei: Iesum Nazarenum. Dicit eis Iesus: Ego sum.",en:"They answered him: Jesus of Nazareth. Jesus said to them: I am he.",n:"<b>Iesum Nazarenum</b> = acc. (Jesus the Nazarene); <b>ego sum</b> = I AM — the divine name; same words as John 6:20, 8:58"},
{v:6,la:"Ut ergo dixit eis: Ego sum, abierunt retrorsum et ceciderunt in terram.",en:"When he said to them, I am he, they drew back and fell to the ground.",n:"<b>ut ... dixit</b> = when he said (ut + indicative = when); <b>abierunt retrorsum</b> = they went backward; <b>ceciderunt</b> = 3rd pl. perfect of cadere (they fell); <b>in terram</b> = to the ground (acc. — motion)"},
{v:10,la:"Simon ergo Petrus, habens gladium, eduxit eum et percussit pontificis servum et abscidit auriculam eius dexteram. Erat autem nomen servo Malchus.",en:"Then Simon Peter, having a sword, drew it and struck the high priest's servant and cut off his right ear. The servant's name was Malchus.",n:"<b>habens gladium</b> = having a sword (present participle + acc.); <b>eduxit</b> = perfect (drew out); <b>percussit</b> = perfect (struck); <b>pontificis servum</b> = servant of the high priest (gen. + acc.); <b>abscidit</b> = perfect (cut off); <b>auriculam dexteram</b> = right ear (acc.)"},
{v:11,la:"Dixit ergo Iesus Petro: Mitte gladium in vaginam. Calicem quem dedit mihi Pater, non bibam illum?",en:"So Jesus said to Peter: Put your sword into its sheath. Shall I not drink the cup that the Father has given me?",n:"<b>mitte</b> = singular imperative (put!); <b>gladium</b> = acc. (sword); <b>vaginam</b> = acc. (sheath); <b>calicem</b> = acc. (cup/chalice); <b>quem dedit</b> = which gave (acc. relative + perfect); <b>non bibam</b> = shall I not drink? (deliberative subjunctive)"},
{v:15,la:"Sequebatur autem Iesum Simon Petrus et alius discipulus.",en:"Simon Peter followed Jesus, and so did another disciple.",n:"<b>sequebatur</b> = imperfect deponent (was following); <b>alius discipulus</b> = another disciple (nom.)"},
{v:17,la:"Dicit ergo Petro ancilla ostiaria: Numquid et tu ex discipulis es hominis istius? Dicit ille: Non sum.",en:"The servant girl at the door said to Peter: You also are not one of this man's disciples, are you? He said: I am not.",n:"<b>ancilla ostiaria</b> = the doorkeeper servant girl (nom.); <b>numquid</b> = question expecting 'no'; <b>ex discipulis</b> = from/of the disciples (abl.); <b>hominis istius</b> = of that man (gen. — slightly contemptuous <i>istius</i>); <b>non sum</b> = I am not — Peter's denial, contrasting with Jesus' <i>ego sum</i>"},
{v:25,la:"Erat autem Simon Petrus stans et calefaciens se. Dixerunt ergo ei: Numquid et tu ex discipulis eius es? Negavit ille et dixit: Non sum.",en:"Now Simon Peter was standing and warming himself. So they said to him: You also are not one of his disciples, are you? He denied it and said: I am not.",n:"<b>stans et calefaciens se</b> = standing and warming himself (present participles); <b>negavit</b> = perfect (he denied); <b>non sum</b> = I am not — second denial"},
{v:27,la:"Iterum ergo negavit Petrus, et statim gallus cantavit.",en:"Peter again denied it, and at once the rooster crowed.",n:"<b>iterum</b> = again; <b>negavit</b> = perfect (denied); <b>statim</b> = immediately; <b>gallus</b> = nom. (rooster); <b>cantavit</b> = perfect (crowed)"},
{v:28,la:"Adducunt ergo Iesum a Caipha in praetorium. Erat autem mane. Et ipsi non introierunt in praetorium, ut non contaminarentur, sed ut manducarent Pascha.",en:"Then they led Jesus from Caiaphas to the governor's headquarters. It was early morning. They themselves did not enter the headquarters, so that they would not be defiled, but could eat the Passover.",n:"<b>adducunt</b> = historical present (they lead); <b>praetorium</b> = acc. (praetorium/headquarters); <b>mane</b> = morning (indeclinable); <b>ut non contaminarentur</b> = lest they be defiled (negative purpose + imperfect passive subjunctive); <b>Pascha</b> = acc. (Passover — indeclinable Hebrew)"},
{v:33,la:"Introivit ergo iterum in praetorium Pilatus et vocavit Iesum et dixit ei: Tu es Rex Iudaeorum?",en:"So Pilate entered his headquarters again and called Jesus and said to him: Are you the King of the Jews?",n:"<b>introivit</b> = perfect (entered); <b>vocavit</b> = perfect (called); <b>tu es</b> = you are (question); <b>Rex Iudaeorum</b> = King of the Jews (nom. + gen.)"},
{v:36,la:"Respondit Iesus: Regnum meum non est de hoc mundo. Si ex hoc mundo esset regnum meum, ministri mei utique decertarent ut non traderer Iudaeis; nunc autem regnum meum non est hinc.",en:"Jesus answered: My kingdom is not of this world. If my kingdom were of this world, my servants would fight, so that I would not be delivered over to the Jews. But my kingdom is not from the world.",n:"<b>regnum meum</b> = my kingdom (nom.); <b>de hoc mundo</b> = of/from this world (abl.); <b>si esset</b> = if it were (imperfect subjunctive — contrary to fact); <b>decertarent</b> = imperfect subjunctive (would fight); <b>ut non traderer</b> = so that I would not be handed over (imperfect passive subjunctive); <b>hinc</b> = from here"},
{v:37,la:"Dixit itaque ei Pilatus: Ergo Rex es tu? Respondit Iesus: Tu dicis quia Rex sum ego. Ego in hoc natus sum et ad hoc veni in mundum, ut testimonium perhibeam veritati. Omnis qui est ex veritate audit vocem meam.",en:"Then Pilate said to him: So you are a king? Jesus answered: You say that I am a king. For this purpose I was born and for this purpose I have come into the world — to bear witness to the truth. Everyone who is of the truth listens to my voice.",n:"<b>tu dicis</b> = you say (emphatic tu); <b>quia Rex sum ego</b> = that I am a king; <b>in hoc natus sum</b> = for this I was born (perfect passive); <b>ad hoc veni</b> = for this I came (perfect); <b>ut testimonium perhibeam</b> = that I may bear witness (purpose + subjunctive); <b>veritati</b> = dat. (to the truth)"},
{v:38,la:"Dicit ei Pilatus: Quid est veritas? Et cum hoc dixisset, iterum exivit ad Iudaeos et dicit eis: Ego nullam invenio in eo causam.",en:"Pilate said to him: What is truth? After he had said this, he went back outside to the Jews and told them: I find no guilt in him.",n:"<b>quid est veritas</b> = what is truth? (the famous question); <b>cum hoc dixisset</b> = when he had said this (pluperfect subjunctive); <b>exivit</b> = perfect (went out); <b>nullam causam</b> = no cause/guilt (acc.)"},
{v:40,la:"Clamaverunt ergo rursum omnes dicentes: Non hunc, sed Barabbam! Erat autem Barabbas latro.",en:"They cried out again: Not this man, but Barabbas! Now Barabbas was a robber.",n:"<b>clamaverunt</b> = 3rd pl. perfect (they cried out); <b>rursum</b> = again; <b>dicentes</b> = present participle (saying); <b>hunc</b> = this one (acc.); <b>latro</b> = nom. (robber/bandit, 3rd decl.)"},
]},
{ch:19,title:"Crucifixion & Burial",subtitle:"Ecce Homo; Golgotha; death of Jesus; burial in the garden",verses:[
{v:1,la:"Tunc ergo apprehendit Pilatus Iesum et flagellavit.",en:"Then Pilate took Jesus and flogged him.",n:"<b>apprehendit</b> = perfect (seized/took); <b>flagellavit</b> = perfect (flogged — 1st conjugation)"},
{v:2,la:"Et milites plectentes coronam de spinis imposuerunt capiti eius, et veste purpurea circumdederunt eum.",en:"And the soldiers twisted together a crown of thorns and put it on his head and arrayed him in a purple robe.",n:"<b>milites</b> = nom. pl. (soldiers); <b>plectentes</b> = present participle (weaving/twisting); <b>coronam</b> = acc. (crown); <b>de spinis</b> = from thorns (abl.); <b>imposuerunt</b> = perfect (placed upon); <b>capiti</b> = dat. (on his head, 3rd decl.); <b>veste purpurea</b> = abl. (with a purple garment); <b>circumdederunt</b> = perfect (clothed/surrounded)"},
{v:3,la:"Et veniebant ad eum et dicebant: Ave, Rex Iudaeorum! Et dabant ei alapas.",en:"They came up to him, saying: Hail, King of the Jews! and struck him with their hands.",n:"<b>veniebant</b> = imperfect (they kept coming — repeated action); <b>Ave</b> = Hail! (imperative); <b>Rex Iudaeorum</b> = King of the Jews (voc.); <b>dabant</b> = imperfect (they kept giving); <b>alapas</b> = acc. pl. (slaps/blows)"},
{v:4,la:"Exivit iterum Pilatus foras et dicit eis: Ecce adduco vobis eum foras, ut cognoscatis quia nullam invenio in eo causam.",en:"Pilate went out again and said to them: See, I am bringing him out to you that you may know that I find no guilt in him.",n:"<b>exivit foras</b> = went outside; <b>ecce</b> = behold; <b>adduco</b> = I bring (present); <b>ut cognoscatis</b> = purpose + subjunctive (that you may know); <b>nullam causam</b> = no fault/guilt"},
{v:5,la:"Exivit ergo Iesus portans coronam spineam et purpureum vestimentum. Et dicit eis: Ecce homo.",en:"So Jesus came out, wearing the crown of thorns and the purple robe. Pilate said to them: Behold the man!",n:"<b>portans</b> = present participle (bearing/wearing); <b>coronam spineam</b> = the thorny crown (acc.); <b>vestimentum</b> = acc. (garment); <b>ecce homo</b> = behold the man — one of the most famous Latin phrases in history"},
{v:6,la:"Cum ergo vidissent eum pontifices et ministri, clamabant dicentes: Crucifige, crucifige eum! Dicit eis Pilatus: Accipite eum vos et crucifigite; ego enim non invenio in eo causam.",en:"When the chief priests and the officers saw him, they cried out: Crucify him, crucify him! Pilate said to them: Take him yourselves and crucify him, for I find no guilt in him.",n:"<b>cum vidissent</b> = when they had seen (pluperfect subjunctive); <b>pontifices et ministri</b> = chief priests and officers (nom.); <b>clamabant</b> = imperfect (they kept crying out); <b>crucifige</b> = singular imperative (crucify!); <b>accipite</b> = 2nd pl. imperative (take!); <b>vos</b> = you yourselves (emphatic)"},
{v:10,la:"Dicit ergo ei Pilatus: Mihi non loqueris? Nescis quia potestatem habeo crucifigere te et potestatem habeo dimittere te?",en:"So Pilate said to him: You will not speak to me? Do you not know that I have authority to release you and authority to crucify you?",n:"<b>mihi non loqueris</b> = you do not speak to me? (dat. + deponent); <b>nescis</b> = do you not know?; <b>potestatem</b> = acc. (power/authority); <b>crucifigere te</b> = to crucify you (infinitive + acc.); <b>dimittere te</b> = to release you"},
{v:11,la:"Respondit Iesus: Non haberes potestatem adversum me ullam, nisi tibi datum esset desuper; propterea qui me tradidit tibi, maius peccatum habet.",en:"Jesus answered: You would have no authority over me at all unless it had been given you from above. Therefore he who delivered me over to you has the greater sin.",n:"<b>non haberes</b> = you would not have (imperfect subjunctive — contrary to fact); <b>adversum me</b> = against me (acc.); <b>ullam</b> = any (acc.); <b>nisi ... datum esset</b> = unless it had been given (pluperfect passive subjunctive); <b>desuper</b> = from above; <b>tradidit</b> = perfect (handed over); <b>maius peccatum</b> = the greater sin (comparative + acc.)"},
{v:16,la:"Tunc ergo tradidit eis illum ut crucifigeretur. Susceperunt autem Iesum et eduxerunt.",en:"So he delivered him over to them to be crucified. So they took Jesus and led him away.",n:"<b>tradidit</b> = perfect (handed over); <b>ut crucifigeretur</b> = purpose + passive subjunctive (so that he might be crucified); <b>susceperunt</b> = perfect (they received/took); <b>eduxerunt</b> = perfect (led out)"},
{v:17,la:"Et baiulans sibi crucem exivit in eum qui dicitur Calvariae locum, Hebraice autem Golgotha,",en:"And carrying his own cross, he went out to what is called the Place of the Skull, which in Hebrew is called Golgotha.",n:"<b>baiulans</b> = present participle (carrying); <b>sibi</b> = dat. reflexive (for himself); <b>crucem</b> = acc. (cross); <b>qui dicitur</b> = which is called (passive); <b>Calvariae locum</b> = the place of the skull (gen. + acc.)"},
{v:18,la:"ubi crucifixerunt eum, et cum eo alios duos hinc et hinc, medium autem Iesum.",en:"There they crucified him, and with him two others, one on either side, and Jesus between them.",n:"<b>crucifixerunt</b> = 3rd pl. perfect (they crucified); <b>cum eo</b> = with him (abl.); <b>alios duos</b> = two others (acc.); <b>hinc et hinc</b> = on this side and that; <b>medium</b> = acc. adj. (in the middle)"},
{v:19,la:"Scripsit autem et titulum Pilatus et posuit super crucem. Erat autem scriptum: Iesus Nazarenus Rex Iudaeorum.",en:"Pilate also wrote an inscription and put it on the cross. It read: Jesus of Nazareth, the King of the Jews.",n:"<b>scripsit</b> = perfect (wrote); <b>titulum</b> = acc. (inscription/title); <b>posuit</b> = perfect (placed); <b>super crucem</b> = upon the cross (acc.); <b>scriptum</b> = perfect passive participle (written) — This is the famous INRI: <i>Iesus Nazarenus Rex Iudaeorum</i>"},
{v:25,la:"Stabant autem iuxta crucem Iesu mater eius et soror matris eius, Maria Cleophae, et Maria Magdalene.",en:"Standing by the cross of Jesus were his mother and his mother's sister, Mary the wife of Clopas, and Mary Magdalene.",n:"<b>stabant</b> = imperfect (were standing); <b>iuxta crucem</b> = beside the cross (prep. + acc.); <b>mater eius</b> = his mother (nom.); <b>soror matris</b> = sister of the mother (nom. + gen.)"},
{v:26,la:"Cum vidisset ergo Iesus matrem et discipulum stantem quem diligebat, dicit matri suae: Mulier, ecce filius tuus.",en:"When Jesus saw his mother and the disciple whom he loved standing nearby, he said to his mother: Woman, behold your son!",n:"<b>cum vidisset</b> = when he had seen (pluperfect subjunctive); <b>matrem</b> = acc. (mother); <b>discipulum stantem</b> = the disciple standing (acc. + participle); <b>quem diligebat</b> = whom he loved (imperfect — ongoing love); <b>matri</b> = dat. (to his mother); <b>mulier</b> = vocative (woman); <b>filius tuus</b> = nom. (your son)"},
{v:27,la:"Deinde dicit discipulo: Ecce mater tua. Et ex illa hora accepit eam discipulus in sua.",en:"Then he said to the disciple: Behold your mother! And from that hour the disciple took her into his own home.",n:"<b>deinde</b> = then/next; <b>discipulo</b> = dat. (to the disciple); <b>ex illa hora</b> = from that hour (abl.); <b>accepit</b> = perfect (received/took); <b>in sua</b> = into his own [things/home] (acc.)"},
{v:28,la:"Postea sciens Iesus quia omnia consummata sunt, ut consummaretur Scriptura, dicit: Sitio.",en:"After this, Jesus, knowing that all was now finished, said (to fulfill the Scripture): I thirst.",n:"<b>sciens</b> = present participle (knowing); <b>consummata sunt</b> = perfect passive (all things have been completed); <b>ut consummaretur</b> = purpose + passive subjunctive (that it might be fulfilled); <b>Scriptura</b> = nom. (Scripture); <b>sitio</b> = 1st sg. present (I thirst)"},
{v:30,la:"Cum ergo accepisset acetum, Iesus dixit: Consummatum est. Et inclinato capite tradidit spiritum.",en:"When Jesus had received the sour wine, he said: It is finished. And he bowed his head and gave up his spirit.",n:"<b>accepisset</b> = pluperfect subjunctive (had received); <b>acetum</b> = acc. (vinegar/sour wine); <b>consummatum est</b> = it is finished/completed (perfect passive — one of the most important phrases in Scripture); <b>inclinato capite</b> = ablative absolute (his head having been bowed); <b>tradidit spiritum</b> = handed over the spirit (perfect + acc.)"},
{v:34,la:"Sed unus militum lancea latus eius aperuit, et continuo exivit sanguis et aqua.",en:"But one of the soldiers pierced his side with a spear, and at once there came out blood and water.",n:"<b>unus militum</b> = one of the soldiers (partitive gen.); <b>lancea</b> = abl. (with a spear/lance); <b>latus</b> = acc. (side, 3rd decl. neut.); <b>aperuit</b> = perfect (opened/pierced); <b>continuo</b> = immediately; <b>exivit</b> = perfect (came out); <b>sanguis et aqua</b> = blood and water (nom.)"},
{v:38,la:"Post haec autem rogavit Pilatum Ioseph ab Arimathaea, eo quod esset discipulus Iesu, occultus autem propter metum Iudaeorum, ut tolleret corpus Iesu. Et permisit Pilatus. Venit ergo et tulit corpus eius.",en:"After these things Joseph of Arimathea, who was a disciple of Jesus, but secretly for fear of the Jews, asked Pilate that he might take away the body of Jesus, and Pilate gave him permission. So he came and took away his body.",n:"<b>rogavit</b> = perfect (asked); <b>eo quod esset</b> = because he was (causal + imperfect subjunctive); <b>occultus</b> = nom. adj. (hidden/secret); <b>propter metum</b> = on account of fear (acc.); <b>ut tolleret</b> = purpose + subjunctive (that he might take away); <b>corpus</b> = acc. (body, 3rd decl. neut.); <b>permisit</b> = perfect (permitted); <b>tulit</b> = perfect of ferre (carried away)"},
{v:41,la:"Erat autem in loco ubi crucifixus est hortus, et in horto monumentum novum, in quo nondum quisquam positus erat.",en:"Now in the place where he was crucified there was a garden, and in the garden a new tomb in which no one had yet been laid.",n:"<b>loco</b> = abl. (in the place); <b>ubi crucifixus est</b> = where he was crucified (perfect passive); <b>hortus</b> = nom. (garden); <b>monumentum novum</b> = a new tomb (nom.); <b>in quo</b> = in which (abl.); <b>nondum</b> = not yet; <b>quisquam</b> = anyone; <b>positus erat</b> = pluperfect passive (had been placed)"},
{v:42,la:"Ibi ergo propter Parasceven Iudaeorum, quia iuxta erat monumentum, posuerunt Iesum.",en:"So because of the Jewish day of Preparation, since the tomb was close at hand, they laid Jesus there.",n:"<b>Parasceven</b> = acc. (Preparation — Greek loanword); <b>iuxta</b> = nearby; <b>posuerunt</b> = 3rd pl. perfect (they placed/laid)"},
]},
{ch:20,title:"The Resurrection",subtitle:"The empty tomb; Mary Magdalene; Jesus appears to the disciples; Thomas believes",verses:[
{v:1,la:"Una autem sabbati, Maria Magdalene venit mane, cum adhuc tenebrae essent, ad monumentum, et vidit lapidem sublatum a monumento.",en:"Now on the first day of the week Mary Magdalene came to the tomb early, while it was still dark, and saw that the stone had been taken away from the tomb.",n:"<b>una sabbati</b> = first [day] of the week (cardinal for ordinal — Hebraism); <b>mane</b> = early/morning (adverb); <b>cum ... essent</b> = while there were (imperfect subjunctive with cum); <b>tenebrae</b> = nom. pl. (darkness); <b>monumentum</b> = acc. (tomb); <b>lapidem sublatum</b> = the stone taken away (acc. + perfect passive participle)"},
{v:2,la:"Currit ergo et venit ad Simonem Petrum et ad alium discipulum quem amabat Iesus, et dicit eis: Tulerunt Dominum de monumento, et nescimus ubi posuerunt eum.",en:"So she ran and went to Simon Peter and the other disciple, the one whom Jesus loved, and said to them: They have taken the Lord out of the tomb, and we do not know where they have laid him.",n:"<b>currit</b> = historical present (she runs); <b>quem amabat</b> = whom [Jesus] loved (imperfect — habitual); <b>tulerunt</b> = 3rd pl. perfect of ferre (they took/carried); <b>de monumento</b> = from the tomb (abl.); <b>nescimus</b> = we do not know; <b>posuerunt</b> = they placed (perfect)"},
{v:11,la:"Maria autem stabat ad monumentum foris plorans. Dum ergo fleret, inclinavit se in monumentum.",en:"But Mary stood weeping outside the tomb, and as she wept she stooped to look into the tomb.",n:"<b>stabat</b> = imperfect (was standing); <b>foris</b> = outside (adverb); <b>plorans</b> = present participle (weeping); <b>dum fleret</b> = while she was weeping (imperfect subjunctive with dum); <b>inclinavit se</b> = she bent herself (perfect reflexive)"},
{v:15,la:"Dicit ei Iesus: Mulier, quid ploras? Quem quaeris? Illa existimans quia hortulanus esset, dicit ei: Domine, si tu sustulisti eum, dicito mihi ubi posuisti eum, et ego eum tollam.",en:"Jesus said to her: Woman, why are you weeping? Whom are you seeking? Supposing him to be the gardener, she said to him: Sir, if you have carried him away, tell me where you have laid him, and I will take him away.",n:"<b>quid ploras</b> = why do you weep?; <b>quem quaeris</b> = whom do you seek? (same question as 18:4); <b>existimans</b> = thinking/supposing (present participle); <b>hortulanus</b> = nom. (gardener); <b>esset</b> = imperfect subjunctive (he was — indirect thought); <b>sustulisti</b> = 2nd sg. perfect (you carried away); <b>dicito</b> = future imperative (tell me!); <b>tollam</b> = future (I will take away)"},
{v:16,la:"Dicit ei Iesus: Maria! Conversa illa dicit ei: Rabboni! quod dicitur Magister.",en:"Jesus said to her: Mary. She turned and said to him in Hebrew: Rabboni! (which means Teacher).",n:"<b>Maria!</b> = vocative — Jesus calls her by name; <b>conversa</b> = having turned (perfect passive participle f.); <b>Rabboni</b> = Hebrew/Aramaic for 'my teacher'; <b>quod dicitur</b> = which is translated (passive)"},
{v:17,la:"Dicit ei Iesus: Noli me tangere, nondum enim ascendi ad Patrem meum; vade autem ad fratres meos et dic eis: Ascendo ad Patrem meum et Patrem vestrum, Deum meum et Deum vestrum.",en:"Jesus said to her: Do not cling to me, for I have not yet ascended to the Father; but go to my brothers and say to them, I am ascending to my Father and your Father, to my God and your God.",n:"<b>noli me tangere</b> = do not touch/cling to me (negative imperative); <b>nondum</b> = not yet; <b>ascendi</b> = 1st sg. perfect (I have ascended); <b>vade</b> = go! (singular imperative); <b>dic eis</b> = tell them! (irregular imperative of dicere); <b>ascendo</b> = I am ascending (present — in progress)"},
{v:19,la:"Cum esset ergo sero die illo, una sabbatorum, et fores essent clausae ubi erant discipuli propter metum Iudaeorum, venit Iesus et stetit in medio et dicit eis: Pax vobis.",en:"On the evening of that day, the first day of the week, the doors being locked where the disciples were for fear of the Jews, Jesus came and stood among them and said to them: Peace be with you.",n:"<b>cum esset sero</b> = when it was evening (imperfect subjunctive); <b>fores ... clausae</b> = the doors locked (nom. + participle — ablative absolute sense); <b>propter metum</b> = on account of fear (acc.); <b>stetit in medio</b> = stood in the midst; <b>pax vobis</b> = peace to you (dat.) — the Easter greeting"},
{v:21,la:"Dixit ergo eis iterum: Pax vobis. Sicut misit me Pater, et ego mitto vos.",en:"Jesus said to them again: Peace be with you. As the Father has sent me, even so I am sending you.",n:"<b>sicut misit me Pater</b> = as the Father sent me (perfect); <b>et ego mitto vos</b> = so I send you (present — the Great Commission in John)"},
{v:22,la:"Et cum hoc dixisset, insufflavit et dicit eis: Accipite Spiritum Sanctum.",en:"And when he had said this, he breathed on them and said to them: Receive the Holy Spirit.",n:"<b>insufflavit</b> = perfect (he breathed on — same verb as Genesis 2:7, God breathing life into Adam); <b>accipite</b> = 2nd pl. imperative (receive!); <b>Spiritum Sanctum</b> = the Holy Spirit (acc.)"},
{v:25,la:"Dicebant ergo ei alii discipuli: Vidimus Dominum! Ille autem dixit eis: Nisi videro in manibus eius fixuram clavorum et mittam digitum meum in locum clavorum et mittam manum meam in latus eius, non credam.",en:"So the other disciples told him: We have seen the Lord. But he said to them: Unless I see in his hands the mark of the nails, and place my finger into the mark of the nails, and place my hand into his side, I will not believe.",n:"<b>vidimus</b> = 1st pl. perfect (we have seen); <b>nisi videro</b> = unless I see (future perfect); <b>fixuram clavorum</b> = mark of the nails (acc. + gen.); <b>mittam digitum</b> = I put my finger (present subjunctive); <b>latus</b> = acc. (side); <b>non credam</b> = I will not believe (future)"},
{v:27,la:"Deinde dicit Thomae: Infer digitum tuum huc et vide manus meas, et affer manum tuam et mitte in latus meum, et noli esse incredulus sed fidelis.",en:"Then he said to Thomas: Put your finger here, and see my hands; and put out your hand, and place it in my side. Do not disbelieve, but believe.",n:"<b>infer</b> = imperative (bring/put); <b>digitum tuum</b> = your finger (acc.); <b>huc</b> = here/hither; <b>vide</b> = imperative (see!); <b>affer manum tuam</b> = bring your hand; <b>mitte</b> = imperative (place!); <b>noli esse incredulus</b> = do not be unbelieving (negative imperative); <b>fidelis</b> = nom. adj. (faithful/believing)"},
{v:28,la:"Respondit Thomas et dixit ei: Dominus meus et Deus meus!",en:"Thomas answered him: My Lord and my God!",n:"<b>Dominus meus et Deus meus</b> = My Lord and my God! (nom. — exclamatory; the climactic confession of the Gospel)"},
{v:29,la:"Dicit ei Iesus: Quia vidisti me, credidisti; beati qui non viderunt et crediderunt.",en:"Jesus said to him: Have you believed because you have seen me? Blessed are those who have not seen and yet have believed.",n:"<b>vidisti</b> = 2nd sg. perfect (you saw); <b>credidisti</b> = 2nd sg. perfect (you believed); <b>beati</b> = nom. pl. (blessed — same word as the Beatitudes); <b>qui non viderunt et crediderunt</b> = who did not see and [yet] believed (both perfect)"},
{v:31,la:"Haec autem scripta sunt ut credatis quia Iesus est Christus Filius Dei, et ut credentes vitam habeatis in nomine eius.",en:"But these are written so that you may believe that Jesus is the Christ, the Son of God, and that by believing you may have life in his name.",n:"<b>scripta sunt</b> = perfect passive (have been written); <b>ut credatis</b> = that you may believe (purpose + subjunctive); <b>credentes</b> = nom. present participle (believing); <b>vitam habeatis</b> = you may have life (subjunctive); <b>in nomine eius</b> = in his name"},
]},
{ch:21,title:"Epilogue",subtitle:"Jesus appears at the Sea of Tiberias; Peter restored; the beloved disciple",verses:[
{v:3,la:"Dicit eis Simon Petrus: Vado piscari. Dicunt ei: Venimus et nos tecum. Et exierunt et ascenderunt in navim, et illa nocte nihil prendiderunt.",en:"Simon Peter said to them: I am going fishing. They said to him: We will go with you. They went out and got into the boat, but that night they caught nothing.",n:"<b>vado piscari</b> = I go to fish (present + infinitive of purpose); <b>venimus</b> = we come (present); <b>tecum</b> = with you (abl.); <b>exierunt</b> = they went out (perfect); <b>navim</b> = acc. (boat); <b>illa nocte</b> = that night (abl.); <b>nihil prendiderunt</b> = they caught nothing"},
{v:5,la:"Dicit ergo eis Iesus: Pueri, numquid pulmentarium habetis? Responderunt ei: Non.",en:"Jesus said to them: Children, do you have any fish? They answered him: No.",n:"<b>pueri</b> = voc. pl. (children/lads — affectionate address); <b>numquid</b> = question expecting 'no'; <b>pulmentarium</b> = acc. (something to eat / fish)"},
{v:6,la:"Dixit eis: Mittite in dexteram navigii rete, et invenietis. Miserunt ergo, et iam non valebant illud trahere prae multitudine piscium.",en:"He said to them: Cast the net on the right side of the boat, and you will find some. So they cast it, and now they were not able to haul it in, because of the quantity of fish.",n:"<b>mittite</b> = imperative (cast!); <b>in dexteram</b> = to the right (acc.); <b>navigii</b> = gen. (of the boat); <b>rete</b> = acc. (net, 3rd decl. n.); <b>invenietis</b> = future (you will find); <b>non valebant</b> = imperfect (they were not able); <b>trahere</b> = to drag (infinitive); <b>prae multitudine</b> = because of the multitude (abl.)"},
{v:7,la:"Dixit ergo discipulus ille quem diligebat Iesus Petro: Dominus est!",en:"That disciple whom Jesus loved therefore said to Peter: It is the Lord!",n:"<b>discipulus ille</b> = that disciple (nom.); <b>quem diligebat</b> = whom [Jesus] loved (imperfect); <b>Dominus est</b> = It is the Lord!"},
{v:12,la:"Dicit eis Iesus: Venite, prandete. Et nemo audebat discumbentium interrogare eum: Tu quis es? scientes quia Dominus est.",en:"Jesus said to them: Come, have breakfast. Now none of the disciples dared ask him: Who are you? They knew it was the Lord.",n:"<b>venite, prandete</b> = imperatives (come, eat!); <b>nemo audebat</b> = no one dared (imperfect); <b>discumbentium</b> = gen. present participle (of those reclining); <b>scientes</b> = nom. participle (knowing)"},
{v:15,la:"Cum ergo prandissent, dicit Simoni Petro Iesus: Simon Ioannis, diligis me plus his? Dicit ei: Etiam, Domine, tu scis quia amo te. Dicit ei: Pasce agnos meos.",en:"When they had finished breakfast, Jesus said to Simon Peter: Simon, son of John, do you love me more than these? He said to him: Yes, Lord; you know that I love you. He said to him: Feed my lambs.",n:"<b>cum prandissent</b> = when they had eaten (pluperfect subjunctive); <b>diligis me</b> = do you love me (present — using diligere); <b>plus his</b> = more than these (abl. of comparison); <b>amo te</b> = I love you (Peter uses amare, a different word); <b>pasce</b> = imperative (feed/tend!); <b>agnos meos</b> = my lambs (acc.)"},
{v:16,la:"Dicit ei iterum: Simon Ioannis, diligis me? Dicit ei: Etiam, Domine, tu scis quia amo te. Dicit ei: Pasce oves meas.",en:"He said to him a second time: Simon, son of John, do you love me? He said to him: Yes, Lord; you know that I love you. He said to him: Tend my sheep.",n:"<b>iterum</b> = again (second time); <b>oves meas</b> = my sheep (acc. pl.) — shift from agnos (lambs) to oves (sheep)"},
{v:17,la:"Dicit ei tertio: Simon Ioannis, amas me? Contristatus est Petrus quia dixit ei tertio: Amas me? Et dixit ei: Domine, tu omnia scis; tu scis quia amo te. Dicit ei: Pasce oves meas.",en:"He said to him the third time: Simon, son of John, do you love me? Peter was grieved because he said to him the third time, Do you love me? and he said to him: Lord, you know everything; you know that I love you. Jesus said to him: Feed my sheep.",n:"<b>tertio</b> = for the third time — three questions matching Peter's three denials; <b>amas me</b> = do you love me? (now Jesus uses amare, Peter's word); <b>contristatus est</b> = was grieved (perfect passive/deponent); <b>tu omnia scis</b> = you know all things (emphatic)"},
{v:19,la:"Hoc autem dixit significans qua morte clarificaturus esset Deum. Et hoc cum dixisset, dicit ei: Sequere me.",en:"(This he said to show by what kind of death he was to glorify God.) And after saying this he said to him: Follow me.",n:"<b>significans</b> = present participle (signifying); <b>qua morte</b> = by what death (abl.); <b>clarificaturus esset</b> = was about to glorify (future active participle + imperfect subjunctive — periphrastic); <b>sequere me</b> = follow me! (singular imperative of deponent sequi)"},
{v:25,la:"Sunt autem et alia multa quae fecit Iesus, quae si scribantur per singula, nec ipsum arbitror mundum capere posse eos qui scribendi sunt libros.",en:"Now there are also many other things that Jesus did. Were every one of them to be written, I suppose that the world itself could not contain the books that would be written.",n:"<b>alia multa</b> = many other things (nom.); <b>quae fecit</b> = which he did (relative + perfect); <b>si scribantur</b> = if they were written (present passive subjunctive); <b>per singula</b> = one by one; <b>nec ... arbitror</b> = nor do I think (1st sg. deponent); <b>mundum capere posse</b> = that the world could contain (acc. + infinitive — indirect statement)"},
]}

let S=defaultState();
function saveState(){try{const d={learnedWords:S.learnedWords,score:S.score,bestStreak:S.bestStreak,darkMode:S.darkMode,studyDays:S.studyDays,currentDayStreak:S.currentDayStreak,sr:S.sr,activeLesson:S.activeLesson,completedLessons:S.completedLessons,scrChapter:S.scrChapter,fontSize:S.fontSize,bookmarks:S.bookmarks};localStorage.setItem("latina_state",JSON.stringify(d));}catch(e){}}
function loadState(){try{const d=JSON.parse(localStorage.getItem("latina_state"));if(d){S.learnedWords=d.learnedWords||[];S.score=d.score||{correct:0,total:0};S.bestStreak=d.bestStreak||0;S.darkMode=d.darkMode||false;S.studyDays=d.studyDays||[];S.currentDayStreak=d.currentDayStreak||0;S.sr=d.sr||{};S.activeLesson=d.activeLesson||0;S.completedLessons=d.completedLessons||[];S.scrChapter=d.scrChapter||0;S.fontSize=d.fontSize||1;S.bookmarks=d.bookmarks||[];}}catch(e){}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function recordStudyDay(){const t=todayStr();if(!S.studyDays.includes(t)){S.studyDays.push(t);calcDayStreak();saveState();}}
function calcDayStreak(){const days=S.studyDays.sort();if(!days.length){S.currentDayStreak=0;return;}let streak=1;const today=new Date(todayStr());const last=new Date(days[days.length-1]);const diff=Math.floor((today-last)/(86400000));if(diff>1){S.currentDayStreak=1;return;}for(let i=days.length-1;i>0;i--){const a=new Date(days[i]),b=new Date(days[i-1]);if(Math.floor((a-b)/86400000)===1)streak++;else break;}S.currentDayStreak=streak;}

// Spaced repetition levels: 0=new,1=learning,2=familiar,3=known,4=mastered
function srLevel(word){return S.sr[word]||0;}
function srUp(word){S.sr[word]=Math.min((S.sr[word]||0)+1,4);saveState();}
function srDown(word){S.sr[word]=Math.max((S.sr[word]||0)-1,0);saveState();}
function srClass(word){return["sr-new","sr-learning","sr-familiar","sr-known","sr-mastered"][srLevel(word)];}
function srLabel(word){return["New","Learning","Familiar","Known","Mastered"][srLevel(word)];}

function buildDict(){
  const d={};
  // 1. Load comprehensive forms dictionary first
  Object.entries(LATIN_FORMS).forEach(([k,v])=>{
    d[k.toLowerCase()]={la:k,en:v,pos:"form",note:""};
  });
  // 2. Overlay VULGATE_CORE (more detailed entries)
  VULGATE_CORE.forEach(w=>{
    const key=w.la.toLowerCase();
    d[key]={la:w.la,en:w.en,pos:w.pos,note:w.note||""};
  });
  // 3. Overlay VOCABULARY
  VOCABULARY.forEach(w=>{
    const key=w.latin.toLowerCase();
    if(!d[key])d[key]={la:w.latin,en:w.english,pos:w.category,note:""};
  });
  // Common forms mapping to roots
  const forms={
    "est":"esse (to be) — 3rd sg. present: is",
    "sunt":"esse (to be) — 3rd pl. present: they are",
    "erat":"esse (to be) — 3rd sg. imperfect: was",
    "erant":"esse (to be) — 3rd pl. imperfect: they were",
    "fuit":"esse (to be) — 3rd sg. perfect: was",
    "sit":"esse (to be) — 3rd sg. present subjunctive: may be",
    "sint":"esse (to be) — 3rd pl. present subjunctive: may be",
    "esset":"esse (to be) — 3rd sg. imperfect subjunctive: were/would be",
    "sum":"esse (to be) — 1st sg. present: I am",
    "es":"esse (to be) — 2nd sg. present: you are",

const DICT=buildDict();
function lookupWord(word){
  const clean=word.toLowerCase().replace(/[.,;:!?\u201C\u201D\u2018\u2019\u2014\u2013""''()\[\]]/g,"").trim();
  if(!clean||clean.length<2)return null;
  if(DICT[clean])return DICT[clean];
  // Try removing enclitic -que (and, also)
  if(clean.endsWith("que")&&clean.length>4){const base=clean.slice(0,-3);if(DICT[base])return{...DICT[base],note:"+ enclitic -que (and). "+DICT[base].en};}
  // Try common endings removal to find root
  const endings=["orum","arum","ibus","ibus","orum","ibus","bus","rum","ium","uum","um","is","us","am","em","os","as","ae","es","ei","ui","im","it","nt","at","et","ur","or","er","ar","ns","m","s","i","o","a","e"];
  for(const e of endings){if(clean.endsWith(e)&&clean.length>e.length+2){const stem=clean.slice(0,-e.length);if(DICT[stem])return{...DICT[stem],note:"(Root: "+DICT[stem].la+") "+DICT[stem].en};}}
  return null;
}
function showWordPanel(word, event){
  const info=lookupWord(word);
  const el=document.getElementById("word-panel");
  const defText=info?info.en:'Not in dictionary. See grammar notes below.';
  const posText=info?info.pos:'';
  const noteText=info&&info.note?info.note:'';
  const headWord=info?info.la:word;
  
  el.innerHTML='<div class="word-popup-overlay" id="wp-overlay"></div>'+
    '<div class="word-popup-scripture" id="wp-box">'+
    '<button class="wp-close" id="wp-close-scr">\u2715</button>'+
    '<h3>'+headWord+'</h3>'+
    (posText?'<div class="wp-pos">'+posText+'</div>':'')+
    '<div class="wp-def">'+defText+'</div>'+
    (noteText?'<div class="wp-note">'+noteText+'</div>':'')+
    '<button class="wp-speak" id="wp-speak" data-word="'+headWord+'">\uD83D\uDD0A Hear it</button>'+
    '</div>';
  
  // Position near the clicked word
  const box=document.getElementById("wp-box");
  if(event&&event.target){
    const rect=event.target.getBoundingClientRect();
    const bw=box.offsetWidth||250;
    const bh=box.offsetHeight||120;
    let left=Math.max(8, Math.min(rect.left, window.innerWidth-bw-8));
    let top=rect.bottom+10;
    // If popup would go below viewport, show above the word
    if(top+bh>window.innerHeight-20){
      top=rect.top-bh-10;
      box.classList.add("above");
    }
    box.style.left=left+"px";
    box.style.top=top+"px";
  } else {
    box.style.left="50%";
    box.style.top="50%";
    box.style.transform="translate(-50%,-50%)";
  }
  
  document.getElementById("wp-close-scr").addEventListener("click",()=>{el.innerHTML="";});
  document.getElementById("wp-overlay").addEventListener("click",()=>{el.innerHTML="";});
  document.getElementById("wp-speak").addEventListener("click",()=>{speakLatin(headWord);});
}

function speakLatin(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  // Try Italian voice first (closest to ecclesiastical Latin), then Spanish, then default
  const voices=window.speechSynthesis.getVoices();
  const preferred=voices.find(v=>v.lang.startsWith('it'))||voices.find(v=>v.lang.startsWith('la'))||voices.find(v=>v.lang.startsWith('es'))||null;
  if(preferred)u.voice=preferred;
  u.lang='it-IT';
  u.rate=0.75;
  u.pitch=1.0;
  window.speechSynthesis.speak(u);
}

  $("word-popup-container").innerHTML=`<div class="word-popup-overlay" id="wp-overlay"></div><div class="word-popup"><h3>${word}</h3><div class="wp-form">${info.form}</div><div class="wp-meaning">${info.meaning}</div><div class="wp-detail"><b>Root:</b> ${info.root}</div><button class="wp-close" id="wp-close">Close</button></div>`;
  $("wp-overlay").addEventListener("click",()=>$("word-popup-container").innerHTML="");
  $("wp-close").addEventListener("click",()=>$("word-popup-container").innerHTML="");
}
function annotatePrayer(prayer){
  if(!prayer.words)return prayer.latin;
  const words=prayer.latin.split(/(\s+|[,;.!?])/);
  return words.map(w=>{const clean=w.replace(/[,;.!?]/g,"").trim();if(prayer.words[clean]){return`<span class="pw" data-word="${clean}">${w}</span>`;}return w;}).join("");
}
function renderPrayers(){
  $("view-prayers").innerHTML=`
${ST("Orationes \u2014 Prayers")}
<p class="instructions">Tap any <span style="border-bottom:1px dotted var(--gold);padding:1px 3px">underlined word</span> to see its grammatical form, root, and meaning.</p>
<div class="toggle-row"><button class="toggle-btn ${S.prayerShowLatin?'active':''}" data-lang="latin">Latin</button><button class="toggle-btn ${!S.prayerShowLatin?'active':''}" data-lang="english">English</button></div>
<div class="prayers-list">${PRAYERS.map((p,i)=>{const ex=S.prayerExpanded===i,dc=p.diff.toLowerCase();return`<div class="prayer-card ${ex?'expanded':''}" data-idx="${i}"><button class="prayer-header"><div><div class="prayer-title">${p.title}</div><div class="prayer-english-title">${p.et}</div></div><div class="prayer-meta"><span class="difficulty-badge ${dc}">${p.diff}</span><span class="prayer-arrow">\u25be</span></div></button><div class="prayer-body"><div class="prayer-text">${S.prayerShowLatin?annotatePrayer(p):p.english}</div><div class="prayer-translation"><div class="prayer-trans-label">${S.prayerShowLatin?"English:":"Latin:"}</div>${S.prayerShowLatin?p.english:p.latin}</div></div></div>`;}).join("")}</div>`;
  document.querySelectorAll("#view-prayers .toggle-btn").forEach(b=>b.addEventListener("click",()=>{S.prayerShowLatin=b.dataset.lang==="latin";renderPrayers();}));
  document.querySelectorAll(".prayer-header").forEach(b=>b.addEventListener("click",()=>{const i=parseInt(b.closest(".prayer-card").dataset.idx);S.prayerExpanded=S.prayerExpanded===i?null:i;renderPrayers();}));
  document.querySelectorAll(".pw").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const w=el.dataset.word;const prayer=PRAYERS[S.prayerExpanded];if(prayer&&prayer.words&&prayer.words[w])showWordPopup(w,prayer.words[w]);}));
}

// Quiz
function getQuizPool(){return S.quizCategory==="All"?VOCABULARY:VOCABULARY.filter(v=>v.category===S.quizCategory);}
function generateQuestion(){
  const pool=getQuizPool();if(pool.length<4){S.quizCurrent=null;return;}
  // Spaced repetition: weight towards lower-level words
  const weighted=[];pool.forEach(w=>{const lv=srLevel(w.latin);const weight=Math.max(1,5-lv);for(let i=0;i<weight;i++)weighted.push(w);});
  const pick=weighted[Math.floor(Math.random()*weighted.length)];
  S.quizCurrent=pick;
  const wrong=pool.filter(w=>w.latin!==pick.latin).sort(()=>Math.random()-0.5).slice(0,3);
  S.quizOptions=[S.quizCurrent,...wrong].sort(()=>Math.random()-0.5);S.quizSelected=null;
}
function renderQuiz(){
  if(!S.quizCurrent)generateQuestion();
  const cats=["All",...new Set(VOCABULARY.map(v=>v.category))];
  const cur=S.quizCurrent,acc=S.score.total>0?Math.round((S.score.correct/S.score.total)*100):0;
  const isL=S.quizMode==="latin-to-english";
  let fb="";
  if(S.quizSelected!==null){const s=S.quizSelected,ok=isL?s.english===cur.english:s.latin===cur.latin;
    fb=`<div class="quiz-feedback">${ok?`<div class="correct-msg"><b>R\u0113ct\u0113!</b> Correct!</div>`:`<div class="wrong-msg"><b>Err\u0101vist\u012b</b> \u2014 Answer: <i>${isL?cur.english:cur.latin}</i></div>`}<button class="next-btn" id="next-q">Next \u2192</button></div>`;}
  $("practice-content").innerHTML=`
<div class="toggle-row"><button class="toggle-btn ${isL?'active':''}" data-mode="latin-to-english">Latin \u2192 English</button><button class="toggle-btn ${!isL?'active':''}" data-mode="english-to-latin">English \u2192 Latin</button></div>
<div class="quiz-filter-label">Category:</div>
<div class="filter-row">${cats.map(c=>`<button class="filter-btn ${S.quizCategory===c?'active':''}" data-cat="${c}">${c}</button>`).join("")}</div>
<div class="quiz-score-bar"><span>Score: ${S.score.correct}/${S.score.total}</span><span>Accuracy: ${acc}%</span><span>Streak: ${S.streak} \ud83d\udd25</span></div>
${cur?`<div class="quiz-card"><div class="quiz-prompt-label">${isL?"What does this mean?":"Which Latin word means:"}</div><div class="quiz-word">${isL?cur.latin:cur.english}</div>${isL?`<div class="quiz-pronunciation">[${cur.pronunciation}]</div>`:'<div style="margin-bottom:20px"></div>'}<div class="quiz-options">${S.quizOptions.map((o,i)=>{let cls="";if(S.quizSelected!==null){const ok=isL?o.english===cur.english:o.latin===cur.latin;const sel=isL?o.english===S.quizSelected.english:o.latin===S.quizSelected.latin;if(ok)cls="correct";else if(sel)cls="wrong";cls+=" disabled";}return`<button class="quiz-option ${cls}" data-idx="${i}">${isL?o.english:o.latin}</button>`;}).join("")}</div>${fb}</div>`:`<div class="quiz-card"><p>Not enough words. Choose another category.</p></div>`}`;
  document.querySelectorAll("#practice-content > .toggle-row .toggle-btn").forEach(b=>b.addEventListener("click",()=>{S.quizMode=b.dataset.mode;generateQuestion();renderQuiz();}));
  document.querySelectorAll("#practice-content .filter-btn").forEach(b=>b.addEventListener("click",()=>{S.quizCategory=b.dataset.cat;generateQuestion();renderQuiz();}));
  if(S.quizSelected===null&&cur)document.querySelectorAll(".quiz-option").forEach(b=>b.addEventListener("click",()=>{
    const o=S.quizOptions[parseInt(b.dataset.idx)];S.quizSelected=o;
    const ok=isL?o.english===cur.english:o.latin===cur.latin;
    S.score.total++;recordStudyDay();
    if(ok){S.score.correct++;S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;srUp(cur.latin);playCorrect();haptic('success');}
    else{S.streak=0;srDown(cur.latin);playWrong();haptic('error');}
    saveState();renderQuiz();
  }));
  const nq=$("next-q");if(nq)nq.addEventListener("click",()=>{generateQuestion();renderQuiz();});
}

// Sentence Builder
function renderSentenceBuilder(){
  const ex=SENTENCES[S.sbIndex];
  const shuffled=S.sbChecked?ex.correct:[...ex.words].sort(()=>Math.random()-0.5);
  if(!S.sbPlaced.length&&!S.sbChecked)S.sbPlaced=[];
  const avail=shuffled.filter((_,i)=>!S.sbPlaced.includes(i));
  const isCorrect=S.sbChecked&&S.sbPlaced.map(i=>shuffled[i]).join(" ")===ex.correct.join(" ");
  $("practice-content").innerHTML=`
<div class="quiz-card"><div class="quiz-prompt-label">Arrange the Latin words (${S.sbIndex+1}/${SENTENCES.length})</div>
<div class="sb-english">${ex.en}</div>
<div class="sb-answer" id="sb-answer">${S.sbPlaced.map((idx,pos)=>`<button class="sb-word" data-remove="${pos}">${shuffled[idx]}</button>`).join("")}${S.sbPlaced.length===0?'<span style="color:var(--brown-faint);font-size:0.85rem">Tap words below to build the sentence</span>':''}</div>
<div class="sb-words">${shuffled.map((w,i)=>`<button class="sb-word ${S.sbPlaced.includes(i)?'placed':''}" data-idx="${i}">${w}</button>`).join("")}</div>
${S.sbChecked?`<div class="quiz-feedback">${isCorrect?'<div class="correct-msg"><b>R\u0113ct\u0113!</b></div>':`<div class="wrong-msg"><b>Correct:</b> ${ex.correct.join(" ")}</div>`}</div>`:''}
<div style="text-align:center;margin-top:10px">${!S.sbChecked?`<button class="drill-btn" id="sb-check" ${S.sbPlaced.length<ex.correct.length?'disabled style="opacity:0.4"':''}>Check</button><button class="drill-btn" id="sb-clear" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Clear</button>`:`<button class="drill-btn" id="sb-next">Next Sentence \u2192</button>`}</div>
</div>`;
  document.querySelectorAll(".sb-words .sb-word:not(.placed)").forEach(b=>b.addEventListener("click",()=>{
    if(S.sbChecked)return;S.sbPlaced.push(parseInt(b.dataset.idx));renderSentenceBuilder();}));
  document.querySelectorAll("#sb-answer .sb-word").forEach(b=>b.addEventListener("click",()=>{
    if(S.sbChecked)return;S.sbPlaced.splice(parseInt(b.dataset.remove),1);renderSentenceBuilder();}));
  const checkBtn=$("sb-check");if(checkBtn)checkBtn.addEventListener("click",()=>{S.sbChecked=true;recordStudyDay();saveState();const sbWords=SENTENCES[S.sbIndex];const sbShuffled=[...sbWords.words].sort(()=>Math.random()-0.5);if(S.sbPlaced.map(i=>sbWords.words[i]).join(' ')===sbWords.correct.join(' ')){playCorrect();haptic('success');}else{playWrong();haptic('error');}renderSentenceBuilder();});
  const clearBtn=$("sb-clear");if(clearBtn)clearBtn.addEventListener("click",()=>{S.sbPlaced=[];renderSentenceBuilder();});
  const nextBtn=$("sb-next");if(nextBtn)nextBtn.addEventListener("click",()=>{S.sbIndex=(S.sbIndex+1)%SENTENCES.length;S.sbPlaced=[];S.sbChecked=false;renderSentenceBuilder();});
}
