<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1209" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scriptoria" />
  <meta name="description" content="Your whole life of prayer, gathered into one quiet manuscript." />
  <title>Scriptoria</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231e3a5f'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='40' font-weight='700' text-anchor='middle' fill='%23e6c558'%3E%E2%98%A7%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f4ecd8'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='40' font-weight='700' text-anchor='middle' fill='%23c9a32f'%3E%E2%98%A7%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS — LIGHT THEME
       ============================================================ */
    :root {
      /* Parchment palette */
      --parchment:        #f8f3e8;
      --parchment-warm:   #f4edda;
      --vellum:           #fdf8ef;
      --vellum-95:        rgba(253, 248, 239, 0.95);
      --leaf:             #ede5cf;
      --leaf-95:          rgba(237, 229, 207, 0.95);
      --leaf-80:          rgba(237, 229, 207, 0.80);

      /* Ink palette */
      --ink:              #1a1209;
      --ink-deep:         #0d0904;
      --ink-soft:         #4a3f2f;
      --ink-muted:        #7a6e5f;
      --ink-faint:        #b0a898;

      /* Gold palette */
      --gold:             #b8860b;
      --gold-light:       #d4a017;
      --gold-bright:      #f0b429;
      --gold-pale:        #e8d5a0;
      --gold-20:          rgba(184, 134, 11, 0.20);
      --gold-08:          rgba(184, 134, 11, 0.08);
      --gold-04:          rgba(184, 134, 11, 0.04);
      --gold-gradient:    linear-gradient(90deg, transparent, #b8860b 30%, #d4a017 50%, #b8860b 70%, transparent);

      /* Lapis palette */
      --lapis:            #1a3a6b;
      --lapis-deep:       #0f2347;
      --lapis-mid:        #2a5298;
      --lapis-light:      #4a72b8;
      --lapis-pale:       #d0ddf0;
      --lapis-10:         rgba(26, 58, 107, 0.10);

      /* Vermillion */
      --vermillion:       #c0392b;
      --vermillion-soft:  #e74c3c;

      /* Amethyst */
      --amethyst:         #6b3a7a;
      --amethyst-deep:    #4a1f5c;
      --amethyst-light:   #9b5cb5;
      --amethyst-pale:    #e8d5f0;
      --amethyst-10:      rgba(107, 58, 122, 0.10);

      /* Emerald */
      --emerald:          #1a5c38;
      --emerald-light:    #2e8b57;

      /* Typography */
      --font-display:     'Cinzel', 'Times New Roman', serif;
      --font-body:        'Cormorant Garamond', 'Georgia', serif;
      --font-ui:          'Outfit', 'Helvetica Neue', sans-serif;

      /* Spacing */
      --sp-1:  4px;
      --sp-2:  8px;
      --sp-3:  12px;
      --sp-4:  16px;
      --sp-5:  20px;
      --sp-6:  24px;
      --sp-8:  32px;
      --sp-10: 40px;
      --sp-12: 48px;

      /* Radii */
      --r-sm:  6px;
      --r-md:  12px;
      --r-lg:  18px;
      --r-xl:  24px;
      --r-full: 9999px;

      /* Shadows */
      --shadow-sm:   0 1px 3px rgba(26,18,9,0.08), 0 1px 2px rgba(26,18,9,0.04);
      --shadow-md:   0 4px 12px rgba(26,18,9,0.10), 0 2px 4px rgba(26,18,9,0.06);
      --shadow-lg:   0 8px 24px rgba(26,18,9,0.12), 0 4px 8px rgba(26,18,9,0.08);
      --shadow-gold: 0 2px 12px rgba(184,134,11,0.25);

      /* Transitions */
      --t-fast:   0.15s ease;
      --t-base:   0.20s ease;
      --t-slow:   0.35s ease;

      /* Z-indices */
      --z-screen: 10;
      --z-tabbar: 100;
      --z-modal:  300;
      --z-status: 200;
    }

    /* ============================================================
       DARK THEME OVERRIDES
       ============================================================ */
    [data-theme="dark"] {
      --parchment:        #12100a;
      --parchment-warm:   #1a1610;
      --vellum:           #1e1a12;
      --vellum-95:        rgba(30, 26, 18, 0.95);
      --leaf:             #2a2418;
      --leaf-95:          rgba(42, 36, 24, 0.95);
      --leaf-80:          rgba(42, 36, 24, 0.80);

      --ink:              #f0e8d4;
      --ink-deep:         #fdf8ef;
      --ink-soft:         #c8b896;
      --ink-muted:        #8a7e6c;
      --ink-faint:        #4a4234;

      --gold:             #d4a017;
      --gold-light:       #e8b830;
      --gold-bright:      #f5c842;
      --gold-pale:        #3a2f10;
      --gold-20:          rgba(212, 160, 23, 0.20);
      --gold-08:          rgba(212, 160, 23, 0.08);
      --gold-04:          rgba(212, 160, 23, 0.04);

      --lapis:            #4a72b8;
      --lapis-deep:       #1a3a6b;
      --lapis-mid:        #2a5298;
      --lapis-light:      #6a8fd0;
      --lapis-pale:       #1a2a42;
      --lapis-10:         rgba(74, 114, 184, 0.15);

      --amethyst:         #9b5cb5;
      --amethyst-deep:    #6b3a7a;
      --amethyst-light:   #b87ad0;
      --amethyst-pale:    #2a1535;
      --amethyst-10:      rgba(155, 92, 181, 0.15);

      --shadow-sm:   0 1px 3px rgba(0,0,0,0.30), 0 1px 2px rgba(0,0,0,0.20);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.20);
      --shadow-lg:   0 8px 24px rgba(0,0,0,0.40), 0 4px 8px rgba(0,0,0,0.25);
      --shadow-gold: 0 2px 12px rgba(212,160,23,0.30);
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.0625rem;
      line-height: 1.65;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================================
       APP CONTAINER
       ============================================================ */
    .app {
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: var(--parchment);
    }

    /* ============================================================
       STATUS BAR
       ============================================================ */
    .status-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 50px;
      background: var(--vellum);
      border-bottom: 1px solid var(--gold-20);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--sp-5);
      z-index: var(--z-status);
      font-family: var(--font-ui);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--ink);
    }

    .status-bar .time {
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .status-bar .indicators {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .status-bar svg {
      width: 16px;
      height: 16px;
      fill: var(--ink);
    }

    /* ============================================================
       TAB BAR
       ============================================================ */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 78px;
      background: var(--leaf-95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--gold-20);
      display: flex;
      align-items: stretch;
      z-index: var(--z-tabbar);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      color: var(--ink-muted);
      transition: color var(--t-base);
      padding: var(--sp-2) 0 var(--sp-3);
      border: none;
      background: transparent;
      font-family: var(--font-ui);
      -webkit-tap-highlight-color: transparent;
    }

    .tab-item:active {
      opacity: 0.7;
    }

    .tab-item.active {
      color: var(--lapis-mid);
    }

    .tab-item svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-item.active svg {
      stroke: var(--lapis-mid);
    }

    .tab-label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ============================================================
       SCREENS
       ============================================================ */
    .screen {
      position: fixed;
      top: 50px;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--parchment);
      -webkit-overflow-scrolling: touch;
      z-index: var(--z-screen);
    }

    .screen-inner {
      padding: var(--sp-6) var(--sp-5) var(--sp-10);
    }

    /* Onboarding screen fills entire viewport */
    .screen-onboard {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: var(--parchment);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ============================================================
       VELLUM CARD
       ============================================================ */
    .vellum {
      background: var(--vellum);
      border: 1px solid var(--gold-20);
      border-radius: var(--r-lg);
      padding: var(--sp-6);
      box-shadow: var(--shadow-sm);
    }

    .vellum + .vellum {
      margin-top: var(--sp-4);
    }

    /* ============================================================
       LAPIS PANEL
       ============================================================ */
    .lapis-panel {
      background: var(--lapis-deep);
      color: white;
      border-radius: var(--r-lg);
      padding: var(--sp-6);
      box-shadow: var(--shadow-md);
    }

    /* ============================================================
       GILT RULE
       ============================================================ */
    .gilt-rule {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin: var(--sp-5) 0;
    }

    .gilt-rule span:not(.ornament) {
      flex: 1;
      height: 1px;
      background: var(--gold-gradient);
    }

    .gilt-rule .ornament {
      color: var(--gold);
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ============================================================
       DROP CAP
       ============================================================ */
    .dropcap::first-letter {
      font-family: var(--font-display);
      font-size: 3.5em;
      font-weight: 700;
      color: var(--lapis-deep);
      float: left;
      line-height: 0.78;
      margin-right: 0.08em;
      margin-top: 0.06em;
    }

    [data-theme="dark"] .dropcap::first-letter {
      color: var(--gold);
    }

    /* ============================================================
       KEYLINE CALLOUT
       ============================================================ */
    .keyline-gold {
      background: var(--gold-08);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      padding: var(--sp-4) var(--sp-5);
    }

    .keyline-amethyst {
      background: var(--amethyst-10);
      border-left: 3px solid var(--amethyst);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      padding: var(--sp-4) var(--sp-5);
    }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      font-family: var(--font-ui);
      font-size: 0.9375rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      border-radius: var(--r-full);
      cursor: pointer;
      padding: var(--sp-3) var(--sp-8);
      transition: opacity var(--t-base), transform var(--t-fast), box-shadow var(--t-base);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.88;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      color: var(--ink-deep);
      box-shadow: var(--shadow-gold);
    }

    .btn-gold:hover {
      box-shadow: 0 4px 18px rgba(184,134,11,0.38);
    }

    .btn-lapis {
      background: var(--lapis-deep);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-lapis:hover {
      background: var(--lapis);
    }

    .btn-outline {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--gold-20);
    }

    .btn-outline:hover {
      background: var(--gold-04);
      border-color: var(--gold);
    }

    .btn-amethyst {
      background: var(--amethyst-deep);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-amethyst:hover {
      background: var(--amethyst);
    }

    .btn-block {
      width: 100%;
      padding: var(--sp-4) var(--sp-6);
      font-size: 1rem;
    }

    /* ============================================================
       TYPOGRAPHY UTILITIES
       ============================================================ */
    .font-display  { font-family: var(--font-display); }
    .font-body     { font-family: var(--font-body); }
    .font-ui       { font-family: var(--font-ui); }

    .text-xs       { font-size: 0.75rem; }
    .text-sm       { font-size: 0.875rem; }
    .text-base     { font-size: 1rem; }
    .text-lg       { font-size: 1.125rem; }
    .text-xl       { font-size: 1.25rem; }
    .text-2xl      { font-size: 1.5rem; }
    .text-3xl      { font-size: 1.875rem; }
    .text-4xl      { font-size: 2.25rem; }

    .font-300      { font-weight: 300; }
    .font-400      { font-weight: 400; }
    .font-500      { font-weight: 500; }
    .font-600      { font-weight: 600; }
    .font-700      { font-weight: 700; }

    .italic        { font-style: italic; }
    .uppercase     { text-transform: uppercase; }
    .tracking-wide { letter-spacing: 0.06em; }
    .tracking-wider { letter-spacing: 0.10em; }
    .leading-snug  { line-height: 1.35; }
    .leading-relaxed { line-height: 1.75; }

    .text-center   { text-align: center; }
    .text-right    { text-align: right; }

    .color-gold    { color: var(--gold); }
    .color-gold-light { color: var(--gold-light); }
    .color-lapis   { color: var(--lapis-mid); }
    .color-lapis-light { color: var(--lapis-light); }
    .color-amethyst { color: var(--amethyst); }
    .color-vermillion { color: var(--vermillion); }
    .color-ink-soft  { color: var(--ink-soft); }
    .color-ink-muted { color: var(--ink-muted); }
    .color-ink-faint { color: var(--ink-faint); }
    .color-white   { color: white; }

    /* ============================================================
       SPACING UTILITIES
       ============================================================ */
    .mt-1 { margin-top: var(--sp-1); }
    .mt-2 { margin-top: var(--sp-2); }
    .mt-3 { margin-top: var(--sp-3); }
    .mt-4 { margin-top: var(--sp-4); }
    .mt-5 { margin-top: var(--sp-5); }
    .mt-6 { margin-top: var(--sp-6); }
    .mt-8 { margin-top: var(--sp-8); }
    .mt-10 { margin-top: var(--sp-10); }
    .mt-12 { margin-top: var(--sp-12); }

    .mb-1 { margin-bottom: var(--sp-1); }
    .mb-2 { margin-bottom: var(--sp-2); }
    .mb-3 { margin-bottom: var(--sp-3); }
    .mb-4 { margin-bottom: var(--sp-4); }
    .mb-5 { margin-bottom: var(--sp-5); }
    .mb-6 { margin-bottom: var(--sp-6); }
    .mb-8 { margin-bottom: var(--sp-8); }

    .mx-auto { margin-left: auto; margin-right: auto; }

    .p-4  { padding: var(--sp-4); }
    .p-5  { padding: var(--sp-5); }
    .p-6  { padding: var(--sp-6); }
    .px-4 { padding-left: var(--sp-4); padding-right: var(--sp-4); }
    .px-5 { padding-left: var(--sp-5); padding-right: var(--sp-5); }
    .py-3 { padding-top: var(--sp-3); padding-bottom: var(--sp-3); }
    .py-4 { padding-top: var(--sp-4); padding-bottom: var(--sp-4); }

    /* ============================================================
       FLEX UTILITIES
       ============================================================ */
    .flex           { display: flex; }
    .flex-col       { flex-direction: column; }
    .items-center   { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .gap-2          { gap: var(--sp-2); }
    .gap-3          { gap: var(--sp-3); }
    .gap-4          { gap: var(--sp-4); }

    /* ============================================================
       EYEBROW / LABEL
       ============================================================ */
    .eyebrow {
      font-family: var(--font-ui);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .eyebrow-gold {
      font-family: var(--font-ui);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ============================================================
       HAIRLINE DIVIDER
       ============================================================ */
    .hairline {
      height: 1px;
      background: var(--gold-20);
      margin: var(--sp-4) 0;
    }

    /* ============================================================
       CHI-RHO COIN
       ============================================================ */
    .chirho-coin {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--lapis-deep);
      color: var(--gold-light);
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 0 0 2px var(--gold-20), var(--shadow-gold);
      flex-shrink: 0;
    }

    .chirho-coin.sm {
      width: 34px;
      height: 34px;
      font-size: 1.1rem;
    }

    .chirho-coin.lg {
      width: 128px;
      height: 128px;
      font-size: 4rem;
      box-shadow: 0 0 0 3px var(--gold), 0 0 0 6px var(--gold-20), var(--shadow-gold);
    }

    /* ============================================================
       STREAK RIBBON
       ============================================================ */
    .streak-ribbon {
      text-align: center;
      font-family: var(--font-ui);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      padding: var(--sp-2) 0;
    }

    /* ============================================================
       MASTHEAD
       ============================================================ */
    .masthead {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: var(--sp-6) var(--sp-4) var(--sp-4);
    }

    .masthead-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-2);
    }

    .masthead-title {
      font-family: var(--font-display);
      font-size: 1.625rem;
      font-weight: 600;
      color: var(--ink-deep);
      letter-spacing: 0.04em;
    }

    .masthead-date {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-soft);
      margin-top: var(--sp-1);
    }

    .masthead-week {
      font-family: var(--font-ui);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: var(--sp-1);
    }

    /* ============================================================
       PRAYER / AMEN LINE
       ============================================================ */
    .amen {
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--vermillion);
      text-transform: uppercase;
      margin-top: var(--sp-3);
    }

    .latin-footnote {
      font-family: var(--font-body);
      font-size: 0.9375rem;
      margin-top: var(--sp-3);
      border-top: 1px solid var(--gold-20);
      padding-top: var(--sp-2);
    }
    .latin-footnote .latin-phrase {
      font-style: italic;
      color: var(--ink-soft);
      border-bottom: 1px dotted var(--gold-dark);
    }
    .latin-footnote .latin-gloss {
      color: var(--ink-faint);
      margin-left: var(--sp-2);
    }

    /* ============================================================
       PLACEHOLDER SCREEN
       ============================================================ */
    .placeholder-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      gap: var(--sp-4);
      color: var(--ink-muted);
      font-family: var(--font-ui);
      font-size: 0.9375rem;
    }

    .placeholder-screen .placeholder-icon {
      font-size: 2.5rem;
      opacity: 0.5;
    }

    /* ============================================================
       LINK-STYLE TEXT BUTTON
       ============================================================ */
    .text-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.9375rem;
      color: var(--lapis-mid);
      text-decoration: underline;
      text-decoration-color: var(--lapis-10);
      padding: var(--sp-2) var(--sp-3);
      transition: color var(--t-base);
    }

    .text-btn:hover {
      color: var(--lapis);
    }

    /* ============================================================
       ANIMATIONS
       ============================================================ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(184,134,11,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(184,134,11,0); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(24px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .anim-fade-in  { animation: fadeIn  0.4s ease both; }
    .anim-fade-up  { animation: fadeUp  0.5s ease both; }
    .anim-float-up { animation: floatUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }

    .pulse-node {
      animation: pulse 2s ease-in-out infinite;
    }

    /* Staggered children */
    .stagger > * { animation: fadeUp 0.45s ease both; }
    .stagger > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger > *:nth-child(2) { animation-delay: 0.12s; }
    .stagger > *:nth-child(3) { animation-delay: 0.19s; }
    .stagger > *:nth-child(4) { animation-delay: 0.26s; }
    .stagger > *:nth-child(5) { animation-delay: 0.33s; }
    .stagger > *:nth-child(6) { animation-delay: 0.40s; }

    /* ============================================================
       ONBOARDING SCREEN
       ============================================================ */
    .onboard-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-10) var(--sp-6);
      text-align: center;
    }

    .onboard-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink-deep);
      margin-top: var(--sp-6);
      line-height: 1.1;
    }

    .onboard-tagline {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.125rem;
      color: var(--ink-soft);
      line-height: 1.55;
      max-width: 300px;
      margin: var(--sp-3) auto 0;
    }

    .onboard-body {
      font-family: var(--font-body);
      font-size: 1.0625rem;
      color: var(--ink-soft);
      line-height: 1.7;
      max-width: 320px;
      margin: 0 auto;
    }

    .companion-list {
      list-style: none;
      text-align: left;
      margin: var(--sp-4) auto;
      max-width: 280px;
    }

    .companion-list li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--ink-soft);
      padding: var(--sp-2) 0;
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      border-bottom: 1px solid var(--gold-08);
    }

    .companion-list li:last-child {
      border-bottom: none;
    }

    .companion-list .c-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--lapis-deep);
      color: var(--gold-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .companion-list .c-name {
      font-weight: 500;
      color: var(--ink);
    }

    .companion-list .c-desc {
      font-size: 0.875rem;
      color: var(--ink-muted);
      font-style: italic;
    }

    /* ============================================================
       TODAY SCREEN SPECIFICS
       ============================================================ */
    .today-content {
      padding: 0 var(--sp-5) var(--sp-12);
    }

    .gospel-card-eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-3);
    }

    .thought-card { text-align: center; }
    .thought-card p {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.0625rem;
      color: var(--lapis-mid);
      line-height: 1.7;
    }

    /* ============================================================
       DARK THEME SPECIFIC ADJUSTMENTS
       ============================================================ */
    [data-theme="dark"] .masthead-title {
      color: var(--ink-deep);
    }

    [data-theme="dark"] .status-bar {
      border-bottom-color: var(--gold-20);
    }

    [data-theme="dark"] .chirho-coin {
      background: var(--lapis-deep);
    }

    [data-theme="dark"] .vellum {
      border-color: var(--gold-20);
    }

    [data-theme="dark"] .btn-gold {
      color: var(--ink-deep);
    }

    /* ============================================================
       SCROLLBAR STYLING
       ============================================================ */
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: var(--gold-20); border-radius: 2px; }

    /* ============================================================
       PRAY SCREEN
       ============================================================ */
    .pray-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); margin: var(--sp-4) 0; }
    .pray-tile {
      background: var(--vellum); border: 1px solid var(--gold-20); border-radius: var(--r-lg);
      padding: var(--sp-5) var(--sp-4); cursor: pointer; transition: box-shadow var(--t-base), transform var(--t-fast);
      display: flex; flex-direction: column; gap: var(--sp-2);
    }
    .pray-tile:active { transform: scale(0.97); }
    .pray-tile:hover { box-shadow: var(--shadow-md); }
    .pray-tile .tile-icon { font-size: 1.5rem; color: var(--lapis-mid); }
    .pray-tile .tile-title { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; color: var(--ink); letter-spacing: 0.03em; }
    .pray-tile .tile-sub { font-family: var(--font-body); font-size: 0.875rem; font-style: italic; color: var(--ink-muted); }
    .prayer-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-4) var(--sp-2); border-bottom: 1px solid var(--gold-08);
      cursor: pointer; transition: background var(--t-base); border-radius: var(--r-sm);
    }
    .prayer-row:hover { background: var(--gold-04); }
    .prayer-row:active { background: var(--gold-08); }
    .prayer-row .pr-latin { font-family: var(--font-display); font-size: 0.9375rem; font-weight: 600; color: var(--ink); }
    .prayer-row .pr-en { font-family: var(--font-body); font-style: italic; font-size: 0.875rem; color: var(--ink-muted); }
    .prayer-row .pr-chev { color: var(--gold); font-size: 1.1rem; }
    .bead-dots { display: flex; gap: 6px; justify-content: center; margin: var(--sp-3) 0; }
    .bead-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.3); border: 1.5px solid rgba(255,255,255,0.5);
    }
    .bead-dot.current { background: var(--gold-light); border-color: var(--gold); }

    /* ============================================================
       ROSARY PLAYER
       ============================================================ */
    .rosary-header {
      background: var(--lapis-deep); color: white; padding: var(--sp-5) var(--sp-5) var(--sp-4);
      display: flex; align-items: center; justify-content: space-between;
    }
    .rosary-header h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; }
    .rosary-header .mystery-sub { font-family: var(--font-body); font-style: italic; font-size: 0.875rem; opacity: 0.8; margin-top: 2px; }
    .rosary-close { background: rgba(255,255,255,0.15); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .rosary-beads {
      background: var(--lapis-deep); padding: var(--sp-3) var(--sp-5) var(--sp-5);
      display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;
    }
    .rosary-bead {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(201,163,47,0.3); border: 1.5px solid rgba(201,163,47,0.5);
      flex-shrink: 0;
    }
    .rosary-bead.active { background: var(--gold-light); border-color: var(--gold); box-shadow: 0 0 6px rgba(201,163,47,0.6); }
    .rosary-counter { text-align: center; font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin: var(--sp-3) 0; }
    .rosary-prayer { padding: var(--sp-4) var(--sp-6) var(--sp-5); text-align: center; }
    .rosary-prayer .prayer-name { font-family: var(--font-display); font-size: 0.8125rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: var(--sp-3); }
    .rosary-prayer .prayer-text { font-family: var(--font-body); font-size: 1.05rem; line-height: 1.72; color: var(--ink); }
    .rosary-prayer .prayer-latin { font-family: var(--font-body); font-style: italic; font-size: 0.9375rem; color: var(--ink-muted); margin-top: var(--sp-3); line-height: 1.65; }
    .rosary-footer { display: flex; gap: var(--sp-3); padding: var(--sp-4) var(--sp-5); border-top: 1px solid var(--gold-20); }
    .rosary-footer button { flex: 1; }

    /* ============================================================
       HOURS TIMELINE
       ============================================================ */
    .hours-timeline { position: relative; padding: var(--sp-4) var(--sp-5) var(--sp-12); }
    .hours-track {
      position: absolute; left: calc(var(--sp-5) + 16px); top: var(--sp-4); bottom: 0;
      width: 2px; background: linear-gradient(to bottom, var(--gold-20) 0%, var(--gold) 40%, var(--gold-20) 100%);
    }
    .hour-row { display: flex; gap: var(--sp-4); margin-bottom: var(--sp-5); position: relative; }
    .hour-node {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; z-index: 1; position: relative;
    }
    .hour-node.done { background: var(--emerald); color: white; }
    .hour-node.current { background: var(--gold); color: var(--ink-deep); animation: pulse 2s ease-in-out infinite; }
    .hour-node.upcoming { background: var(--parchment); border: 2px solid var(--gold-20); color: var(--ink-faint); }
    .hour-info { flex: 1; padding-top: 6px; }
    .hour-name { font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--ink); }
    .hour-time { font-family: var(--font-ui); font-size: 0.75rem; color: var(--ink-muted); margin-top: 2px; }
    .hour-card { margin-top: var(--sp-3); }

    /* ============================================================
       EXAMEN
       ============================================================ */
    .examen-card {
      background: var(--vellum); border: 1px solid var(--gold-20); border-radius: var(--r-lg);
      padding: var(--sp-5); margin-bottom: var(--sp-3);
    }
    .examen-card.dimmed { opacity: 0.65; }
    .examen-num { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.10em; color: var(--gold); margin-bottom: var(--sp-2); text-transform: uppercase; }
    .examen-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--ink); margin-bottom: var(--sp-2); }
    .examen-body { font-family: var(--font-body); font-size: 1rem; color: var(--ink-soft); line-height: 1.65; margin-bottom: var(--sp-3); }
    .examen-textarea {
      width: 100%; min-height: 100px; background: rgba(255,255,255,0.6);
      border: 1px solid var(--gold-20); border-radius: var(--r-md);
      padding: var(--sp-3); font-family: var(--font-body); font-size: 1rem;
      color: var(--ink); resize: vertical; outline: none; transition: border-color var(--t-base);
    }
    .examen-textarea:focus { border-color: var(--gold); }

    /* ============================================================
       LEARN SCREEN
       ============================================================ */
    .learn-card { margin-bottom: var(--sp-4); }
    .coin { display: flex; align-items: center; justify-content: center; border-radius: 50%; font-family: var(--font-display); font-weight: 700; flex-shrink: 0; }
    .coin-gold { width: 48px; height: 48px; background: var(--lapis-deep); color: var(--gold-light); font-size: 1.4rem; box-shadow: 0 0 0 2px var(--gold-20); }
    .coin-lapis { width: 48px; height: 48px; background: var(--lapis-mid); color: white; font-size: 1.3rem; box-shadow: 0 0 0 2px var(--lapis-10); }
    .progress-bar-track { height: 6px; background: var(--gold-08); border-radius: var(--r-full); overflow: hidden; margin: var(--sp-3) 0; }
    .progress-bar-fill { height: 100%; border-radius: var(--r-full); background: linear-gradient(90deg, var(--lapis-deep), var(--lapis-mid)); transition: width 0.4s ease; }
    .stat-cells { display: flex; gap: var(--sp-3); margin: var(--sp-3) 0; }
    .stat-cell { flex: 1; background: var(--gold-04); border: 1px solid var(--gold-08); border-radius: var(--r-md); padding: var(--sp-3) var(--sp-4); text-align: center; }
    .stat-cell .stat-num { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--lapis-mid); }
    .stat-cell .stat-label { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); margin-top: 2px; }

    /* Credo lesson */
    .credo-topbar { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4) var(--sp-5); border-bottom: 1px solid var(--gold-08); }
    .credo-progress { flex: 1; height: 4px; background: var(--gold-08); border-radius: var(--r-full); overflow: hidden; }
    .credo-progress-fill { height: 100%; background: var(--lapis-mid); border-radius: var(--r-full); }
    .credo-counter { font-family: var(--font-ui); font-size: 0.8125rem; font-weight: 600; color: var(--ink-muted); white-space: nowrap; }
    .option-btn {
      width: 100%; display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-4) var(--sp-5); border: 1.5px solid var(--gold-20);
      border-radius: var(--r-md); background: var(--vellum); cursor: pointer;
      margin-bottom: var(--sp-3); text-align: left; font-family: var(--font-body);
      font-size: 1.0625rem; color: var(--ink); transition: all var(--t-base);
    }
    .option-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-04); }
    .option-btn .opt-letter { font-family: var(--font-display); font-size: 0.8125rem; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; background: var(--gold-08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--gold); }
    .option-btn.correct { border-color: var(--emerald); background: rgba(26,92,56,0.08); }
    .option-btn.correct .opt-letter { background: var(--emerald); color: white; }
    .option-btn.wrong { border-color: var(--ink-faint); background: var(--gold-04); opacity: 0.6; }
    .option-btn.selected-wrong { border-color: var(--vermillion); background: rgba(192,57,43,0.06); }
    .feedback-callout { background: rgba(26,92,56,0.08); border-left: 3px solid var(--emerald); border-radius: 0 var(--r-md) var(--r-md) 0; padding: var(--sp-4) var(--sp-5); margin: var(--sp-3) 0; }
    .feedback-callout .feedback-label { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--emerald); margin-bottom: var(--sp-1); }
    .feedback-callout p { font-family: var(--font-body); font-size: 1rem; color: var(--ink-soft); font-style: italic; }

    /* Flashcard */
    .flash-dots { display: flex; gap: 6px; justify-content: center; margin: var(--sp-3) 0; }
    .flash-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(201,163,47,0.2); }
    .flash-dot.done { background: var(--emerald); }
    .flash-dot.current { background: var(--gold); }
    .flash-card-wrap { perspective: 1000px; margin: var(--sp-4) 0; }
    .flash-card {
      background: var(--vellum); border: 1px solid var(--gold-20); border-radius: var(--r-lg);
      min-height: 280px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: var(--sp-8) var(--sp-6); cursor: pointer;
      box-shadow: var(--shadow-md); transition: box-shadow var(--t-base), transform var(--t-fast);
      text-align: center;
    }
    .flash-card:active { transform: scale(0.98); }
    .flash-word { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
    .flash-meaning { font-family: var(--font-body); font-style: italic; font-size: 1.375rem; color: var(--ink-soft); margin-top: var(--sp-3); }
    .flash-example { font-family: var(--font-body); font-style: italic; font-size: 0.9375rem; color: var(--lapis-mid); margin-top: var(--sp-4); border-top: 1px solid var(--gold-20); padding-top: var(--sp-3); }
    .flash-hidden { font-size: 2rem; color: var(--gold-20); margin-bottom: var(--sp-3); }
    .flash-tap-hint { font-family: var(--font-ui); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-top: var(--sp-3); }
    .recall-btns { display: flex; gap: var(--sp-3); margin-top: var(--sp-2); }
    .recall-btns button { flex: 1; }
    .btn-again { background: transparent; border: 1.5px solid var(--vermillion); color: var(--vermillion); border-radius: var(--r-full); padding: var(--sp-3) var(--sp-5); font-family: var(--font-ui); font-size: 0.9375rem; cursor: pointer; transition: all var(--t-base); }
    .btn-again:hover { background: rgba(192,57,43,0.06); }

    /* ============================================================
       FIND SCREEN
       ============================================================ */
    .filter-chips { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin: var(--sp-4) 0; }
    .chip {
      font-family: var(--font-ui); font-size: 0.8125rem; font-weight: 500;
      padding: 6px 14px; border-radius: var(--r-full); cursor: pointer;
      transition: all var(--t-base); border: 1.5px solid var(--gold-20);
      background: transparent; color: var(--ink-soft);
    }
    .chip.active { background: var(--lapis-deep); color: white; border-color: var(--lapis-deep); }
    .chip:hover:not(.active) { border-color: var(--gold); color: var(--ink); }
    .parish-card {
      background: var(--vellum); border: 1px solid var(--gold-20); border-radius: var(--r-lg);
      padding: var(--sp-5); margin-bottom: var(--sp-3); cursor: pointer;
      transition: box-shadow var(--t-base), transform var(--t-fast);
    }
    .parish-card:active { transform: scale(0.98); }
    .parish-card.soonest { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.12); }
    .parish-card:hover { box-shadow: var(--shadow-md); }
    .parish-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-3); }
    .parish-name { font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
    .parish-meta { font-family: var(--font-ui); font-size: 0.75rem; color: var(--ink-muted); margin-top: 3px; }
    .badge-soonest { background: var(--gold); color: var(--ink-deep); font-family: var(--font-ui); font-size: 0.625rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: var(--r-full); white-space: nowrap; }
    .badge-adoration { font-family: var(--font-ui); font-size: 0.75rem; font-weight: 600; color: var(--emerald); margin-top: var(--sp-2); }
    .conf-chips { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-top: var(--sp-3); }
    .conf-chip { font-family: var(--font-ui); font-size: 0.75rem; font-weight: 500; padding: 4px 10px; border-radius: var(--r-full); border: 1.5px solid var(--gold-20); color: var(--ink-soft); }
    .conf-chip.today-chip { background: var(--gold); color: var(--ink-deep); border-color: var(--gold); }
    .detail-header {
      background: var(--lapis-deep); color: white;
      padding: var(--sp-5) var(--sp-5) var(--sp-4);
      display: flex; align-items: center; gap: var(--sp-3);
    }
    .detail-back { background: rgba(255,255,255,0.15); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .detail-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; letter-spacing: 0.03em; flex: 1; }
    .detail-dist { font-family: var(--font-ui); font-size: 0.8125rem; opacity: 0.8; white-space: nowrap; }
    .section-eyebrow { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: var(--sp-3); }
    .conf-row { display: flex; justify-content: space-between; padding: var(--sp-3) 0; border-bottom: 1px solid var(--gold-08); font-family: var(--font-body); font-size: 1rem; }
    .actions-row { display: flex; gap: var(--sp-3); margin: var(--sp-5) 0; }
    .actions-row button { flex: 1; font-size: 0.875rem; padding: var(--sp-3) var(--sp-2); }

    /* ============================================================
       ME / PROFILE SCREEN
       ============================================================ */
    .profile-head { display: flex; flex-direction: column; align-items: center; padding: var(--sp-6) var(--sp-5) var(--sp-4); text-align: center; }
    .profile-coin { width: 84px; height: 84px; border-radius: 50%; background: var(--lapis-deep); color: var(--gold-light); font-family: var(--font-display); font-size: 1.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 3px var(--gold), 0 0 0 6px var(--gold-20), var(--shadow-md); }
    .profile-name { font-family: var(--font-display); font-size: 1.375rem; font-weight: 600; letter-spacing: 0.04em; margin-top: var(--sp-3); }
    .profile-sub { font-family: var(--font-body); font-style: italic; font-size: 0.9375rem; color: var(--ink-muted); margin-top: var(--sp-1); }
    .week-dots { display: flex; gap: var(--sp-2); justify-content: center; margin-top: var(--sp-3); }
    .week-dot { width: 10px; height: 10px; border-radius: 50%; }
    .week-dot.lit { background: var(--gold); }
    .week-dot.dim { background: rgba(201,163,47,0.25); }
    .tracker-row {
      display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4);
      border: 1px solid var(--gold-08); border-radius: var(--r-md);
      background: rgba(255,255,255,0.5); margin-bottom: var(--sp-2); cursor: pointer;
      transition: background var(--t-base); -webkit-tap-highlight-color: transparent;
    }
    .tracker-row:hover { background: rgba(255,255,255,0.75); }
    .tracker-row:active { transform: scale(0.98); }
    .tracker-icon { font-size: 1.2rem; width: 32px; text-align: center; flex-shrink: 0; }
    .tracker-label { font-family: var(--font-display); font-size: 0.9375rem; font-weight: 600; color: var(--ink); }
    .tracker-sub { font-family: var(--font-body); font-style: italic; font-size: 0.875rem; color: var(--ink-muted); margin-top: 2px; }
    .tracker-chev { color: var(--ink-faint); font-size: 1rem; margin-left: auto; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-4) 0; border-bottom: 1px solid var(--gold-08); }
    .toggle-label { font-family: var(--font-ui); font-size: 0.9375rem; color: var(--ink); }
    .pill-toggle { display: flex; background: var(--gold-08); border-radius: var(--r-full); padding: 3px; border: 1px solid var(--gold-20); }
    .pill-toggle button { font-family: var(--font-ui); font-size: 0.8125rem; font-weight: 500; padding: 5px 14px; border-radius: var(--r-full); border: none; cursor: pointer; transition: all var(--t-base); background: transparent; color: var(--ink-soft); }
    .pill-toggle button.active { background: var(--lapis-deep); color: white; }
    .switch-toggle { width: 44px; height: 26px; border-radius: var(--r-full); border: none; cursor: pointer; position: relative; transition: background var(--t-base); }
    .switch-toggle.on { background: var(--gold); }
    .switch-toggle.off { background: var(--ink-faint); }
    .switch-toggle::after { content: ''; position: absolute; top: 3px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: left var(--t-base); }
    .switch-toggle.on::after { left: 21px; }
    .switch-toggle.off::after { left: 3px; }

    /* Journal */
    .journal-surface {
      width: 100%; min-height: 180px; background: rgba(255,255,255,0.7);
      border: 1px solid var(--gold-20); border-radius: var(--r-md);
      padding: var(--sp-4); font-family: var(--font-body); font-size: 1.0625rem;
      color: var(--ink); line-height: 1.72; resize: vertical; outline: none;
      transition: border-color var(--t-base);
    }
    .journal-surface:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.12); }
    .autosave { font-family: var(--font-ui); font-size: 0.75rem; color: var(--ink-faint); text-align: right; margin-top: var(--sp-2); }
    .journal-entry { padding: var(--sp-3) 0; border-bottom: 1px solid var(--gold-08); }
    .journal-entry .je-date { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); }
    .journal-entry .je-text { font-family: var(--font-body); font-size: 0.9375rem; color: var(--ink-soft); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Confession tracker */
    .conf-days { font-family: var(--font-display); font-size: 5rem; font-weight: 700; color: var(--amethyst); text-align: center; line-height: 1; }
    .conf-days-label { font-family: var(--font-ui); font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.10em; color: var(--amethyst-light); text-align: center; margin-bottom: var(--sp-2); }
    .conf-last { font-family: var(--font-body); font-style: italic; font-size: 1rem; color: var(--ink-muted); text-align: center; }

    /* Settings */
    .settings-section { margin: var(--sp-5) 0 var(--sp-2); }
    .settings-section-head { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--gold); margin-bottom: var(--sp-2); }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between; padding: var(--sp-4) 0;
      border-bottom: 1px solid var(--gold-08); cursor: pointer;
    }
    .settings-row-label { font-family: var(--font-ui); font-size: 0.9375rem; color: var(--ink); }
    .settings-row-value { font-family: var(--font-body); font-size: 0.9375rem; color: var(--ink-muted); display: flex; align-items: center; gap: var(--sp-2); }

    /* Bottom sheet modal */
    .modal-scrim { position: fixed; inset: 0; background: rgba(20,15,9,0.5); z-index: 500; }
    .modal-sheet {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: white; border-radius: 20px 20px 0 0;
      padding: var(--sp-4) var(--sp-5) calc(var(--sp-8) + env(safe-area-inset-bottom,0px));
      z-index: 501; box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    }
    .grab-handle { width: 40px; height: 4px; background: var(--ink-faint); border-radius: var(--r-full); margin: 0 auto var(--sp-5); }
    .modal-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--ink); margin-bottom: var(--sp-5); display: flex; align-items: center; gap: var(--sp-2); }
    .field-label { font-family: var(--font-ui); font-size: 0.8125rem; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--sp-2); }
    .field-input {
      width: 100%; padding: var(--sp-3) var(--sp-4); border: 1.5px solid var(--gold-20);
      border-radius: var(--r-md); font-family: var(--font-body); font-size: 1rem;
      color: var(--ink); background: var(--vellum); outline: none; margin-bottom: var(--sp-4);
      transition: border-color var(--t-base);
    }
    .field-input:focus { border-color: var(--gold); }
    textarea.field-input { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: var(--sp-3); margin-top: var(--sp-4); }
    .modal-actions button { flex: 1; }

    /* Back header */
    .back-header {
      display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4) var(--sp-5);
      border-bottom: 1px solid var(--gold-08); background: var(--vellum);
      position: sticky; top: 0; z-index: 10;
    }
    .back-btn { background: none; border: none; color: var(--lapis-mid); cursor: pointer; font-family: var(--font-ui); font-size: 0.9375rem; font-weight: 500; display: flex; align-items: center; gap: 4px; padding: 0; }
    .back-header-info { flex: 1; }
    .back-header-eyebrow { font-family: var(--font-ui); font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); }
    .back-header-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--ink); }

    /* Keyline amethyst fix */
    .keyline-amethyst-4 { border-left-width: 4px; }

    /* Prayer view */
    .prayer-text-block { font-family: var(--font-body); font-size: 1.125rem; line-height: 1.78; color: var(--ink); }
    .prayer-latin-block { font-family: var(--font-body); font-style: italic; font-size: 1rem; line-height: 1.72; color: var(--ink-soft); }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- Rendered by JS -->
</div>

<script>
  /* ============================================================
     STATE
     ============================================================ */
  const S = {
    onboarded:             false,
    theme:                 'light',
    showLatin:             true,
    tab:                   'today',
    prayView:              'home',
    prayerKey:             null,
    learnView:             'home',
    credoQ:                0,
    credoAnswered:         null,
    flashIdx:              0,
    flashRevealed:         false,
    rosaryBead:            0,
    findFilter:            'all',
    findDetail:            null,
    meView:                'home',
    showConfModal:         false,
    confModalDate:         '',
    confModalPenance:      '',
    streak:                12,
    lastCheckIn:           null,
    journal: [
      { date:'2026-06-13', label:'SAT · 13 JUN · Luke 7:36–8:3', gospel:'Luke 7:36–8:3',
        text:'Her many sins are forgiven, for she has loved much. I want to love like that — without counting the cost, without holding back for fear of how it looks.' },
      { date:'2026-06-12', label:'FRI · 12 JUN · Sacred Heart', gospel:'The Sacred Heart',
        text:'He leaves the ninety-nine to come and find me. I am not a number to him. The thought steadies me on a restless day.' },
    ],
    confRecords:           [],
    linguaMastered:        48,
    linguaToReview:        12,
    credoLessonsCompleted: 7,
    totalCredoLessons:     24,
  };

  /* ============================================================
     PERSISTENCE
     ============================================================ */
  const STORAGE_KEY = 'scriptoria_v1';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      // Merge saved into S, preserving any new keys
      Object.keys(saved).forEach(k => {
        if (k in S) S[k] = saved[k];
      });
    } catch (e) {
      console.warn('Scriptoria: could not load state', e);
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
    } catch (e) {
      console.warn('Scriptoria: could not save state', e);
    }
  }

  /* ============================================================
     STREAK LOGIC
     ============================================================ */
  function todayISO() {
    return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
  }

  function checkStreak() {
    const today = todayISO();
    if (S.lastCheckIn === today) return; // already checked in today

    if (S.lastCheckIn) {
      const prev  = new Date(S.lastCheckIn);
      const now   = new Date(today);
      const diffMs = now - prev;
      const diffDays = Math.round(diffMs / 86400000);

      if (diffDays === 1) {
        // Consecutive day — extend streak
        S.streak += 1;
      } else if (diffDays > 1) {
        // Missed at least one day — reset
        S.streak = 1;
      }
    } else {
      // First ever check-in — preserve any seeded demo streak; a true
      // zero-state user begins at 1.
      if (!S.streak) S.streak = 1;
    }

    S.lastCheckIn = today;
    saveState();
  }

  /* ============================================================
     THEME HELPERS
     ============================================================ */
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', S.theme);
  }

  /* ============================================================
     DATE HELPERS
     ============================================================ */
  function formatLiturgicalDate() {
    const d = new Date(2026, 5, 15); // June 15 2026 (month is 0-indexed)
    const days    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months  = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
    const day   = days[d.getDay()];
    const date  = d.getDate();
    const month = months[d.getMonth()];

    // Ordinal suffix
    const suffix = (n) => {
      if (n >= 11 && n <= 13) return 'th';
      switch (n % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    };

    return `${day}, the ${date}${suffix(date)} of ${month}`;
  }

  /* ============================================================
     SVG ICON HELPERS
     ============================================================ */
  function iconSun() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="4.22" y1="4.22"  x2="6.34" y2="6.34"/>
      <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
      <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
    </svg>`;
  }

  function iconFlame() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 2c0 0-6 5.686-6 10a6 6 0 0 0 12 0c0-2.138-1.592-3.987-3-5
               0 2-1.5 3-1.5 3s-1.5-3 .5-8z"/>
    </svg>`;
  }

  function iconBook() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>`;
  }

  function iconPin() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>`;
  }

  function iconUser() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>`;
  }

  function iconSignal() {
    return `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
      <rect x="2"  y="16" width="3" height="5" rx="0.5"/>
      <rect x="7"  y="12" width="3" height="9" rx="0.5"/>
      <rect x="12" y="8"  width="3" height="13" rx="0.5"/>
      <rect x="17" y="4"  width="3" height="17" rx="0.5"/>
    </svg>`;
  }

  function iconWifi() {
    return `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
      <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>`;
  }

  function iconBattery() {
    return `<svg viewBox="0 0 24 24" width="22" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="1" y="6" width="18" height="12" rx="2"/>
      <line x1="23" y1="13" x2="23" y2="11"/>
      <rect x="3" y="8" width="11" height="8" rx="1" fill="currentColor" stroke="none"/>
    </svg>`;
  }

  /* ============================================================
     STATUS BAR
     ============================================================ */
  function renderStatusBar() {
    return `
      <div class="status-bar" role="banner" aria-label="Status bar">
        <span class="time">9:41</span>
        <div class="indicators" aria-hidden="true">
          ${iconSignal()}
          ${iconWifi()}
          ${iconBattery()}
        </div>
      </div>
    `;
  }

  /* ============================================================
     TAB BAR
     ============================================================ */
  function renderTabBar() {
    const tabs = [
      { key: 'today', label: 'Today',  icon: iconSun()   },
      { key: 'pray',  label: 'Pray',   icon: iconFlame() },
      { key: 'learn', label: 'Learn',  icon: iconBook()  },
      { key: 'find',  label: 'Find',   icon: iconPin()   },
      { key: 'me',    label: 'Me',     icon: iconUser()  },
    ];

    const items = tabs.map(t => `
      <button
        class="tab-item${S.tab === t.key ? ' active' : ''}"
        onclick="switchTab('${t.key}')"
        aria-label="${t.label} tab"
        aria-current="${S.tab === t.key ? 'page' : 'false'}"
      >
        ${t.icon}
        <span class="tab-label">${t.label}</span>
      </button>
    `).join('');

    return `<nav class="tab-bar" role="navigation" aria-label="Main navigation">${items}</nav>`;
  }

  /* ============================================================
     ONBOARDING SCREEN
     ============================================================ */
  function renderOnboarding() {
    return `
      <div class="screen-onboard anim-fade-in">
        <div class="onboard-wrap stagger">

          <!-- Chi-Rho Coin -->
          <div class="chirho-coin lg pulse-node" aria-hidden="true">☧</div>

          <!-- Title -->
          <h1 class="onboard-title">Scriptoria</h1>

          <!-- Tagline -->
          <p class="onboard-tagline">
            Your whole life of prayer,<br>gathered into one quiet manuscript.
          </p>

          <!-- Gilt Rule -->
          <div class="gilt-rule" style="width:100%;max-width:300px;margin:24px auto;">
            <span></span><span class="ornament">❦</span><span></span>
          </div>

          <!-- Body copy -->
          <p class="onboard-body">

          </p>

          <!-- Companions list -->
          <ul class="companion-list">
            <li>
              <div class="c-icon" aria-hidden="true">☀</div>
              <div>
                <div class="c-name">Today</div>
                <div class="c-desc">Daily Gospel, prayer &amp; reflection</div>
              </div>
            </li>
            <li>
              <div class="c-icon" aria-hidden="true">🕯</div>
              <div>
                <div class="c-name">Pray</div>
                <div class="c-desc">Rosary, Liturgy of the Hours &amp; more</div>
              </div>
            </li>
            <li>
              <div class="c-icon" aria-hidden="true">📖</div>
              <div>
                <div class="c-name">Learn</div>
                <div class="c-desc">Credo lessons &amp; Latin flashcards</div>
              </div>
            </li>
            <li>
              <div class="c-icon" aria-hidden="true">📍</div>
              <div>
                <div class="c-name">Find</div>
                <div class="c-desc">Mass times, parishes &amp; sacraments</div>
              </div>
            </li>
            <li>
              <div class="c-icon" aria-hidden="true">👤</div>
              <div>
                <div class="c-name">Me</div>
                <div class="c-desc">Journal, confession log &amp; streak</div>
              </div>
            </li>
          </ul>

          <!-- Gilt Rule -->
          <div class="gilt-rule" style="width:100%;max-width:300px;margin:20px auto;">
            <span></span><span class="ornament">✠</span><span></span>
          </div>

          <!-- CTA Button -->
          <button
            class="btn btn-lapis btn-block"
            style="max-width:280px;"
            onclick="beginOnboarding()"

          >
            Begin ✠

          <!-- Already have account -->
          <button class="text-btn mt-3" onclick="beginOnboarding()">
            I already have an account
          </button>

        </div>
      </div>
    `;
  }

  /* ============================================================
     TODAY SCREEN
     ============================================================ */
  function renderToday() {
    const gospelText = `You have heard it said, 'An eye for an eye.' But I say to you, offer no resistance to one who is evil. When someone strikes you on the cheek, turn the other to him as well.`;

    const thoughtText = `Where is Christ asking you to answer a wrong with peace today, rather than with its mirror?`;

    const prayerText = `Lord, when others are unkind, keep me from returning unkindness. Give me your patience and your peace.`;

    const latinPhrase = `Non resístere malo`;
    const latinGloss = `offer no resistance to evil`;

    return `
      <div class="screen anim-fade-in" id="screen-today" role="main" aria-label="Today">
        <div class="today-content stagger">

          <!-- Masthead -->
          <div class="masthead">
            <div class="masthead-row">
              <div class="chirho-coin sm" aria-hidden="true">☧</div>
              <h1 class="masthead-title">Scriptoria</h1>
            </div>
            <p class="masthead-week">11th Week in Ordinary Time</p>
            <p class="masthead-date">${formatLiturgicalDate()}</p>
          </div>

          <!-- Gilt Rule -->
          <div class="gilt-rule px-5">
            <span></span><span class="ornament">❦</span><span></span>
          </div>

          <!-- Streak ribbon -->
          <div class="streak-ribbon" aria-label="Prayer streak: ${S.streak} days">
            ✦ ${S.streak} day${S.streak !== 1 ? 's' : ''} kept · a quiet streak
          </div>

          <!-- Gospel Card -->
          <div class="vellum mt-4" role="article" aria-labelledby="gospel-heading">
            <div class="gospel-card-eyebrow">
              <span class="eyebrow-gold" id="gospel-heading">Gospel</span>
              <span class="eyebrow">Matthew 5:38–42</span>
            </div>
            <div class="hairline"></div>
            <p class="dropcap" style="font-family:var(--font-body);font-size:1.05rem;line-height:1.72;color:var(--ink);">
              ${gospelText}
            </p>
          </div>

          <!-- Thought card -->
          <div class="vellum mt-4 thought-card" role="article" aria-label="A thought to carry">
            <div class="eyebrow mb-3">A thought to carry</div>
            <p>${thoughtText}</p>
          </div>

          <!-- Prayer callout -->

  /* ============================================================
     BUILD ROSARY SEQUENCE (59 beads)
     ============================================================ */
  function buildRosarySequence(mysteryKey) {
    const myst = MYSTERIES[mysteryKey];
    const seq = [];
    seq.push({ name:'Apostles\' Creed', key:'creed', en:"I believe in God, the Father almighty, Creator of heaven and earth, and in Jesus Christ, his only Son, our Lord, who was conceived by the Holy Spirit, born of the Virgin Mary, suffered under Pontius Pilate, was crucified, died and was buried; he descended into hell; on the third day he rose again from the dead; he ascended into heaven, and is seated at the right hand of God the Father almighty; from there he will come to judge the living and the dead. I believe in the Holy Spirit, the holy catholic Church, the communion of saints, the forgiveness of sins, the resurrection of the body, and life everlasting. Amen.", la:"Credo in Deum Patrem omnipoténtem, Creatórem caeli et terrae, et in Iesum Christum, Fílium eius únicum, Dóminum nostrum, qui concéptus est de Spíritu Sancto, natus ex María Vírgine, passus sub Póntio Piláto, crucifíxus, mórtuus, et sepúltus, descéndit ad ínferos, tértia die resurréxit a mórtuis, ascéndit ad caelos, sedet ad déxteram Dei Patris omnipoténtis, inde ventúrus est iudicáre vivos et mórtuos. Credo in Spíritum Sanctum, sanctam Ecclésiam cathólicam, sanctórum communiónem, remissiónem peccatórum, carnis resurrectiónem, vitam aetérnam. Amen." });
    seq.push({ name:'Our Father', key:'paterNoster', bead:true, ...PRAYERS.paterNoster });
    seq.push({ name:'Hail Mary — for Faith',   key:'aveMaria', bead:true, ...PRAYERS.aveMaria });
    seq.push({ name:'Hail Mary — for Hope',    key:'aveMaria', bead:true, ...PRAYERS.aveMaria });
    seq.push({ name:'Hail Mary — for Charity', key:'aveMaria', bead:true, ...PRAYERS.aveMaria });
    seq.push({ name:'Glory Be', key:'gloriaPatri', ...PRAYERS.gloriaPatri });
    for (let i = 0; i < 5; i++) {
      seq.push({ name:`Our Father — ${myst.list[i]}`, key:'paterNoster', bead:true, mystery: myst.list[i], ...PRAYERS.paterNoster });
      for (let j = 0; j < 10; j++) seq.push({ name:'Hail Mary', key:'aveMaria', bead:true, ...PRAYERS.aveMaria });
      seq.push({ name:'Glory Be', key:'gloriaPatri', ...PRAYERS.gloriaPatri });
      seq.push({ name:'Fátima Prayer', key:'fatima', en:"O my Jesus, forgive us our sins, save us from the fires of hell, lead all souls to Heaven, especially those in most need of thy mercy.", la:"O mi Iesu, dimítte nobis débita nostra, líbera nos ab igne inférni, perduc in caelum omnes ánimas, praésertim eas quae máxime indigent misericórdia tua." });
    }
    // Mark the 59 physical beads (6 Our Fathers + 53 Hail Marys); the
    // Apostles' Creed sits on the crucifix and Glory Be / Fátima prayers
    // are said on the chain, so they advance the prayer without counting.
    return seq;
  }

  function getTodayMysteryKey() {
    const day = new Date().getDay(); // 0=Sun
    if (day === 1 || day === 6) return 'joyful';
    if (day === 2 || day === 5) return 'sorrowful';
    if (day === 3 || day === 0) return 'glorious';
    return 'luminous';
  }

  function renderRosary() {
    const mk = getTodayMysteryKey();
    const myst = MYSTERIES[mk];
    const seq = buildRosarySequence(mk);
    const totalSteps = seq.length;        // every prayer step (for navigation)
    const bead = S.rosaryBead;
    const cur = seq[bead] || seq[0];
    // Physical-bead numbering: the design counts the 59 beads, not the
    // spacer prayers (Creed / Glory Be / Fátima).
    const totalBeads = seq.filter(s => s.bead).length; // 59
    const beadNum = seq.slice(0, bead + 1).filter(s => s.bead).length;
    // Current mystery (for beads 6+)
    let mysteryIdx = -1;
    if (bead >= 6) mysteryIdx = Math.min(Math.floor((bead - 6) / 13), 4);
    const mysteryName = mysteryIdx >= 0 ? myst.list[mysteryIdx] : myst.name;

    // Dot strip: one dot per physical bead; the active dot tracks the
    // current bead (or the most recent one while on a spacer prayer).
    const activeDot = Math.max(0, beadNum - 1);
    const beadDots = seq.filter(s => s.bead)
      .map((_, i) => `<div class="rosary-bead ${i===activeDot?'active':''}"></div>`).join('');

    return `<div class="screen anim-fade-in" style="background:var(--parchment);" role="main">
      <div class="rosary-header">
        <div>
          <div class="eyebrow-gold" style="color:rgba(201,163,47,0.8);font-size:0.6875rem;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;margin-bottom:4px;">${myst.name}</div>

      <div class="rosary-counter">${cur.bead ? `Bead ${beadNum} of ${totalBeads}` : cur.name}</div>
      <div class="rosary-prayer">
        <div class="prayer-name">${cur.name}</div>
        ${cur.mystery ? `<div style="font-family:var(--font-body);font-style:italic;font-size:0.875rem;color:var(--amethyst);margin-bottom:var(--sp-3);">${cur.mystery}</div>` : ''}
        <p class="prayer-text">${cur.en}</p>
        ${S.showLatin && cur.la ? `<div class="hairline"></div><p class="prayer-latin">${cur.la}</p>` : ''}

      <div class="rosary-footer">
        <button class="btn btn-outline" ${bead===0?'disabled':''} onclick="if(S.rosaryBead>0){S.rosaryBead--;render();}">← Back</button>
        <button class="btn btn-gold" ${bead>=totalSteps-1?'disabled':''} onclick="if(S.rosaryBead<${totalSteps-1}){S.rosaryBead++;render();}">Next →</button>
      </div>
    </div>`;
  }

  function renderCredo() {

    return `<div class="screen anim-fade-in" role="main">
      <div class="credo-topbar">

      <div class="screen-inner">
        <div class="eyebrow" style="margin-bottom:var(--sp-2);">${cq.ref} · Multiple choice</div>
        <h2 style="font-family:var(--font-display);font-size:1.25rem;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:var(--sp-5);">${cq.q}</h2>
        ${cq.options.map((opt, i) => {
          let cls = 'option-btn';
          if (answered) {
            if (i === cq.correct) cls += ' correct';
            else if (i === S.credoAnswered && i !== cq.correct) cls += ' selected-wrong';

          return `<button class="${cls}" ${answered?'disabled':''} onclick="S.credoAnswered=${i};render();">

      </div>
    </div>`;
  }

  function renderFlashcard() {
    const idx = S.flashIdx % FLASHCARDS.length;
    const card = FLASHCARDS[idx];
    const total = FLASHCARDS.length;
    const dots = Array.from({length:total}, (_,i) => {
      const cls = i < idx ? 'done' : i === idx ? 'current' : '';
      return `<div class="flash-dot ${cls}"></div>`;
    }).join('');
    return `<div class="screen anim-fade-in" role="main">
      <div class="screen-inner">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-2);">

          <div style="font-family:var(--font-ui);font-size:0.875rem;font-weight:600;color:var(--ink-muted);">${idx+1} / ${total}</div>
        </div>
        <div class="flash-dots">${dots}</div>
        <div class="flash-card-wrap">
          <div class="flash-card" onclick="${S.flashRevealed ? '' : 'S.flashRevealed=true;render();'}">
            ${S.flashRevealed ? `
              <div class="flash-word">${card.word}</div>
              <div class="hairline" style="width:100%;margin:var(--sp-3) 0;"></div>

            ` : `

    </div>`;

  function renderFind() {

    const chips = ['all','today','saturday','nearest'].map(f => `<button class="chip ${S.findFilter===f?'active':''}" onclick="S.findFilter='${f}';render();">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('');

            <div class="parish-name">${p.name}</div>
            <div class="parish-meta">${p.city} · ${p.dist} · ${p.time}</div>

  let journalDebounce;
  function debounceJournal(val) {
    clearTimeout(journalDebounce);
    journalDebounce = setTimeout(() => {
      const today = todayISO();
      const existing = S.journal.findIndex(j => j.date === today);
      if (existing >= 0) S.journal[existing].text = val;
      else S.journal.unshift({ date: today, text: val, gospel: 'Matthew 5:38–42' });
      saveState();
      const ind = document.getElementById('autosave-indicator');
      if (ind) { ind.style.opacity = '1'; setTimeout(() => { ind.style.opacity = '0'; }, 2000); }
    }, 600);
  }

  /* ============================================================
     MAIN RENDER
     ============================================================ */
  function render() {
    const app = document.getElementById('app');
    if (!app) return;

    applyTheme();

    if (!S.onboarded) {
      app.innerHTML = renderOnboarding();
      return;
    }

    let screenHTML = '';
    switch (S.tab) {
      case 'today': screenHTML = renderToday(); break;
      case 'pray':  screenHTML = renderPray();  break;
      case 'learn': screenHTML = renderLearn(); break;
      case 'find':  screenHTML = renderFind();  break;
      case 'me':    screenHTML = renderMe();    break;
      default:      screenHTML = renderToday();
    }

    app.innerHTML = renderStatusBar() + screenHTML + renderTabBar();
  }

  /* ============================================================
     ACTIONS
     ============================================================ */
  function beginOnboarding() {
    S.onboarded = true;
    S.tab = 'today';
    checkStreak();
    saveState();
    render();
  }

  function switchTab(key) {
    S.tab = key;
    // Reset sub-views on tab switch
    S.prayView = 'home';
    S.learnView = 'home';
    S.findDetail = null;
    S.meView = 'home';
    S.showConfModal = false;
    saveState();
    render();
  }

  /* ============================================================
     MOUNT
     ============================================================ */
  function mount() {
    loadState();
    checkStreak();
    applyTheme();
    render();
  }

  // Boot
  mount();

  /* ============================================================
     SERVICE WORKER REGISTRATION
     ============================================================ */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        // SW not required for development
      });
    });
  }
</script>
</body>
</html>
