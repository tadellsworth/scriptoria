# Scriptoria — Vite + React PWA
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every route serves the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never stale-cache the service worker or the app entry.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
